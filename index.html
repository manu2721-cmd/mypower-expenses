<script type="text/babel" data-presets="react">

// ---------- helpers ----------
const PAYMENT_MODES = ["Cash", "Personal Card", "Company Account", "Other"];
const STATUS_META = {
  Pending: { color: "var(--pending)", label: "Pending" },
  Approved: { color: "var(--approved)", label: "Approved" },
  Rejected: { color: "var(--rejected)", label: "Rejected" },
  Paid: { color: "var(--paid)", label: "Paid" },
};
const BAR_COLORS = ["#F5C300", "#2A6A5A", "#B5762B", "#8C3B3B", "#2F3B52", "#7A6FB0", "#3E7CB1", "#C97C2C"];

function fmtNPR(n) {
  const v = Number(n) || 0;
  return "Rs " + v.toLocaleString("en-IN", { maximumFractionDigits: 0 });
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
function monthKey(d) { return (d || "").slice(0, 7); }
function itemsTotal(items) {
  return (items || []).reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.unitPrice) || 0), 0);
}
function objToArr(obj) {
  return Object.entries(obj || {}).map(([id, val]) => (typeof val === "string" ? { id, name: val } : { id, ...val }));
}

// ---------- Date formatting (AD / Bikram Sambat) ----------
function fmtDateAD(isoStr) {
  if (!isoStr) return "";
  const d = new Date(isoStr + "T00:00:00");
  if (isNaN(d)) return isoStr;
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}
function fmtDateBS(isoStr) {
  if (!isoStr) return "";
  try {
    const NDClass = (typeof NepaliDate !== "undefined" && NepaliDate && NepaliDate.default) ? NepaliDate.default : null;
    if (!NDClass) return fmtDateAD(isoStr) + " (BS unavailable)";
    const jsDate = new Date(isoStr + "T00:00:00");
    if (isNaN(jsDate)) return isoStr;
    const nd = new NDClass(jsDate);
    return nd.format("DD MMMM YYYY");
  } catch (e) {
    return fmtDateAD(isoStr) + " (BS unavailable)";
  }
}
function fmtDate(isoStr, format) { return format === "BS" ? fmtDateBS(isoStr) : fmtDateAD(isoStr); }

// ---------- Image compression (receipt photos, stored inline — no paid Storage plan needed) ----------
function resizeImageFile(file, maxWidth = 900, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Could not read image"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 640);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 640);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isMobile;
}

function Lightbox({ src, onClose }) {
  if (!src) return null;
  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(20,18,14,0.88)", zIndex: 100,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
    }}>
      <button onClick={onClose} style={{
        position: "absolute", top: 16, right: 16, background: "rgba(255,255,255,0.15)", color: "#fff",
        border: "none", borderRadius: 8, width: 36, height: 36, fontSize: 20, cursor: "pointer",
      }}>×</button>
      <img src={src} alt="Receipt full size" onClick={(e) => e.stopPropagation()}
        style={{ maxWidth: "92%", maxHeight: "88vh", borderRadius: 8, boxShadow: "0 12px 40px rgba(0,0,0,0.5)" }} />
    </div>
  );
}

function MoreMenu({ items }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    if (!open) return;
    const close = () => setOpen(false);
    window.addEventListener("click", close);
    return () => window.removeEventListener("click", close);
  }, [open]);

  return (
    <div style={{ position: "relative" }} onClick={(e) => e.stopPropagation()}>
      <button onClick={() => setOpen((v) => !v)} style={{ ...ghostBtn, padding: "8px 12px", fontSize: 16, lineHeight: 1 }}>⋯</button>
      {open && (
        <div style={{
          position: "absolute", right: 0, top: "calc(100% + 6px)", background: "var(--card)", border: "1px solid var(--line)",
          borderRadius: 10, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", minWidth: 160, zIndex: 40, overflow: "hidden",
        }}>
          {items.map((it) => (
            <button key={it.label} onClick={() => { setOpen(false); it.onClick(); }} style={{
              display: "block", width: "100%", textAlign: "left", padding: "10px 14px", border: "none", background: "none",
              cursor: "pointer", fontSize: 13.5, color: it.danger ? "var(--rejected)" : "var(--ink)",
            }}>{it.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function StatusBadge({ status }) {
  const meta = STATUS_META[status] || STATUS_META.Pending;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6, padding: "3px 10px", borderRadius: 999,
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: "0.04em",
      textTransform: "uppercase", color: "#fff", background: meta.color, whiteSpace: "nowrap",
    }}>{meta.label}</span>
  );
}

function Card({ children, style }) {
  return <div style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 12, padding: 20, ...style }}>{children}</div>;
}
const inputStyle = { padding: "10px 12px", borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", fontSize: 14, color: "var(--ink)", width: "100%" };
const smallSelect = { padding: "8px 10px", borderRadius: 8, border: "1px solid var(--line)", background: "var(--card)", fontSize: 13 };
const ghostBtn = { padding: "8px 14px", borderRadius: 8, border: "1px solid var(--line)", background: "var(--card)", fontSize: 12.5, fontWeight: 600, cursor: "pointer", color: "var(--ink)" };

function Field({ label, children }) {
  return <label style={{ display: "grid", gap: 6, fontSize: 12.5, color: "var(--ink-soft)", fontWeight: 600 }}>{label}{children}</label>;
}

function StatCard({ label, value, accent }) {
  return (
    <div style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "14px 16px", flex: "1 1 130px" }}>
      <div style={{ fontSize: 11, color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</div>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, fontWeight: 500, marginTop: 4, color: accent || "var(--ink)" }}>{fmtNPR(value)}</div>
    </div>
  );
}

// Simple dependency-free horizontal bar chart with permanent value labels
function SimpleBarChart({ data }) {
  if (!data || data.length === 0) return <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>Nothing to show yet.</div>;
  const max = Math.max(...data.map((d) => d.value), 1);
  return (
    <div style={{ display: "grid", gap: 10 }}>
      {data.map((d, i) => (
        <div key={d.name} style={{ display: "grid", gridTemplateColumns: "140px 1fr auto", gap: 10, alignItems: "center" }}>
          <div style={{ fontSize: 12.5, color: "var(--ink-soft)", textAlign: "right" }}>{d.name}</div>
          <div style={{ background: "var(--paper-dark)", borderRadius: 6, height: 20, overflow: "hidden" }}>
            <div style={{ width: `${(d.value / max) * 100}%`, height: "100%", background: BAR_COLORS[i % BAR_COLORS.length], borderRadius: 6 }} />
          </div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, minWidth: 80 }}>{fmtNPR(d.value)}</div>
        </div>
      ))}
    </div>
  );
}

// Simple monthly trend as vertical bars with labels
function SimpleTrendChart({ data }) {
  if (!data || data.length === 0) return <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>Nothing to show yet.</div>;
  const max = Math.max(...data.map((d) => d.value), 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 14, height: 220, padding: "10px 4px" }}>
      {data.map((d) => (
        <div key={d.name} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flex: "1 1 0" }}>
          <div style={{ fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" }}>{fmtNPR(d.value)}</div>
          <div style={{ width: "70%", maxWidth: 40, height: `${(d.value / max) * 150}px`, background: "var(--approved)", borderRadius: "4px 4px 0 0" }} />
          <div style={{ fontSize: 11, color: "var(--ink-soft)" }}>{d.name}</div>
        </div>
      ))}
    </div>
  );
}

// ---------- Login ----------
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    setError(""); setBusy(true);
    auth.signInWithEmailAndPassword(email.trim(), password)
      .catch((err) => { setError("Login failed — check your email and PIN with your admin."); setBusy(false); });
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <Card style={{ maxWidth: 380, width: "100%" }}>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: "0.18em", color: "var(--ink-soft)", textTransform: "uppercase" }}>MY POWER</div>
        <div style={{ fontFamily: "'Lora', serif", fontWeight: 700, fontSize: 24, marginTop: 2, marginBottom: 20 }}>Expense Ledger</div>
        <form onSubmit={submit} style={{ display: "grid", gap: 14 }}>
          <Field label="Email">
            <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} style={inputStyle} placeholder="you@mypower.com" />
          </Field>
          <Field label="PIN / password">
            <input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} style={inputStyle} />
          </Field>
          {error && <div style={{ fontSize: 12.5, color: "var(--rejected)" }}>{error}</div>}
          <button type="submit" disabled={busy} style={{
            marginTop: 4, padding: "11px 18px", borderRadius: 8, border: "none",
            background: "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: 14, cursor: busy ? "wait" : "pointer",
          }}>{busy ? "Signing in…" : "Sign in"}</button>
        </form>
      </Card>
    </div>
  );
}

function NoProfileScreen({ email }) {
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <Card style={{ maxWidth: 420, textAlign: "center" }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Almost there</div>
        <div style={{ fontSize: 13.5, color: "var(--ink-soft)", marginBottom: 14 }}>
          Your login ({email}) works, but isn't linked to a staff profile yet. Ask your admin to add you in the Manage tab.
        </div>
        <button onClick={() => auth.signOut()} style={ghostBtn}>Sign out</button>

// ---------- Add Expense ----------
function AddExpense({ categories, tags, onSubmit, isMobile, dateFormat }) {
  const emptyItem = () => ({ id: Math.random().toString(36).slice(2), tag: "", qty: 1, unitPrice: "" });
  const [form, setForm] = useState({ date: todayStr(), category: categories[0]?.name || "", paymentMode: PAYMENT_MODES[0], note: "", items: [emptyItem()], receipt: null });
  const [submitting, setSubmitting] = useState(false);
  const [compressing, setCompressing] = useState(false);
  const [fileError, setFileError] = useState("");

  useEffect(() => {
    if (!form.category && categories[0]) setForm((f) => ({ ...f, category: categories[0].name }));
  }, [categories]);

  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const updateItem = (id, field, value) => setForm((f) => ({ ...f, items: f.items.map((it) => (it.id === id ? { ...it, [field]: value } : it)) }));
  const addItemRow = () => setForm((f) => ({ ...f, items: [...f.items, emptyItem()] }));
  const removeItemRow = (id) => setForm((f) => ({ ...f, items: f.items.length > 1 ? f.items.filter((it) => it.id !== id) : f.items }));

  const handleReceiptFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setFileError(""); setCompressing(true);
    try {
      const dataUrl = await resizeImageFile(file);
      setForm((f) => ({ ...f, receipt: dataUrl }));
    } catch (err) {
      setFileError("Could not process that photo — try a different one.");
    }
    setCompressing(false);
    e.target.value = "";
  };
  const removeReceipt = () => setForm((f) => ({ ...f, receipt: null }));

  const total = itemsTotal(form.items);
  const hasValidRow = form.items.some((it) => it.tag.trim() && Number(it.qty) > 0 && Number(it.unitPrice) > 0);
  const canSubmit = hasValidRow && total > 0;
  let blockReason = !hasValidRow ? "Add at least one item with a quantity and a unit price above zero." : "";

  const submit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setSubmitting(true);
    await onSubmit(form);
    setForm({ date: todayStr(), category: categories[0]?.name || "", paymentMode: PAYMENT_MODES[0], note: "", items: [emptyItem()], receipt: null });
    setSubmitting(false);
  };

  return (
    <Card style={{ maxWidth: 660, padding: isMobile ? 16 : 20 }}>
      <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600, marginBottom: 16 }}>Log a new expense</div>
      <form onSubmit={submit} style={{ display: "grid", gap: 14 }}>
        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
          <Field label="Date">
            <input type="date" value={form.date} onChange={set("date")} required style={inputStyle} />
            {dateFormat === "BS" && form.date && (
              <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>≈ {fmtDateBS(form.date)}</div>
            )}
          </Field>
          <Field label="Category">
            <select value={form.category} onChange={set("category")} required style={inputStyle}>
              {categories.map((c) => <option key={c.id} value={c.name}>{c.name}</option>)}
            </select>
          </Field>
        </div>

        <Field label="Items">
          <datalist id="tag-suggestions">{tags.map((t) => <option key={t.id} value={t.name} />)}</datalist>

          {isMobile ? (
            <div style={{ display: "grid", gap: 10 }}>
              {form.items.map((it) => {
                const subtotal = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
                return (
                  <div key={it.id} style={{ border: "1px solid var(--line)", borderRadius: 10, padding: 10, display: "grid", gap: 8, background: "var(--paper)" }}>
                    <div style={{ display: "flex", gap: 8 }}>
                      <input list="tag-suggestions" value={it.tag} onChange={(e) => updateItem(it.id, "tag", e.target.value)}
                        placeholder="Tea, Taxi, Pen…" style={{ ...inputStyle, flex: 1, fontSize: 14 }} />
                      <button type="button" onClick={() => removeItemRow(it.id)} disabled={form.items.length === 1}
                        style={{ border: "none", background: "none", cursor: form.items.length === 1 ? "not-allowed" : "pointer",
                          color: form.items.length === 1 ? "var(--line)" : "var(--rejected)", fontSize: 22, lineHeight: 1, padding: "0 4px" }}>×</button>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                      <div>
                        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Qty</div>
                        <input type="number" min="0" step="1" value={it.qty} onChange={(e) => updateItem(it.id, "qty", e.target.value)}
                          style={{ ...inputStyle, padding: "8px 9px", fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
                      </div>
                      <div>
                        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Unit price</div>
                        <input type="number" min="0" step="0.01" value={it.unitPrice} onChange={(e) => updateItem(it.id, "unitPrice", e.target.value)}
                          placeholder="0" style={{ ...inputStyle, padding: "8px 9px", fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
                      </div>
                      <div>
                        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Subtotal</div>
                        <div style={{ padding: "8px 0", fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: "var(--ink-soft)" }}>
                          {subtotal > 0 ? fmtNPR(subtotal) : "—"}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div style={{ display: "grid", gap: 8 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 70px 90px 90px 28px", gap: 6, fontSize: 11, color: "var(--ink-soft)", padding: "0 2px" }}>
                <span>Item / tag</span><span>Qty</span><span>Unit price</span><span>Subtotal</span><span></span>
              </div>
              {form.items.map((it) => {
                const subtotal = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
                return (
                  <div key={it.id} style={{ display: "grid", gridTemplateColumns: "1fr 70px 90px 90px 28px", gap: 6, alignItems: "center" }}>
                    <input list="tag-suggestions" value={it.tag} onChange={(e) => updateItem(it.id, "tag", e.target.value)}
                      placeholder="Tea, Taxi, Pen…" style={{ ...inputStyle, padding: "7px 9px", fontSize: 13 }} />
                    <input type="number" min="0" step="1" value={it.qty} onChange={(e) => updateItem(it.id, "qty", e.target.value)}
                      style={{ ...inputStyle, padding: "7px 9px", fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <input type="number" min="0" step="0.01" value={it.unitPrice} onChange={(e) => updateItem(it.id, "unitPrice", e.target.value)}
                      placeholder="0" style={{ ...inputStyle, padding: "7px 9px", fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "var(--ink-soft)", textAlign: "right", paddingRight: 4 }}>
                      {subtotal > 0 ? fmtNPR(subtotal) : "—"}
                    </div>
                    <button type="button" onClick={() => removeItemRow(it.id)} disabled={form.items.length === 1}
                      style={{ border: "none", background: "none", cursor: form.items.length === 1 ? "not-allowed" : "pointer",
                        color: form.items.length === 1 ? "var(--line)" : "var(--rejected)", fontSize: 18, lineHeight: 1 }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
          <button type="button" onClick={addItemRow} style={{ ...ghostBtn, marginTop: 8, alignSelf: "start", width: isMobile ? "100%" : "auto" }}>+ Add item</button>
        </Field>

        <Field label="Receipt / bill photo (optional)">
          {!form.receipt ? (
            <div>
              <input type="file" accept="image/*" capture="environment" onChange={handleReceiptFile} disabled={compressing}
                style={{ fontSize: 13 }} />
              {compressing && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 4 }}>Compressing photo…</div>}
              {fileError && <div style={{ fontSize: 12, color: "var(--rejected)", marginTop: 4 }}>{fileError}</div>}
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <img src={form.receipt} alt="Receipt preview" style={{ width: 60, height: 60, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" }} />
              <button type="button" onClick={removeReceipt} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 12 }}>Remove photo</button>
            </div>
          )}
        </Field>

        <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 10, borderTop: "1px solid var(--line)", paddingTop: 10 }}>
          <span style={{ fontSize: 13, color: "var(--ink-soft)", fontWeight: 600 }}>Total</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, fontWeight: 600 }}>{fmtNPR(total)}</span>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
          <Field label="Payment mode">
            <select value={form.paymentMode} onChange={set("paymentMode")} style={inputStyle}>
              {PAYMENT_MODES.map((p) => <option key={p} value={p}>{p}</option>)}
            </select>
          </Field>
          <Field label="Note / purpose">
            <input value={form.note} onChange={set("note")} placeholder="Optional context" style={inputStyle} />
          </Field>
        </div>

        {blockReason && !submitting && (
          <div style={{ fontSize: 12.5, color: "var(--pending)", background: "#FFF3DE", border: "1px solid var(--pending)", borderRadius: 8, padding: "8px 12px" }}>{blockReason}</div>
        )}

        <button type="submit" disabled={!canSubmit || submitting || compressing} style={{
          marginTop: 4, padding: isMobile ? "14px 18px" : "11px 18px", borderRadius: 8, border: "none",
          background: (!canSubmit || submitting || compressing) ? "#ddd3ba" : "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: isMobile ? 15 : 14,
          cursor: (!canSubmit || submitting || compressing) ? "not-allowed" : "pointer",
        }}>{submitting ? "Submitting…" : `Submit claim — ${fmtNPR(total)}`}</button>
      </form>
    </Card>
  );
}

// ---------- My Expenses ----------
function MyExpenses({ myName, expenses, onWithdraw, onExport, dateFormat }) {
  const [lightboxSrc, setLightboxSrc] = useState(null);
  const [fromDate, setFromDate] = useState("");
  const [toDate, setToDate] = useState("");
  const filtered = useMemo(() => expenses.filter((e) => (!fromDate || e.date >= fromDate) && (!toDate || e.date <= toDate))
    .sort((a, b) => (b.submittedAt || "").localeCompare(a.submittedAt || "")), [expenses, fromDate, toDate]);

  const totals = useMemo(() => {
    const t = { claimed: 0, approved: 0, pending: 0, paid: 0 };
    filtered.forEach((e) => {
      t.claimed += e.amount;
      if (e.status === "Approved") t.approved += e.amount;
      if (e.status === "Pending") t.pending += e.amount;
      if (e.status === "Paid") t.paid += e.amount;
    });

  }, [filtered]);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        <StatCard label="Total claimed" value={totals.claimed} />
        <StatCard label="Approved" value={totals.approved} accent="var(--approved)" />
        <StatCard label="Pending" value={totals.pending} accent="var(--pending)" />
        <StatCard label="Paid out" value={totals.paid} accent="var(--paid)" />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 17, fontWeight: 600 }}>{myName}'s claims</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>From</span>
          <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
          <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>To</span>
          <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />

      </div>

        <Card style={{ color: "var(--ink-soft)" }}>{expenses.length === 0 ? 'No expenses logged yet.' : "No expenses in this date range."}</Card>
      ) : (
        <div style={{ display: "grid", gap: 10 }}>
          {filtered.map((e) => (
            <div key={e.id} style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>

                  <button onClick={() => setLightboxSrc(e.receipt)} style={{ border: "none", background: "none", padding: 0, cursor: "pointer" }}>
                    <img src={e.receipt} alt="Receipt" style={{ width: 44, height: 44, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" }} />
                  </button>
                )}
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{e.category}</div>
                  <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 2 }}>{fmtDate(e.date, dateFormat)} · {e.paymentMode}{e.note ? ` · ${e.note}` : ""}</div>
                  {e.items && e.items.length > 0 && (
                    <div style={{ marginTop: 6, display: "grid", gap: 2 }}>
                      {e.items.map((it, i) => (
                        <div key={i} style={{ fontSize: 12, color: "var(--ink-soft)", fontFamily: "'IBM Plex Mono', monospace" }}>
                          {it.tag} ×{it.qty} @ {fmtNPR(it.unitPrice)} = {fmtNPR(it.qty * it.unitPrice)}

                      ))}
                    </div>
                  )}

                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15 }}>{fmtNPR(e.amount)}</div>
                <StatusBadge status={e.status} />

              </div>
            </div>
          ))}
        </div>
      )}
      <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />
    </div>
  );
}

// ---------- My Analysis (available to every staff member, own data only) ----------
function MyAnalysis({ expenses }) {
  const [fromDate, setFromDate] = useState("");
  const [toDate, setToDate] = useState("");
  const [view, setView] = useState("category");

  const filtered = useMemo(() => expenses.filter((e) => (!fromDate || e.date >= fromDate) && (!toDate || e.date <= toDate)), [expenses, fromDate, toDate]);

  const byCategory = useMemo(() => {
    const m = {}; filtered.forEach((e) => { m[e.category] = (m[e.category] || 0) + e.amount; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filtered]);

  const byTag = useMemo(() => {
    const m = {};
    filtered.forEach((e) => (e.items || []).forEach((it) => { const amt = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0); m[it.tag] = (m[it.tag] || 0) + amt; }));
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filtered]);

  const byMonth = useMemo(() => {
    const m = {}; filtered.forEach((e) => { const k = monthKey(e.date); m[k] = (m[k] || 0) + e.amount; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => a.name.localeCompare(b.name));
  }, [filtered]);

  const total = filtered.reduce((s, e) => s + e.amount, 0);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <StatCard label="Total in view" value={total} />
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>From</span>
        <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>To</span>
        <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        {(fromDate || toDate) && <button onClick={() => { setFromDate(""); setToDate(""); }} style={{ ...ghostBtn, padding: "7px 10px", fontSize: 11.5 }}>Clear</button>}
        <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
          {[["category", "By Category"], ["tag", "By Tag"], ["trend", "Monthly Trend"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)} style={{ ...ghostBtn, background: view === id ? "var(--ink)" : "var(--card)", color: view === id ? "var(--paper)" : "var(--ink)" }}>{label}</button>
          ))}
        </div>
      </div>
      {view === "category" && <Card><SimpleBarChart data={byCategory} /></Card>}
      {view === "tag" && <Card><SimpleBarChart data={byTag} /></Card>}
      {view === "trend" && <Card><SimpleTrendChart data={byMonth} /></Card>}
    </div>
  );
}

// ---------- Manage (admin only) ----------
function EditableRow({ name, onRename, onRemove, onMoveUp, onMoveDown, canMoveUp, canMoveDown }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(name);

  const save = () => {
    if (draft.trim() && draft.trim() !== name) onRename(draft.trim());
    setEditing(false);
  };

  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5, padding: "6px 0", borderBottom: "1px solid var(--line)", gap: 8 }}>
      {editing ? (
        <input autoFocus value={draft} onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") save(); if (e.key === "Escape") { setDraft(name); setEditing(false); } }}
          onBlur={save} style={{ ...inputStyle, padding: "5px 8px", fontSize: 13, flex: 1 }} />
      ) : (
        <span style={{ flex: 1 }}>{name}</span>
      )}
      <div style={{ display: "flex", gap: 4 }}>
        {onMoveUp && <button onClick={onMoveUp} disabled={!canMoveUp} style={{ ...ghostBtn, padding: "3px 8px", fontSize: 11, opacity: canMoveUp ? 1 : 0.35 }}>↑</button>}
        {onMoveDown && <button onClick={onMoveDown} disabled={!canMoveDown} style={{ ...ghostBtn, padding: "3px 8px", fontSize: 11, opacity: canMoveDown ? 1 : 0.35 }}>↓</button>}
        {!editing && <button onClick={() => { setDraft(name); setEditing(true); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11 }}>Edit</button>}
        <button onClick={onRemove} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Remove</button>
      </div>
    </div>
  );
}

function Manage({ categories, tags, staffMap, myUid, onAddCategory, onRemoveCategory, onRenameCategory, onMoveCategory, onRemoveTag, onRenameTag, onCreateStaff, onToggleAdmin, onToggleActive }) {
  const [newCat, setNewCat] = useState("");
  const [newStaffName, setNewStaffName] = useState("");
  const [newStaffEmail, setNewStaffEmail] = useState("");
  const [newStaffPin, setNewStaffPin] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  const createStaff = async () => {
    if (!newStaffName.trim() || !newStaffEmail.trim() || newStaffPin.length < 6) {
      setMsg("Fill in name, email, and a PIN of at least 6 characters."); return;
    }
    setBusy(true); setMsg("");
    try {
      await onCreateStaff(newStaffEmail.trim(), newStaffPin, newStaffName.trim());
      setNewStaffName(""); setNewStaffEmail(""); setNewStaffPin("");
      setMsg("Staff login created.");
    } catch (err) {
      setMsg("Could not create login: " + err.message);
    }
    setBusy(false);
  };

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <Card>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Categories</div>
        <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 12 }}>Use ↑/↓ to reorder — this changes the order shown everywhere. Categories in use by a transaction can't be deleted, only renamed (renaming updates existing transactions too).</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <input value={newCat} onChange={(e) => setNewCat(e.target.value)} placeholder="Category name" style={{ ...inputStyle, width: "auto", flex: 1 }}
            onKeyDown={(e) => { if (e.key === "Enter") { onAddCategory(newCat); setNewCat(""); } }} />
          <button onClick={() => { onAddCategory(newCat); setNewCat(""); }} style={ghostBtn}>Add</button>
        </div>
        <div style={{ display: "grid", gap: 2 }}>
          {categories.map((c, i) => (
            <EditableRow key={c.id} name={c.name}
              onRename={(newName) => onRenameCategory(c.id, c.name, newName)}
              onRemove={() => onRemoveCategory(c.id, c.name)}
              onMoveUp={() => onMoveCategory(c.id, "up")} onMoveDown={() => onMoveCategory(c.id, "down")}
              canMoveUp={i > 0} canMoveDown={i < categories.length - 1} />
          ))}
        </div>
      </Card>

      <Card>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Tags</div>
        <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 12 }}>Tags are added automatically when staff type a new item on a claim. Tags in use can't be deleted, only renamed.</div>
        <div style={{ display: "grid", gap: 2 }}>
          {tags.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No tags yet — they'll appear here once staff start logging items.</div>}
          {tags.map((t) => (
            <EditableRow key={t.id} name={t.name}
              onRename={(newName) => onRenameTag(t.id, t.name, newName)}
              onRemove={() => onRemoveTag(t.id, t.name)} />
          ))}
        </div>
      </Card>

      <Card>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Create a staff login</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Name"><input value={newStaffName} onChange={(e) => setNewStaffName(e.target.value)} style={inputStyle} /></Field>
          <Field label="Email"><input value={newStaffEmail} onChange={(e) => setNewStaffEmail(e.target.value)} placeholder="name@mypower.com" style={inputStyle} /></Field>
          <Field label="PIN (6+ chars)"><input value={newStaffPin} onChange={(e) => setNewStaffPin(e.target.value)} style={inputStyle} /></Field>
          <button onClick={createStaff} disabled={busy} style={{ ...ghostBtn, height: 42 }}>{busy ? "Creating…" : "Create"}</button>
        </div>
        {msg && <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 10 }}>{msg}</div>}
      </Card>

      <Card>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Staff & permissions</div>
        <div style={{ display: "grid", gap: 6 }}>
          {Object.entries(staffMap).map(([uid, s]) => (
            <div key={uid} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5, padding: "8px 0", borderBottom: "1px solid var(--line)", gap: 10, flexWrap: "wrap" }}>
              <div>{s.name} {uid === myUid && <span style={{ fontSize: 11, color: "var(--ink-soft)" }}>(you)</span>}</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <label style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}>
                  <input type="checkbox" checked={!!s.isAdmin} onChange={(e) => onToggleAdmin(uid, e.target.checked)} disabled={uid === myUid} /> Admin
                </label>
                <label style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}>
                  <input type="checkbox" checked={s.active !== false} onChange={(e) => onToggleActive(uid, e.target.checked)} disabled={uid === myUid} /> Active
                </label>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ---------- Main App ----------
function MainApp({ user }) {
  const isMobile = useIsMobile();
  const [dateFormat, setDateFormat] = useState(() => { try { return localStorage.getItem("mp-date-format") || "AD"; } catch (e) { return "AD"; } });
  const toggleDateFormat = () => setDateFormat((f) => {
    const next = f === "AD" ? "BS" : "AD";
    try { localStorage.setItem("mp-date-format", next); } catch (e) {}
    return next;
  });
  const [staffMap, setStaffMap] = useState(null);
  const [categories, setCategories] = useState([]);
  const [tags, setTags] = useState([]);
  const [myExpenses, setMyExpenses] = useState([]);
  const [allExpenses, setAllExpenses] = useState([]);
  const [tab, setTab] = useState("add");
  const [toast, setToast] = useState("");

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };

  useEffect(() => {
    const ref = db.ref("staff");
    const cb = (snap) => setStaffMap(snap.val() || {});
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, []);

  useEffect(() => {
    const catRef = db.ref("categories"), tagRef = db.ref("tags");
    const c1 = (snap) => setCategories(objToArr(snap.val()));
    const c2 = (snap) => setTags(objToArr(snap.val()));
    catRef.on("value", c1); tagRef.on("value", c2);
    return () => { catRef.off("value", c1); tagRef.off("value", c2); };
  }, []);

  useEffect(() => {
    const ref = db.ref("expenses/" + user.uid);
    const cb = (snap) => setMyExpenses(objToArr(snap.val()));
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  const me = staffMap ? staffMap[user.uid] : null;
  const isAdmin = !!(me && me.isAdmin);

  useEffect(() => {
    if (!isAdmin) { setAllExpenses([]); return; }
    const ref = db.ref("expenses");
    const cb = (snap) => {
      const all = snap.val() || {};
      const out = [];
      Object.entries(all).forEach(([uid, exps]) => {
        Object.entries(exps || {}).forEach(([id, val]) => out.push({ id, staffUid: uid, ...val }));
      });
      setAllExpenses(out);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  if (staffMap === null) return <div style={{ padding: 60, textAlign: "center", color: "var(--ink-soft)" }}>Loading…</div>;
  if (!me) return <NoProfileScreen email={user.email} />;

  const addExpense = async (form) => {
    const cleanItems = form.items.map((it) => ({ tag: it.tag.trim(), qty: Number(it.qty) || 0, unitPrice: Number(it.unitPrice) || 0 })).filter((it) => it.tag && it.qty > 0 && it.unitPrice > 0);
    const amount = itemsTotal(cleanItems);
    const newRef = db.ref("expenses/" + user.uid).push();
    const record = { staffName: me.name, date: form.date, category: form.category, items: cleanItems, amount, paymentMode: form.paymentMode, note: form.note.trim(), status: "Pending", submittedAt: new Date().toISOString(), reviewNote: "" };
    if (form.receipt) record.receipt = form.receipt;
    await newRef.set(record);
    const existingTagNames = tags.map((t) => t.name);
    const newTagNames = [...new Set(cleanItems.map((it) => it.tag))].filter((t) => !existingTagNames.includes(t));
    newTagNames.forEach((t) => db.ref("tags").push({ name: t }));
    flash("Expense submitted.");
  };

  const withdraw = async (expenseId) => { await db.ref("expenses/" + user.uid + "/" + expenseId).remove(); flash("Withdrawn."); };

  const review = async (staffUid, expenseId, status, note) => {
    await db.ref("expenses/" + staffUid + "/" + expenseId).update({ status, reviewNote: note || "", reviewedBy: me.name });
    flash("Marked " + status.toLowerCase() + ".");
  };

  const addCategory = (name) => {
    if (!name.trim()) return;
    const maxOrder = categories.reduce((m, c) => Math.max(m, c.order ?? 0), -1);
    db.ref("categories").push({ name: name.trim(), order: maxOrder + 1 });
  };

  const categoryUsageCount = (name) => allExpenses.filter((e) => e.category === name).length;
  const tagUsageCount = (name) => allExpenses.filter((e) => (e.items || []).some((it) => it.tag === name)).length;

  const removeCategory = (id, name) => {
    const count = categoryUsageCount(name);
    if (count > 0) { flash(`Can't delete — ${count} transaction${count === 1 ? "" : "s"} use "${name}".`); return; }
    db.ref("categories/" + id).remove();
  };

  const renameCategory = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    await db.ref("categories/" + id).update({ name: clean });
    const affected = allExpenses.filter((e) => e.category === oldName);
    if (affected.length > 0) {
      const updates = {};
      affected.forEach((e) => { updates[`expenses/${e.staffUid}/${e.id}/category`] = clean; });
      await db.ref().update(updates);
    }
    flash(`Renamed to "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const moveCategory = async (id, direction) => {
    const sorted = [...categories].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const idx = sorted.findIndex((c) => c.id === id);
    const swapIdx = direction === "up" ? idx - 1 : idx + 1;
    if (idx < 0 || swapIdx < 0 || swapIdx >= sorted.length) return;
    const a = sorted[idx], b = sorted[swapIdx];
    await db.ref().update({
      [`categories/${a.id}/order`]: b.order ?? swapIdx,
      [`categories/${b.id}/order`]: a.order ?? idx,
    });
  };

  const removeTag = (id, name) => {
    const count = tagUsageCount(name);
    if (count > 0) { flash(`Can't delete — ${count} transaction${count === 1 ? "" : "s"} use "${name}".`); return; }
    db.ref("tags/" + id).remove();
  };

  const renameTag = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    await db.ref("tags/" + id).update({ name: clean });
    const affected = allExpenses.filter((e) => (e.items || []).some((it) => it.tag === oldName));
    if (affected.length > 0) {
      const updates = {};
      affected.forEach((e) => {
        const newItems = e.items.map((it) => (it.tag === oldName ? { ...it, tag: clean } : it));
        updates[`expenses/${e.staffUid}/${e.id}/items`] = newItems;
      });
      await db.ref().update(updates);
    }
    flash(`Renamed to "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const adminDeleteExpense = async (staffUid, expenseId) => {
    await db.ref("expenses/" + staffUid + "/" + expenseId).remove();
    flash("Transaction deleted.");
  };

  const createStaff = async (email, password, displayName) => {
    const secondary = firebase.initializeApp(firebaseConfig, "secondary-" + Date.now());
    try {
      const cred = await secondary.auth().createUserWithEmailAndPassword(email, password);
      const uid = cred.user.uid;
      await db.ref("staff/" + uid).set({ name: displayName, isAdmin: false, active: true });
      await secondary.auth().signOut();
    } finally {
      await secondary.delete();
    }
  };
  const toggleAdmin = (uid, val) => db.ref("staff/" + uid + "/isAdmin").set(val);
  const toggleActive = (uid, val) => db.ref("staff/" + uid + "/active").set(val);

  const exportCSV = (rows) => {
    const header = ["Date", "Staff", "Category", "Items", "Amount", "Payment Mode", "Status", "Note", "Submitted At", "Review Note"];
    const lines = [header.join(",")];
    rows.forEach((e) => {
      const itemsStr = (e.items || []).map((it) => `${it.tag} x${it.qty} @${it.unitPrice}=${it.qty * it.unitPrice}`).join("; ");
      const cells = [e.date, e.staffName || me.name, e.category, itemsStr, e.amount, e.paymentMode, e.status, e.note, e.submittedAt, e.reviewNote].map((c) => `"${String(c ?? "").replace(/"/g, '""')}"`);
      lines.push(cells.join(","));
    });
    const blob = new Blob([lines.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `mypower_expenses_${todayStr()}.csv`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  };

  const sortedCategories = [...categories].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

  const primaryTabs = isAdmin
    ? [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }, { id: "analysis", label: "My Analysis" }, { id: "overview", label: "Company Overview" }, { id: "manage", label: "Manage" }]
    : [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }];
  const moreTabs = isAdmin ? [] : [{ id: "analysis", label: "My Analysis" }];
  const currentTabLabel = [...primaryTabs, ...moreTabs].find((t) => t.id === tab)?.label;

  return (
    <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 0 60px" }}>
      <div style={{ padding: isMobile ? "16px 16px 14px" : "22px 28px 18px", borderBottom: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 14, background: "var(--paper-dark)" }}>
        <div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: "0.18em", color: "var(--ink-soft)", textTransform: "uppercase" }}>MY POWER</div>
          <div style={{ fontFamily: "'Lora', serif", fontWeight: 700, fontSize: isMobile ? 20 : 26, marginTop: 2 }}>Expense Ledger</div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <div style={{ display: "flex", borderRadius: 8, overflow: "hidden", border: "1px solid var(--line)" }}>
            {["AD", "BS"].map((f) => (
              <button key={f} onClick={() => f !== dateFormat && toggleDateFormat()} style={{
                padding: "6px 10px", fontSize: 11.5, border: "none", cursor: "pointer",
                background: dateFormat === f ? "var(--ink)" : "var(--card)", color: dateFormat === f ? "var(--paper)" : "var(--ink)",
              }}>{f}</button>
            ))}
          </div>
          <span style={{ fontSize: 13, color: "var(--ink-soft)" }}>{me.name}{isAdmin ? " · Admin" : ""}</span>
          {isAdmin ? (
            <button onClick={() => auth.signOut()} style={ghostBtn}>Sign out</button>
          ) : (
            <MoreMenu items={[
              ...moreTabs.map((t) => ({ label: t.label, onClick: () => setTab(t.id) })),
              { label: "Sign out", danger: true, onClick: () => auth.signOut() },
            ]} />
          )}
        </div>
      </div>

      <div style={{ display: "flex", gap: 2, padding: "0 16px", borderBottom: "1px solid var(--line)", background: "var(--paper)" }}>
        {primaryTabs.map((it) => (
          <button key={it.id} onClick={() => setTab(it.id)} style={{
            padding: isMobile ? "12px 14px" : "12px 16px", border: "none", background: "transparent", cursor: "pointer", fontSize: isMobile ? 12.5 : 13, fontWeight: 600,
            color: tab === it.id ? "var(--ink)" : "var(--ink-soft)", borderBottom: tab === it.id ? "2px solid var(--brand-yellow)" : "2px solid transparent", marginBottom: -1,
          }}>{it.label}</button>
        ))}
      </div>

      <div style={{ padding: isMobile ? "16px 16px" : "20px 28px" }}>
        {!isAdmin && !primaryTabs.some((t) => t.id === tab) && (
          <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 12 }}>{currentTabLabel}</div>
        )}
        {tab === "add" && <AddExpense categories={sortedCategories} tags={tags} onSubmit={addExpense} isMobile={isMobile} dateFormat={dateFormat} />}
        {tab === "mine" && <MyExpenses myName={me.name} expenses={myExpenses} onWithdraw={withdraw} onExport={exportCSV} dateFormat={dateFormat} />}
        {tab === "analysis" && <MyAnalysis expenses={myExpenses} />}
        {tab === "overview" && isAdmin && <Overview expenses={allExpenses} staffMap={staffMap} categories={sortedCategories} onReview={review} onExport={exportCSV} onDelete={adminDeleteExpense} dateFormat={dateFormat} />}
        {tab === "manage" && isAdmin && (
          <Manage
            categories={sortedCategories} tags={tags} staffMap={staffMap} myUid={user.uid}
            onAddCategory={addCategory} onRemoveCategory={removeCategory} onRenameCategory={renameCategory} onMoveCategory={moveCategory}
            onRemoveTag={removeTag} onRenameTag={renameTag}
            onCreateStaff={createStaff} onToggleAdmin={toggleAdmin} onToggleActive={toggleActive}
          />
        )}
      </div>

      {toast && (
        <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "var(--ink)", color: "var(--paper)", padding: "10px 18px", borderRadius: 8, fontSize: 13, boxShadow: "0 6px 20px rgba(0,0,0,0.25)", zIndex: 50 }}>{toast}</div>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = logged out
  useEffect(() => auth.onAuthStateChanged(setUser), []);

  if (user === undefined) return <div style={{ padding: 60, textAlign: "center", color: "var(--ink-soft)" }}>Loading…</div>;
  if (!user) return <LoginScreen />;
  return <MainApp user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
