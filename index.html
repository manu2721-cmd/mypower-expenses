function computeAttStatus(timeStr, location) {
  if (!location || !location.shiftStart) return "present";
  const [inH, inM] = timeStr.split(":").map(Number);
  const [shH, shM] = location.shiftStart.split(":").map(Number);
  const inMinutes = inH * 60 + inM;
  const cutoff = shH * 60 + shM + (Number(location.graceMinutes) || 0);
  return inMinutes > cutoff ? "late" : "present";

function getGeoPosition() {
  const attempt = (opts) => new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject(new Error("Location isn't available on this device or browser.")); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      (err) => {
        let msg = err.message || "Couldn't get your location.";
        if (err.code === 1) msg = "Location permission is blocked for this site — open your browser's site settings and allow Location, then try again.";
        else if (err.code === 3) msg = "Getting your location timed out — try moving near a window or turning on WiFi, then try again.";
        reject(new Error(msg));
      },
      opts
    );
  });
  // Try a quick high-accuracy (GPS) fix first; indoors this often times out, so fall
  // back to a slower low-accuracy (WiFi/network) fix, which works much better indoors.
  return attempt({ enableHighAccuracy: true, timeout: 8000, maximumAge: 0 })
    .catch(() => attempt({ enableHighAccuracy: false, timeout: 15000, maximumAge: 0 }));
}

function expenseCategories(e) {

function spendByCategory(expenses) {
  const m = {};
  expenses.forEach((e) => {
    const hasItemCats = e.items && e.items.some((it) => it.category);
    if (hasItemCats) {
      e.items.forEach((it) => {
        const cat = it.category || "Uncategorized";
        const subtotal = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
        m[cat] = (m[cat] || 0) + subtotal;

      const cat = e.category || "Uncategorized";
      m[cat] = (m[cat] || 0) + e.amount;

// ---------- Roles & category permissions ----------
// Three tiers: "staff" (default), "admin" (limited — can be restricted to specific
// categories in Company Overview), "superadmin" (full access, incl. the Manage tab).
// Legacy accounts that predate this system (isAdmin: true, no role field) are treated
// as superadmin so nobody loses access when this ships.
function staffRole(s) {
  if (!s) return "staff";
  if (s.role === "staff" || s.role === "admin" || s.role === "superadmin") return s.role;
  return s.isAdmin ? "superadmin" : "staff";
}
// Category names can contain characters that aren't valid as Realtime Database key
// segments (e.g. "Shipping/courier"). This sanitizes a name into a safe map key,
// used consistently for reading/writing allowedCategories both here and in the
// security rules. Avoid using ".", "#", "$", "[", "]" more than once in a single
// category name — it's a rare edge case but the sanitizer only swaps the first hit
// of each in the security-rule version (the app-side version below handles all of them).
function safeKey(name) {
  return String(name || "").replace(/[.#$\[\]\/]/g, "_");

    if (!NDClass) return fmtDateAD(isoStr) + " (BS unavailable)";
    const jsDate = new Date(isoStr + "T00:00:00");
    if (isNaN(jsDate)) return isoStr;

// ---------- Image compression (receipt photos, stored inline — no paid Storage plan needed) ----------
function resizeImageFile(file, maxWidth = 900, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Could not read image"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}

function useIsMobile() {

    const onResize = () => setIsMobile(window.innerWidth <= 640);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isMobile;
}

function Card({ children, style }) {

// Collapsible section card — remembers open/closed per section in localStorage,
// so it stays as the admin left it even after a page refresh.
function CollapsibleCard({ storageKey, title, subtitle, children }) {
  const [open, setOpen] = useState(() => {
    try {
      const saved = localStorage.getItem("mp-manage-" + storageKey);
      return saved === null ? true : saved === "1";
    } catch (e) { return true; }
  });

  const toggle = () => setOpen((o) => {
    const next = !o;
    try { localStorage.setItem("mp-manage-" + storageKey, next ? "1" : "0"); } catch (e) {}
    return next;
  });

  return (
    <Card>
      <div onClick={toggle} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", userSelect: "none" }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600 }}>{title}</div>
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>{open ? "▾ Collapse" : "▸ Expand"}</span>
      </div>
      {open && (
        <div style={{ marginTop: 12 }}>
          {subtitle && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 12, marginTop: -4 }}>{subtitle}</div>}
          {children}
        </div>
      )}
    </Card>
  );
}

const smallSelect = { padding: "8px 10px", borderRadius: 8, border: "1px solid var(--line)", background: "var(--card)", fontSize: 13 };

function Field({ label, children, plain }) {

// Simple dependency-free horizontal bar chart with permanent value labels
function SimpleBarChart({ data, format }) {
  const fmt = format || fmtNPR;
  if (!data || data.length === 0) return <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>Nothing to show yet.</div>;
  const max = Math.max(...data.map((d) => d.value), 1);
  return (
    <div style={{ display: "grid", gap: 10 }}>
      {data.map((d, i) => (
        <div key={d.name} style={{ display: "grid", gridTemplateColumns: "140px 1fr auto", gap: 10, alignItems: "center" }}>
          <div style={{ fontSize: 12.5, color: "var(--ink-soft)", textAlign: "right" }}>{d.name}</div>
          <div style={{ background: "var(--paper-dark)", borderRadius: 6, height: 20, overflow: "hidden" }}>
            <div style={{ width: `${(d.value / max) * 100}%`, height: "100%", background: BAR_COLORS[i % BAR_COLORS.length], borderRadius: 6 }} />
          </div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, minWidth: 80 }}>{fmt(d.value)}</div>
        </div>
      ))}
    </div>
  );
}

// Simple monthly trend as vertical bars with labels
function SimpleTrendChart({ data, format }) {
  const fmt = format || fmtNPR;
  if (!data || data.length === 0) return <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>Nothing to show yet.</div>;
  const max = Math.max(...data.map((d) => d.value), 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 14, height: 220, padding: "10px 4px" }}>
      {data.map((d) => (
        <div key={d.name} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flex: "1 1 0" }}>
          <div style={{ fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" }}>{fmt(d.value)}</div>
          <div style={{ width: "70%", maxWidth: 40, height: `${(d.value / max) * 150}px`, background: "var(--approved)", borderRadius: "4px 4px 0 0" }} />
          <div style={{ fontSize: 11, color: "var(--ink-soft)" }}>{d.name}</div>
        </div>
      ))}
    </div>
  );
}

// ---------- Add Expense ----------
// Search-first tag picker: type to filter existing tags, tap one to use it,
// or add a brand-new tag if nothing matches. Replaces the old native <datalist>.
function TagPicker({ value, onChange, tags, placeholder, fieldStyle }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    const onDocClick = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, []);

  const q = (value || "").trim().toLowerCase();
  const matches = q
    ? tags.filter((t) => t.name.toLowerCase().includes(q)).sort((a, b) => a.name.toLowerCase().indexOf(q) - b.name.toLowerCase().indexOf(q))
    : tags;
  const exactMatch = tags.some((t) => t.name.toLowerCase() === q);
  const showList = open && (matches.length > 0 || (q && !exactMatch));

  const pick = (name) => { onChange(name); setOpen(false); };

  return (
    <div ref={wrapRef} style={{ position: "relative" }}>
      <input
        value={value}
        onChange={(e) => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        placeholder={placeholder}
        autoComplete="off"
        style={fieldStyle}
      />
      {showList && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, marginTop: 4, zIndex: 30,
          background: "var(--card)", border: "1px solid var(--line)", borderRadius: 8,
          maxHeight: 200, overflowY: "auto", boxShadow: "0 6px 16px rgba(0,0,0,0.15)",
        }}>
          {matches.slice(0, 30).map((t) => (
            <div key={t.id} onMouseDown={() => pick(t.name)}
              style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "var(--paper-dark)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}>
              {t.name}
            </div>
          ))}
          {q && !exactMatch && (
            <div onMouseDown={() => {
              if (window.confirm(`Create new tag "${value.trim()}"?\n\nDouble-check it's not already on the list under a slightly different spelling before adding a new one.`)) pick(value.trim());
            }}
              style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer", color: "var(--ink-soft)", borderTop: matches.length ? "1px solid var(--line)" : "none" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "var(--paper-dark)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}>
              + Add "{value.trim()}" as a new tag
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Type-to-filter category picker. Unlike TagPicker, selection is restricted to
// the existing category list — no free-text "add new" fallback, since categories
// are admin-managed only.
function CategoryPicker({ value, onChange, categories, placeholder }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const wrapRef = useRef(null);

  useEffect(() => {
    const onDocClick = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) { setOpen(false); setQuery(""); } };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, []);

  const q = query.trim().toLowerCase();
  const matches = q ? categories.filter((c) => c.name.toLowerCase().includes(q)) : categories;

  const pick = (name) => { onChange(name); setQuery(""); setOpen(false); };

  return (
    <div ref={wrapRef} style={{ position: "relative" }}>
      <input
        value={open ? query : (value || "")}
        onChange={(e) => { setQuery(e.target.value); setOpen(true); }}
        onFocus={(e) => { setOpen(true); setQuery(""); }}
        placeholder={placeholder}
        autoComplete="off"
        style={inputStyle}
      />
      {open && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, marginTop: 4, zIndex: 30,
          background: "var(--card)", border: "1px solid var(--line)", borderRadius: 8,
          maxHeight: 220, overflowY: "auto", boxShadow: "0 6px 16px rgba(0,0,0,0.15)",
        }}>
          {matches.length === 0 && <div style={{ padding: "8px 12px", fontSize: 13, color: "var(--ink-soft)" }}>No matching category</div>}
          {matches.map((c) => (
            <div key={c.id} onMouseDown={() => pick(c.name)}
              style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer", fontWeight: c.name === value ? 600 : 400, background: c.name === value ? "var(--paper-dark)" : "transparent" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "var(--paper-dark)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = c.name === value ? "var(--paper-dark)" : "transparent"; }}>
              {c.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AddExpense({ categories, tags, onSubmit, onUpdate, editingExpense, onCancelEdit, isMobile, dateFormat }) {
  const emptyItem = () => ({ id: Math.random().toString(36).slice(2), tag: "", category: categories[0]?.name || "", qty: 1, unitPrice: "" });
  const buildForm = () => {
    if (editingExpense) {
      return {
        date: editingExpense.date || todayStr(),
        paymentMode: editingExpense.paymentMode || PAYMENT_MODES[0],
        note: editingExpense.note || "",
        items: editingExpense.items && editingExpense.items.length > 0
          ? editingExpense.items.map((it) => ({ id: Math.random().toString(36).slice(2), tag: it.tag, category: it.category || editingExpense.category || categories[0]?.name || "", qty: it.qty, unitPrice: it.unitPrice }))
          : [emptyItem()],
        receipts: expenseReceipts(editingExpense),
      };
    }
    return { date: todayStr(), paymentMode: PAYMENT_MODES[0], note: "", items: [emptyItem()], receipts: [] };
  };
  const [form, setForm] = useState(buildForm);
  const [submitting, setSubmitting] = useState(false);
  const [compressing, setCompressing] = useState(false);
  const [fileError, setFileError] = useState("");

  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const updateItem = (id, field, value) => setForm((f) => ({ ...f, items: f.items.map((it) => (it.id === id ? { ...it, [field]: value } : it)) }));
  const addItemRow = () => setForm((f) => ({ ...f, items: [...f.items, emptyItem()] }));
  const removeItemRow = (id) => setForm((f) => ({ ...f, items: f.items.length > 1 ? f.items.filter((it) => it.id !== id) : f.items }));

  const handleReceiptFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setFileError(""); setCompressing(true);
    try {
      const dataUrl = await resizeImageFile(file);
      setForm((f) => ({ ...f, receipts: [...f.receipts, dataUrl] }));
    } catch (err) {
      setFileError("Could not process that photo — try a different one.");
    }
    setCompressing(false);
    e.target.value = "";
  };
  const removeReceipt = (idx) => setForm((f) => ({ ...f, receipts: f.receipts.filter((_, i) => i !== idx) }));

  const total = itemsTotal(form.items);
  const hasValidRow = form.items.some((it) => it.tag.trim() && it.category && Number(it.qty) > 0 && Number(it.unitPrice) > 0);
  const canSubmit = hasValidRow && total > 0;
  let blockReason = !hasValidRow ? "Add at least one item with an item name, category, quantity and unit price above zero." : "";

  const submit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setSubmitting(true);
    if (editingExpense) {
      await onUpdate(editingExpense, form);
    } else {
      await onSubmit(form);
      setForm({ date: todayStr(), paymentMode: PAYMENT_MODES[0], note: "", items: [emptyItem()], receipts: [] });
    }
    setSubmitting(false);
  };

  return (
    <Card style={{ maxWidth: 660, padding: isMobile ? 16 : 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, gap: 10, flexWrap: "wrap" }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600 }}>
          {editingExpense ? (editingExpense.editKind === "own" ? "Edit & resubmit claim" : "Edit transaction") : "Log a new expense"}
        </div>
        {editingExpense && <button type="button" onClick={onCancelEdit} style={{ ...ghostBtn, fontSize: 12 }}>Cancel</button>}
      </div>
      <form onSubmit={submit} style={{ display: "grid", gap: 14 }}>
        <Field label="Date">
          <input type="date" value={form.date} onChange={set("date")} required style={{ ...inputStyle, maxWidth: isMobile ? "100%" : 220 }} />
          {dateFormat === "BS" && form.date && (
            <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>≈ {fmtDateBS(form.date)}</div>
          )}
        </Field>

        <Field label="Items" plain>
          <div style={{ display: "grid", gap: 10 }}>
            {form.items.map((it, idx) => {
              const subtotal = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
              return (
                <div key={it.id} style={{ border: "1px solid var(--line)", borderRadius: 10, padding: 10, display: "grid", gap: 8, background: "var(--paper)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "var(--ink-soft)" }}>Item {idx + 1}</span>
                    <button type="button" onClick={() => removeItemRow(it.id)} disabled={form.items.length === 1}
                      style={{ border: "none", background: "none", cursor: form.items.length === 1 ? "not-allowed" : "pointer",
                        color: form.items.length === 1 ? "var(--line)" : "var(--rejected)", fontSize: 20, lineHeight: 1, padding: "0 4px" }}>×</button>
                  </div>
                  <TagPicker value={it.tag} onChange={(v) => updateItem(it.id, "tag", v)} tags={tags}
                    placeholder="Tea, Taxi, Pen…" fieldStyle={{ ...inputStyle, fontSize: 14 }} />
                  <CategoryPicker value={it.category} onChange={(v) => updateItem(it.id, "category", v)} categories={categories} placeholder="Category for this item…" />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                    <div>
                      <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Qty</div>
                      <input type="number" min="0" step="1" value={it.qty} onChange={(e) => updateItem(it.id, "qty", e.target.value)}
                        style={{ ...inputStyle, padding: "8px 9px", fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
                    </div>
                    <div>
                      <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Unit price</div>
                      <input type="number" min="0" step="0.01" value={it.unitPrice} onChange={(e) => updateItem(it.id, "unitPrice", e.target.value)}
                        placeholder="0" style={{ ...inputStyle, padding: "8px 9px", fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
                    </div>
                    <div>
                      <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Subtotal</div>
                      <div style={{ padding: "8px 0", fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: "var(--ink-soft)" }}>
                        {subtotal > 0 ? fmtNPR(subtotal) : "—"}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <button type="button" onClick={addItemRow} style={{ ...ghostBtn, marginTop: 8, alignSelf: "start", width: isMobile ? "100%" : "auto" }}>+ Add item</button>
        </Field>

        <Field label="Receipt / bill photos (optional)" plain>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: form.receipts.length > 0 ? 8 : 0 }}>
            {form.receipts.map((r, idx) => (
              <div key={idx} style={{ position: "relative" }}>
                <img src={r} alt="Receipt preview" style={{ width: 60, height: 60, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" }} />
                <button type="button" onClick={() => removeReceipt(idx)}
                  style={{ position: "absolute", top: -6, right: -6, width: 20, height: 20, borderRadius: "50%", border: "1px solid var(--line)",
                    background: "var(--card)", color: "var(--rejected)", fontSize: 13, lineHeight: 1, cursor: "pointer", padding: 0 }}>×</button>
              </div>
            ))}
          </div>
          <div>
            <input type="file" accept="image/*" capture="environment" onChange={handleReceiptFile} disabled={compressing}
              style={{ fontSize: 13 }} />
            {compressing && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 4 }}>Compressing photo…</div>}
            {fileError && <div style={{ fontSize: 12, color: "var(--rejected)", marginTop: 4 }}>{fileError}</div>}
          </div>
        </Field>

        <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 10, borderTop: "1px solid var(--line)", paddingTop: 10 }}>
          <span style={{ fontSize: 13, color: "var(--ink-soft)", fontWeight: 600 }}>Total</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, fontWeight: 600 }}>{fmtNPR(total)}</span>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
          <Field label="Payment mode">
            <select value={form.paymentMode} onChange={set("paymentMode")} style={inputStyle}>
              {PAYMENT_MODES.map((p) => <option key={p} value={p}>{p}</option>)}
            </select>
          </Field>
          <Field label="Note / purpose">
            <input value={form.note} onChange={set("note")} placeholder="Optional context" style={inputStyle} />
          </Field>
        </div>

        {blockReason && !submitting && (
          <div style={{ fontSize: 12.5, color: "var(--pending)", background: "#FFF3DE", border: "1px solid var(--pending)", borderRadius: 8, padding: "8px 12px" }}>{blockReason}</div>
        )}

        <button type="submit" disabled={!canSubmit || submitting || compressing} style={{
          marginTop: 4, padding: isMobile ? "14px 18px" : "11px 18px", borderRadius: 8, border: "none",
          background: (!canSubmit || submitting || compressing) ? "#ddd3ba" : "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: isMobile ? 15 : 14,
          cursor: (!canSubmit || submitting || compressing) ? "not-allowed" : "pointer",
        }}>{submitting ? "Saving…" : editingExpense ? `Save changes — ${fmtNPR(total)}` : `Submit claim — ${fmtNPR(total)}`}</button>
      </form>
    </Card>
  );
}

// ---------- My Expenses ----------
function MyExpenses({ myName, expenses, myAdvances, onWithdraw, onEdit, onExport, dateFormat }) {
  const [lightboxSrc, setLightboxSrc] = useState(null);

  const [toDate, setToDate] = useState("");

  const filtered = useMemo(() => expenses.filter((e) => (!fromDate || e.date >= fromDate) && (!toDate || e.date <= toDate))
    .sort((a, b) => (b.submittedAt || "").localeCompare(a.submittedAt || "")), [expenses, fromDate, toDate]);

  const totals = useMemo(() => {
    const t = { claimed: 0, approved: 0, pending: 0, paid: 0 };
    filtered.forEach((e) => {
      t.claimed += e.amount;
      if (e.status === "Approved") t.approved += e.amount;
      if (e.status === "Pending") t.pending += e.amount;
      if (e.status === "Paid") t.paid += e.amount;

          <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>To</span>

          <button onClick={() => onExport(filtered)} style={ghostBtn}>Export CSV</button>

        <div style={{ display: "grid", gap: 10 }}>
          {filtered.map((e) => (
            <div key={e.id} style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                {expenseReceipts(e).length > 0 && (
                  <div style={{ position: "relative" }}>
                    <button onClick={() => setLightboxSrc(expenseReceipts(e)[0])} style={{ border: "none", background: "none", padding: 0, cursor: "pointer" }}>
                      <img src={expenseReceipts(e)[0]} alt="Receipt" style={{ width: 44, height: 44, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" }} />
                    </button>

                      <span style={{ position: "absolute", bottom: -4, right: -4, background: "var(--ink)", color: "var(--paper)", fontSize: 9.5, fontWeight: 600, borderRadius: 8, padding: "1px 4px" }}>+{expenseReceipts(e).length - 1}</span>
                    )}

                  {e.items && e.items.length > 0 && (

                      {e.items.map((it, i) => (

                        </div>

                {e.status === "Paid" && e.paidFromAdvance && <span style={{ fontSize: 10.5, color: "var(--on-leave)", fontWeight: 600 }}>from advance</span>}

                  <button onClick={() => onEdit(e)} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5 }}>{e.status === "Rejected" ? "Edit & resubmit" : "Edit"}</button>
                )}

                    </div>

                  )
                )}
              </div>
            </div>
          ))}
        </div>
      )}
      <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />
    </div>
  );
}

function AdvancesTab({ staffMap, allAdvances, allExpenses, dateFormat, onGive, onUpdate, onDelete }) {
  const [staffUid, setStaffUid] = useState("");
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [date, setDate] = useState(todayStr());
  const [busy, setBusy] = useState(false);
  const [expandedUid, setExpandedUid] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState({});

  const staffList = useMemo(() => Object.entries(staffMap).map(([uid, s]) => ({ uid, name: s.name })).filter((s) => s.name).sort((a, b) => a.name.localeCompare(b.name)), [staffMap]);
  const advDate = (a) => a.date || (a.givenAt || "").slice(0, 10);

  const ledgerRows = useMemo(() => {
    const uidsWithAdvance = [...new Set(allAdvances.map((a) => a.staffUid))];
    return uidsWithAdvance.map((uid) => {
      const adv = allAdvances.filter((a) => a.staffUid === uid);
      const exp = allExpenses.filter((e) => e.staffUid === uid);
      return { uid, name: (staffMap[uid] || {}).name || uid, given: advanceGivenTotal(adv), deducted: advanceDeductedTotal(exp), balance: advanceBalance(adv, exp) };
    }).sort((a, b) => a.name.localeCompare(b.name));
  }, [allAdvances, allExpenses, staffMap]);

  const submit = async () => {
    if (!staffUid || !(Number(amount) > 0)) return;
    setBusy(true);
    await onGive(staffUid, amount, note, date);
    setAmount(""); setNote(""); setDate(todayStr());
    setBusy(false);
  };

  const startEdit = (a) => { setEditingId(a.id); setEditDraft({ amount: a.amount, note: a.note || "", date: advDate(a) }); };
  const saveEdit = (uid, id) => { onUpdate(uid, id, { amount: Number(editDraft.amount) || 0, note: editDraft.note.trim(), date: editDraft.date }); setEditingId(null); };

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <Card style={{ maxWidth: 480 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Give advance</div>
        <div style={{ display: "grid", gap: 10 }}>
          <select value={staffUid} onChange={(e) => setStaffUid(e.target.value)} style={inputStyle}>
            <option value="">Choose staff…</option>
            {staffList.map((s) => <option key={s.uid} value={s.uid}>{s.name}</option>)}
          </select>
          <input type="number" min="0" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="Amount" style={inputStyle} />
          <div>
            <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginBottom: 3 }}>Date</div>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle} />
          </div>
          <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Note (optional)" style={inputStyle} />
          <button onClick={submit} disabled={busy || !staffUid || !(Number(amount) > 0)} style={{ ...ghostBtn, background: "var(--brand-yellow)", borderColor: "var(--brand-yellow)" }}>{busy ? "Saving…" : "Give advance"}</button>
        </div>
      </Card>

      <Card>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Staff advance balances</div>
        {ledgerRows.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No advances given yet.</div>}
        <div style={{ display: "grid", gap: 2 }}>
          {ledgerRows.map((r) => (
            <div key={r.uid} style={{ borderBottom: "1px solid var(--line)", padding: "10px 0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontSize: 13.5, fontWeight: 600 }}>{r.name}</div>
                  <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>Given {fmtNPR(r.given)} · Deducted {fmtNPR(r.deducted)}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15, color: r.balance < 0 ? "var(--rejected)" : "var(--ink)" }}>{fmtNPR(r.balance)}</div>
                  <button onClick={() => setExpandedUid(expandedUid === r.uid ? null : r.uid)} style={{ ...ghostBtn, padding: "5px 9px", fontSize: 11.5 }}>{expandedUid === r.uid ? "Hide" : "History"}</button>
                </div>
              </div>
              {expandedUid === r.uid && (
                <div style={{ marginTop: 8, display: "grid", gap: 6 }}>
                  {allAdvances.filter((a) => a.staffUid === r.uid).sort((a, b) => advDate(b).localeCompare(advDate(a))).map((a) => (
                    editingId === a.id ? (
                      <div key={a.id} style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", background: "var(--paper)", borderRadius: 8, padding: "8px 10px" }}>
                        <input type="number" min="0" step="0.01" value={editDraft.amount} onChange={(e) => setEditDraft((d) => ({ ...d, amount: e.target.value }))} style={{ ...smallSelect, width: 90 }} />
                        <input type="date" value={editDraft.date} onChange={(e) => setEditDraft((d) => ({ ...d, date: e.target.value }))} style={{ ...smallSelect, padding: "7px 9px" }} />
                        <input value={editDraft.note} onChange={(e) => setEditDraft((d) => ({ ...d, note: e.target.value }))} placeholder="Note" style={{ ...smallSelect, flex: 1, minWidth: 100 }} />
                        <button onClick={() => saveEdit(r.uid, a.id)} style={{ ...ghostBtn, padding: "5px 9px", fontSize: 11.5, borderColor: "var(--approved)", color: "var(--approved)" }}>Save</button>
                        <button onClick={() => setEditingId(null)} style={{ ...ghostBtn, padding: "5px 9px", fontSize: 11.5 }}>Cancel</button>
                      </div>
                    ) : (
                      <div key={a.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, background: "var(--paper)", borderRadius: 8, padding: "6px 10px", gap: 8, flexWrap: "wrap" }}>
                        <span>+ {fmtNPR(a.amount)} given {fmtDate(advDate(a), dateFormat)}{a.note ? ` · ${a.note}` : ""} <span style={{ color: "var(--ink-soft)" }}>by {a.givenBy}</span>{a.lastEditedBy ? <span style={{ color: "var(--ink-soft)", fontStyle: "italic" }}> · edited by {a.lastEditedBy}</span> : ""}</span>
                        <span style={{ display: "flex", gap: 4 }}>
                          <button onClick={() => startEdit(a)} style={{ ...ghostBtn, padding: "3px 8px", fontSize: 11 }}>Edit</button>
                          <button onClick={() => { if (window.confirm("Delete this advance entry? This can't be undone.")) onDelete(r.uid, a.id); }}
                            style={{ border: "none", background: "none", color: "var(--rejected)", cursor: "pointer", fontSize: 15, lineHeight: 1, padding: "0 4px" }}>×</button>
                        </span>
                      </div>
                    )
                  ))}
                  {allExpenses.filter((e) => e.staffUid === r.uid && e.status === "Paid" && e.paidFromAdvance).sort((a, b) => (b.reviewedAt || b.submittedAt || "").localeCompare(a.reviewedAt || a.submittedAt || "")).map((e) => (
                    <div key={e.id} style={{ fontSize: 12, background: "var(--paper)", borderRadius: 8, padding: "6px 10px", color: "var(--rejected)" }}>
                      − {fmtNPR(e.amount)} deducted · {e.expenseNo || fmtDate(e.date, dateFormat)}
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ---------- Ledger: combined debit/credit statement for one staff. Only Approved
// (outstanding) and Paid expenses show here — Pending and Rejected never appear.
function StaffLedger({ staffName, advances, expenses, dateFormat }) {
  const advBalance = useMemo(() => advanceBalance(advances, expenses), [advances, expenses]);
  const advGiven = useMemo(() => advanceGivenTotal(advances), [advances]);
  const outstanding = useMemo(() => expenses.filter((e) => e.status === "Approved").reduce((s, e) => s + (Number(e.amount) || 0), 0), [expenses]);
  const totalPaid = useMemo(() => expenses.filter((e) => e.status === "Paid").reduce((s, e) => s + (Number(e.amount) || 0), 0), [expenses]);

  const rows = useMemo(() => {
    const out = [];
    advances.forEach((a) => {
      out.push({ key: "adv-" + a.id, date: a.date || (a.givenAt || "").slice(0, 10), desc: "Advance given" + (a.note ? " — " + a.note : ""), amount: a.amount, sign: 1, badge: "Advance", badgeColor: "var(--on-leave)" });
    });
    expenses.forEach((e) => {
      if (e.status === "Approved") {
        out.push({ key: "exp-app-" + e.id, date: e.date, desc: `Expense approved — ${e.expenseNo || "voucher"} (awaiting payment)`, amount: e.amount, sign: 1, badge: "Outstanding", badgeColor: "var(--pending)" });
      } else if (e.status === "Paid") {
        out.push({ key: "exp-paid-" + e.id, date: e.date, desc: `Expense paid — ${e.expenseNo || "voucher"}` + (e.paidFromAdvance ? " (settled from advance)" : ""), amount: e.amount, sign: -1, badge: "Outstanding", badgeColor: "var(--paid)" });
      }
    });
    return out.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  }, [advances, expenses]);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        <StatCard label="Advance given" value={advGiven} accent="var(--on-leave)" />
        <StatCard label="Advance balance" value={advBalance} accent={advBalance < 0 ? "var(--rejected)" : "var(--on-leave)"} />
        <StatCard label="Outstanding (to be paid)" value={outstanding} accent="var(--pending)" />
        <StatCard label="Total paid" value={totalPaid} accent="var(--paid)" />
      </div>
      <Card>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 12 }}>{staffName ? `${staffName}'s ` : ""}Ledger</div>
        {rows.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No advance or approved/paid expense activity yet.</div>}
        <div style={{ display: "grid", gap: 2 }}>
          {rows.map((r) => (
            <div key={r.key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: "1px solid var(--line)", gap: 10, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 13 }}>{r.desc}</div>
                <div style={{ fontSize: 11, color: "var(--ink-soft)", marginTop: 2 }}>{fmtDate(r.date, dateFormat)}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 10.5, color: r.badgeColor, border: `1px solid ${r.badgeColor}`, borderRadius: 999, padding: "2px 8px" }}>{r.badge}</span>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: r.sign > 0 ? "var(--approved)" : "var(--rejected)" }}>{r.sign > 0 ? "+ " : "− "}{fmtNPR(r.amount)}</span>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ---------- Manage (admin only) ----------
function EditableRow({ name, meta, onRename, onRemove, onMoveUp, onMoveDown, canMoveUp, canMoveDown, mergeOptions, onMerge }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(name);
  const [merging, setMerging] = useState(false);
  const [target, setTarget] = useState("");
  const [confirmingRemove, setConfirmingRemove] = useState(false);

  const save = () => {
    if (draft.trim() && draft.trim() !== name) onRename(draft.trim());
    setEditing(false);
  };

  const confirmMerge = () => {
    if (!target) return;
    onMerge(target);
    setMerging(false); setTarget("");
  };

  return (
    <div style={{ padding: "6px 0", borderBottom: "1px solid var(--line)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5, gap: 8 }}>
        {editing ? (
          <input autoFocus value={draft} onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") save(); if (e.key === "Escape") { setDraft(name); setEditing(false); } }}
            onBlur={save} style={{ ...inputStyle, padding: "5px 8px", fontSize: 13, flex: 1 }} />
        ) : (
          <span style={{ flex: 1 }}>{name}{meta && <span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 6 }}>{meta}</span>}</span>
        )}
        <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
          {onMoveUp && <button onClick={onMoveUp} disabled={!canMoveUp} style={{ ...ghostBtn, padding: "3px 8px", fontSize: 11, opacity: canMoveUp ? 1 : 0.35 }}>↑</button>}
          {onMoveDown && <button onClick={onMoveDown} disabled={!canMoveDown} style={{ ...ghostBtn, padding: "3px 8px", fontSize: 11, opacity: canMoveDown ? 1 : 0.35 }}>↓</button>}
          {!editing && <button onClick={() => { setDraft(name); setEditing(true); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11 }}>Edit</button>}
          {mergeOptions && mergeOptions.length > 0 && <button onClick={() => { setMerging((v) => !v); setConfirmingRemove(false); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11 }}>Merge</button>}
          <button onClick={() => { setConfirmingRemove((v) => !v); setMerging(false); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Remove</button>
        </div>
      </div>
      {confirmingRemove && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11.5, color: "var(--rejected)" }}>Delete "{name}"? This can't be undone.</span>
          <button onClick={() => { onRemove(); setConfirmingRemove(false); }} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Yes, delete</button>
          <button onClick={() => setConfirmingRemove(false)} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Cancel</button>
        </div>
      )}
      {merging && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>Merge "{name}" into:</span>
          <select value={target} onChange={(e) => setTarget(e.target.value)} style={{ ...smallSelect, flex: 1, minWidth: 120 }}>
            <option value="">Choose…</option>
            {mergeOptions.map((n) => <option key={n} value={n}>{n}</option>)}
          </select>
          <button onClick={confirmMerge} disabled={!target} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Confirm</button>
          <button onClick={() => setMerging(false)} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Cancel</button>
        </div>
      )}
    </div>
  );
}

          )}
          <button onClick={() => setConfirmingRemove((v) => !v)} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Remove</button>
        </div>
      </div>
      {confirmingRemove && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11.5, color: "var(--rejected)" }}>Delete "{loc.name}" and its {myRouters.length} router{myRouters.length === 1 ? "" : "s"}? This can't be undone.</span>
          <button onClick={() => { onRemove(loc.id); setConfirmingRemove(false); }} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Yes, delete</button>
          <button onClick={() => setConfirmingRemove(false)} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Cancel</button>
        </div>
      )}
      <div style={{ marginTop: 8, padding: "8px 10px", background: "var(--paper-dark)", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>Routers ({myRouters.length})</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
          {myRouters.map((r) => (
            <span key={r.id} style={{ fontSize: 11, padding: "4px 9px", borderRadius: 6, background: "var(--card)", border: "1px solid var(--line)", fontFamily: "'IBM Plex Mono', monospace", display: "flex", alignItems: "center", gap: 6 }}>
              {r.ssid} · {r.bssid}
              <span onClick={() => onRemoveRouter(r.id)} style={{ cursor: "pointer", color: "var(--rejected)", fontWeight: 700 }} title="Remove router">×</span>
            </span>
          ))}
          <input value={newSsid} onChange={(e) => setNewSsid(e.target.value)} placeholder="SSID" style={{ ...inputStyle, padding: "5px 8px", fontSize: 11.5, width: 90 }} />
          <input value={newBssid} onChange={(e) => setNewBssid(e.target.value)} placeholder="BSSID (MAC address)" style={{ ...inputStyle, padding: "5px 8px", fontSize: 11.5, width: 150 }} />
          <button onClick={() => { if (newSsid.trim() && newBssid.trim()) { onAddRouter(loc.id, newSsid, newBssid); setNewSsid(""); setNewBssid(""); } }}
            style={{ ...ghostBtn, padding: "5px 10px", fontSize: 11 }}>+ Add router</button>
        </div>
        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginTop: 6 }}>Manual entry for now — the Android app will get a scan-and-detect option later.</div>
      </div>
    </div>
  );
}

function StaffRow({ s, myUid, categories, locations, onSetRole, onToggleCategoryAccess, onToggleActive, onSetLocation, onToggleRemote, onSetLeaveAllotment, onSendResetLink, onFixEmail }) {
  const [copied, setCopied] = useState("");
  const copy = (text, label) => {
    if (!navigator.clipboard) return;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(label);
      setTimeout(() => setCopied(""), 1500);
    }).catch(() => {});
  };
  const role = staffRole(s);
  const isMe = s.uid === myUid;
  const grantedCount = s.allowedCategories ? Object.keys(s.allowedCategories).length : 0;
  return (
    <div style={{ padding: "8px 0", borderBottom: "1px solid var(--line)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5, gap: 10, flexWrap: "wrap" }}>
        <div>
          <div>{s.name} {isMe && <span style={{ fontSize: 11, color: "var(--ink-soft)" }}>(you)</span>}</div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 3, flexWrap: "wrap" }}>
            {s.email ? (
              <span onClick={() => copy(s.email, "email")} title="Click to copy User ID"
                style={{ fontSize: 10.5, color: "var(--ink-soft)", fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer" }}>
                {copied === "email" ? "Copied!" : s.email}
              </span>
            ) : (
              <MissingEmailFix uid={s.uid} onSave={onFixEmail} />
            )}
            <span onClick={() => copy(s.uid, "recordId")} title="Click to copy internal record ID"
              style={{ fontSize: 10.5, color: "var(--ink-soft)", fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer" }}>
              {copied === "recordId" ? "Copied!" : `Record ID: ${s.uid}`}
            </span>
            {s.email && !isMe && (

function ExpenseSettings({ categories, onAddCategory, onRemoveCategory, onRenameCategory, onMoveCategory, onMergeCategory, categoryUsageCount, tags, onRemoveTag, onRenameTag, onMergeTag, tagUsageCount }) {
  const [newCat, setNewCat] = useState("");
  const [catSearch, setCatSearch] = useState("");
  const [tagSearch, setTagSearch] = useState("");

  const catQ = catSearch.trim().toLowerCase();
  const filteredCategories = categories.filter((c) => c.name.toLowerCase().includes(catQ));

  const tagQ = tagSearch.trim().toLowerCase();
  const tagsWithCount = tags.map((t) => ({ ...t, count: tagUsageCount(t.name) }))
    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
  const filteredTags = tagsWithCount.filter((t) => t.name.toLowerCase().includes(tagQ));

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <CollapsibleCard storageKey="categories" title="Categories"
        subtitle="Use ↑/↓ to reorder — this changes the order shown everywhere. Categories in use by a transaction can't be deleted, only renamed or merged (both update existing transactions).">
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <input value={newCat} onChange={(e) => setNewCat(e.target.value)} placeholder="Category name" style={{ ...inputStyle, width: "auto", flex: 1 }}
            onKeyDown={(e) => { if (e.key === "Enter") { onAddCategory(newCat); setNewCat(""); } }} />
          <button onClick={() => { onAddCategory(newCat); setNewCat(""); }} style={ghostBtn}>Add</button>
        </div>
        {categories.length > 6 && (
          <input value={catSearch} onChange={(e) => setCatSearch(e.target.value)} placeholder="Search categories…" style={{ ...inputStyle, marginBottom: 10, fontSize: 13 }} />
        )}
        <div style={{ display: "grid", gap: 2 }}>
          {categories.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No categories yet — add one above.</div>}
          {categories.length > 0 && filteredCategories.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No categories match "{catSearch}".</div>}
          {filteredCategories.map((c) => {
            const i = categories.findIndex((x) => x.id === c.id);
            const count = categoryUsageCount(c.name);
            return (
              <EditableRow key={c.id} name={c.name}
                meta={`· ${count} use${count === 1 ? "" : "s"}`}
                onRename={(newName) => onRenameCategory(c.id, c.name, newName)}
                onRemove={() => onRemoveCategory(c.id, c.name)}
                onMoveUp={() => onMoveCategory(c.id, "up")} onMoveDown={() => onMoveCategory(c.id, "down")}
                canMoveUp={i > 0} canMoveDown={i < categories.length - 1}
                mergeOptions={categories.filter((x) => x.id !== c.id).map((x) => x.name)}
                onMerge={(target) => onMergeCategory(c.id, c.name, target)} />
            );
          })}
        </div>
      </CollapsibleCard>

      <CollapsibleCard storageKey="tags" title="Tags"
        subtitle="Tags are added automatically when staff type a new item on a claim. Sorted by how often they're used — rarely-used ones near the bottom are worth a look for typos, and can be merged into an existing tag.">
        {tags.length > 6 && (
          <input value={tagSearch} onChange={(e) => setTagSearch(e.target.value)} placeholder="Search tags…" style={{ ...inputStyle, marginBottom: 10, fontSize: 13 }} />
        )}
        <div style={{ display: "grid", gap: 2 }}>
          {tags.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No tags yet — they'll appear here once staff start logging items.</div>}
          {tags.length > 0 && filteredTags.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No tags match "{tagSearch}".</div>}
          {filteredTags.map((t) => (
            <EditableRow key={t.id} name={t.name}
              meta={`· ${t.count} use${t.count === 1 ? "" : "s"}`}
              onRename={(newName) => onRenameTag(t.id, t.name, newName)}
              onRemove={() => onRemoveTag(t.id, t.name)}
              mergeOptions={tags.filter((x) => x.id !== t.id).map((x) => x.name)}
              onMerge={(target) => onMergeTag(t.id, t.name, target)} />
          ))}
        </div>
      </CollapsibleCard>
    </div>
  );
}

// ---------- Staff profile fields, labels, and change-diffing (for the audit history log) ----------
const PROFILE_FIELDS = ["name", "staffCode", "phone", "designation", "joinDate", "department", "employmentType", "emergencyName", "emergencyPhone", "bloodGroup", "dob", "tempAddress", "permanentAddress", "photo"];
const PROFILE_LABELS = {
  name: "Full name", staffCode: "Staff code", phone: "Phone", designation: "Designation", joinDate: "Date of joining",
  department: "Department", employmentType: "Employment type", emergencyName: "Emergency contact name",
  emergencyPhone: "Emergency contact phone", bloodGroup: "Blood group", dob: "Date of birth", tempAddress: "Temporary address",
  permanentAddress: "Permanent address", photo: "Photo",
};
// Fields only a Super Admin or Admin sets — not editable from the employee's own profile form.
const ADMIN_PROFILE_FIELDS = ["staffCode", "designation", "department"];
const ADMIN_PROFILE_LABELS = { staffCode: "Staff code", designation: "Designation", department: "Department" };
const SENSITIVE_FIELDS = ["bankName", "branchName", "bankAccount", "citizenshipNumber", "panNumber", "citizenshipImage", "panImage"];
const SENSITIVE_LABELS = {
  bankName: "Bank name", branchName: "Branch name", bankAccount: "Bank account number", citizenshipNumber: "Citizenship number",
  panNumber: "PAN number", citizenshipImage: "Citizenship document", panImage: "PAN document",
};
function diffFields(oldObj, newObj, fields, labels) {
  const changes = [];
  fields.forEach((f) => {
    const before = (oldObj && oldObj[f]) || "";
    const after = (newObj && newObj[f]) || "";
    if (before !== after) {
      const isImage = typeof after === "string" && after.startsWith("data:image");
      changes.push({ field: f, label: labels[f] || f, from: isImage ? (before ? "(previous file)" : "") : before, to: isImage ? (after ? "(new file uploaded)" : "") : after });
    }
  });
  return changes;
}

function PeopleManage({ staffMap, allProfiles, myUid, categories, locations, departments, designations, onCreateStaff, onSetRole, onToggleCategoryAccess, onToggleActive, onSetLocation, onToggleRemote, onSetLeaveAllotment, onSendResetLink, onFixEmail, onAddDepartment, onRenameDepartment, onRemoveDepartment, onAddDesignation, onRenameDesignation, onRemoveDesignation }) {
  const [newStaffName, setNewStaffName] = useState("");
  const [newStaffEmail, setNewStaffEmail] = useState("");
  const [newStaffPin, setNewStaffPin] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [staffSearch, setStaffSearch] = useState("");
  const [showInactive, setShowInactive] = useState(false);
  const [newDept, setNewDept] = useState("");
  const [newDesig, setNewDesig] = useState("");

  const deptUsage = (name) => Object.values(allProfiles || {}).filter((p) => p.department === name).length;
  const desigUsage = (name) => Object.values(allProfiles || {}).filter((p) => p.designation === name).length;

  const createStaff = async () => {
    if (!newStaffName.trim() || !newStaffEmail.trim() || newStaffPin.length < 6) {
      setMsg("Fill in name, email, and a PIN of at least 6 characters."); return;
    }
    setBusy(true); setMsg("");
    try {
      await onCreateStaff(newStaffEmail.trim(), newStaffPin, newStaffName.trim());
      setNewStaffName(""); setNewStaffEmail(""); setNewStaffPin("");
      setMsg("Staff login created.");
    } catch (err) {
      setMsg("Could not create login: " + err.message);
    }
    setBusy(false);
  };

  const staffEntries = Object.entries(staffMap).map(([uid, s]) => ({ uid, ...s }));
  const staffQ = staffSearch.trim().toLowerCase();
  const filteredStaff = staffEntries.filter((s) => (s.name || "").toLowerCase().includes(staffQ));
  const activeStaff = filteredStaff.filter((s) => s.active !== false);
  const inactiveStaff = filteredStaff.filter((s) => s.active === false);

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <CollapsibleCard storageKey="departments" title="Departments" subtitle="Shown as a dropdown when an admin sets someone's department in their Profile.">
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <input value={newDept} onChange={(e) => setNewDept(e.target.value)} placeholder="Department name" style={{ ...inputStyle, flex: 1 }}
            onKeyDown={(e) => { if (e.key === "Enter") { onAddDepartment(newDept); setNewDept(""); } }} />

        </div>
        <div style={{ display: "grid", gap: 2 }}>
          {departments.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No departments yet — add one above.</div>}
          {departments.map((d) => {
            const count = deptUsage(d.name);
            return <EditableRow key={d.id} name={d.name} meta={`· ${count} ${count === 1 ? "person" : "people"}`}
              onRename={(n) => onRenameDepartment(d.id, d.name, n)} onRemove={() => onRemoveDepartment(d.id, d.name)} />;
          })}
        </div>
      </CollapsibleCard>

      <CollapsibleCard storageKey="designations" title="Designations" subtitle="Job titles shown as a dropdown when an admin sets someone's designation in their Profile.">
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <input value={newDesig} onChange={(e) => setNewDesig(e.target.value)} placeholder="Designation name" style={{ ...inputStyle, flex: 1 }}
            onKeyDown={(e) => { if (e.key === "Enter") { onAddDesignation(newDesig); setNewDesig(""); } }} />
          <button onClick={() => { onAddDesignation(newDesig); setNewDesig(""); }} style={ghostBtn}>Add</button>
        </div>
        <div style={{ display: "grid", gap: 2 }}>
          {designations.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No designations yet — add one above.</div>}
          {designations.map((d) => {
            const count = desigUsage(d.name);
            return <EditableRow key={d.id} name={d.name} meta={`· ${count} ${count === 1 ? "person" : "people"}`}
              onRename={(n) => onRenameDesignation(d.id, d.name, n)} onRemove={() => onRemoveDesignation(d.id, d.name)} />;
          })}
        </div>
      </CollapsibleCard>

      <CollapsibleCard storageKey="createStaff" title="Create a staff login">
        <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 12 }}>Use a real email this person can actually check — needed for password resets and for them to ever change their own User ID later.</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Name"><input value={newStaffName} onChange={(e) => setNewStaffName(e.target.value)} style={inputStyle} /></Field>
          <Field label="User ID"><input value={newStaffEmail} onChange={(e) => setNewStaffEmail(e.target.value)} placeholder="name@mypower.com" style={inputStyle} /></Field>
          <Field label="PIN (6+ chars)"><input value={newStaffPin} onChange={(e) => setNewStaffPin(e.target.value)} style={inputStyle} /></Field>
          <button onClick={createStaff} disabled={busy} style={{ ...ghostBtn, height: 42 }}>{busy ? "Creating…" : "Create"}</button>
        </div>
        {msg && <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 10 }}>{msg}</div>}
      </CollapsibleCard>

      <CollapsibleCard storageKey="staffPermissions" title="Staff & permissions"
        subtitle='User ID and internal record ID are shown under each name — tap either to copy. "Send reset link" emails that person a link to set a new PIN themselves. Super Admin sees everything, including Categories/Tags and Locations settings. Admin sees Company Overview but only the categories checked below — useful for keeping things like Salary visible to just a few people. Location and remote check-in control what Attendance expects from each person. Personal profile details now live in their own Profile section, not here. Firebase never reveals a saved PIN to anyone, admin included — if someone forgot theirs, send a reset link, or recreate their login below with a new PIN.'>
        {staffEntries.length > 6 && (
          <input value={staffSearch} onChange={(e) => setStaffSearch(e.target.value)} placeholder="Search staff…" style={{ ...inputStyle, marginBottom: 10, fontSize: 13 }} />
        )}
        <div style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>Active ({activeStaff.length})</div>
        <div style={{ display: "grid", marginBottom: inactiveStaff.length > 0 ? 14 : 0 }}>
          {activeStaff.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13, padding: "6px 0" }}>No active staff match.</div>}

        </div>
        {inactiveStaff.length > 0 && (
          <div>
            <button onClick={() => setShowInactive((v) => !v)} style={{ ...ghostBtn, fontSize: 11.5, marginBottom: 6 }}>
              {showInactive ? "▾" : "▸"} Inactive ({inactiveStaff.length})
            </button>
            {showInactive && <div style={{ display: "grid" }}>{inactiveStaff.map((s) => <StaffRow key={s.uid} s={s} myUid={myUid} categories={categories} locations={locations} onSetRole={onSetRole} onToggleCategoryAccess={onToggleCategoryAccess} onToggleActive={onToggleActive} onSetLocation={onSetLocation} onToggleRemote={onToggleRemote} onSetLeaveAllotment={onSetLeaveAllotment} onSendResetLink={onSendResetLink} onFixEmail={onFixEmail} />)}</div>}
          </div>
        )}
      </CollapsibleCard>
    </div>
  );
}

                  style={{ width: "100%", padding: 13, borderRadius: 8, border: "none", background: "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: 14, cursor: attBusy ? "default" : "pointer" }}>
                  {attBusy ? "Getting your location…" : "Check in"}
                </button>
                <button onClick={() => setRequesting(true)} style={{ ...ghostBtn, marginTop: 8, width: "100%", fontSize: 12 }}>Trouble checking in? Request check-in instead</button>
              </div>
            ) : (
              <div style={{ display: "grid", gap: 8 }}>
                <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Note (e.g. GPS not working)" style={inputStyle} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { onRequestCheckIn(note); setRequesting(false); setNote(""); }} disabled={attBusy} style={{ ...ghostBtn, flex: 1 }}>{attBusy ? "Sending…" : "Send request"}</button>
                  <button onClick={() => setRequesting(false)} style={ghostBtn}>Cancel</button>
                </div>
              </div>
            )}

        )}

        {today && today.status === "awaiting_checkin" && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Check-in request sent</div>
            {today.requestNote && <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginBottom: 8, fontStyle: "italic" }}>"{today.requestNote}"</div>}
            <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 10 }}>Waiting for an admin to check you in.</div>
            <button onClick={onCancelRequest} style={ghostBtn}>Withdraw request</button>

        {today && today.checkInTime && !today.checkOutTime && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4, gap: 8, flexWrap: "wrap" }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>Checked in at {fmtTimeLabel(today.checkInTime)}</div>
              <StatusBadge status={today.status} metaMap={ATT_STATUS_META} />
            </div>
            {today.checkedInBy && today.checkedInBy !== "self" && <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginBottom: 6 }}>Checked in by {today.checkedInBy}</div>}
            <MapLink lat={today.geoLat} lng={today.geoLng} label="View my check-in location" />
            <label style={{ fontSize: 12.5, display: "flex", alignItems: "center", gap: 6, margin: "10px 0" }}>
              <input type="checkbox" checked={halfDayToggle} onChange={(e) => setHalfDayToggle(e.target.checked)} /> Leaving early — mark half day
            </label>
            <button onClick={() => onCheckOut(halfDayToggle)} disabled={attBusy} style={{ ...ghostBtn, width: "100%" }}>{attBusy ? "Checking out…" : "Check out"}</button>
          </div>
        )}

        {today && today.checkInTime && today.checkOutTime && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>{fmtTimeLabel(today.checkInTime)} – {fmtTimeLabel(today.checkOutTime)}</div>
            <StatusBadge status={today.status} metaMap={ATT_STATUS_META} />

      <Card style={{ maxWidth: 480 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Recent history</div>
        <div style={{ display: "grid", gap: 8 }}>
          {myAttendance.length === 0 && <div style={{ fontSize: 13, color: "var(--ink-soft)" }}>No attendance recorded yet.</div>}

            <div key={a.date} style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "10px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 13.5, fontWeight: 600 }}>{fmtDate(a.date, dateFormat)}</div>
                <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>
                  {a.checkInTime ? `${fmtTimeLabel(a.checkInTime)}${a.checkOutTime ? " – " + fmtTimeLabel(a.checkOutTime) : ""}` : "No check-in time"}
                </div>

              </div>
              <StatusBadge status={a.status} metaMap={ATT_STATUS_META} />
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function LeaveTab({ me, myLeaveRequests, dateFormat, onSubmit, onWithdraw, busy }) {
  const [type, setType] = useState("sick");
  const [fromDate, setFromDate] = useState(todayStr());
  const [toDate, setToDate] = useState(todayStr());
  const [halfDay, setHalfDay] = useState(false);
  const [note, setNote] = useState("");

  const allotted = (me.leaveAllotted && me.leaveAllotted[type]) || 0;
  const usedForType = (t) => myLeaveRequests.filter((r) => r.type === t && r.status === "Approved").reduce((sum, r) => sum + (r.days || 0), 0);
  const days = countLeaveDays(fromDate, toDate, halfDay);

  const submit = () => {
    if (days <= 0) return;
    onSubmit({ type, fromDate, toDate, halfDay, days, note: note.trim() });
    setNote(""); setHalfDay(false);
  };

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <Card style={{ maxWidth: 480 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600, marginBottom: 14 }}>Request leave</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
          {LEAVE_TYPES.map((lt) => (
            <button key={lt.id} onClick={() => setType(lt.id)} style={{
              padding: "6px 13px", borderRadius: 999, fontSize: 12, fontWeight: 600, cursor: "pointer",
              border: "1.5px solid " + (type === lt.id ? "var(--brand-yellow)" : "var(--line)"),
              background: type === lt.id ? "var(--brand-yellow)" : "var(--card)", color: "var(--ink)",
            }}>{lt.label}</button>
          ))}
        </div>
        <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 14 }}>
          Balance: <b style={{ color: "var(--approved)" }}>{Math.max(allotted - usedForType(type), 0)}</b> of {allotted} days left this year
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Field label="From"><input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={inputStyle} /></Field>
          <Field label="To"><input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={inputStyle} /></Field>
        </div>
        {fromDate === toDate && (
          <label style={{ fontSize: 12.5, display: "flex", alignItems: "center", gap: 6, margin: "10px 0" }}>
            <input type="checkbox" checked={halfDay} onChange={(e) => setHalfDay(e.target.checked)} /> Half day
          </label>
        )}
        <Field label="Note (optional)"><textarea value={note} onChange={(e) => setNote(e.target.value)} rows={2} style={{ ...inputStyle, resize: "vertical" }} /></Field>
        <div style={{ fontSize: 12, color: "var(--ink-soft)", margin: "8px 0" }}>{days > 0 ? `${days} day${days === 1 ? "" : "s"}` : "Pick valid dates"}</div>
        <button onClick={submit} disabled={busy || days <= 0} style={{ width: "100%", padding: 13, borderRadius: 8, border: "none", background: "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: 14, cursor: busy ? "default" : "pointer" }}>
          {busy ? "Submitting…" : "Submit request"}
        </button>
      </Card>

      <Card style={{ maxWidth: 480 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 15, fontWeight: 600, marginBottom: 12 }}>My requests</div>
        <div style={{ display: "grid", gap: 8 }}>
          {myLeaveRequests.length === 0 && <div style={{ fontSize: 13, color: "var(--ink-soft)" }}>No leave requested yet.</div>}
          {myLeaveRequests.map((r) => (
            <div key={r.id} style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <div style={{ fontSize: 13.5, fontWeight: 600 }}>{leaveLabel(r.type)}</div>
                <StatusBadge status={r.status} />
              </div>
              <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>
                {fmtDate(r.fromDate, dateFormat)}{r.fromDate !== r.toDate ? " – " + fmtDate(r.toDate, dateFormat) : ""} · {r.days} day{r.days === 1 ? "" : "s"}
              </div>
              {r.note && <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 4, fontStyle: "italic" }}>"{r.note}"</div>}
              {r.status === "Rejected" && r.reviewNote && <div style={{ fontSize: 11.5, color: "var(--rejected)", marginTop: 4 }}>Admin note: {r.reviewNote}</div>}
              {r.status === "Pending" && <button onClick={() => onWithdraw(r.id)} style={{ ...ghostBtn, marginTop: 8, fontSize: 11.5, padding: "5px 10px" }}>Withdraw</button>}
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ---------- Attendance Analysis: dynamic staff-wise / status-wise / time-period
// filters and charts over existing attendance records. Note: this reports on
// records that exist in the attendance node — it doesn't retroactively compute
// "no record at all" absences across a date range, since that needs a defined
// working-days calendar per location (a bigger, separate feature).
function AttendanceAnalysis({ allAttendance, staffMap, locations, dateFormat }) {
  const [staffFilter, setStaffFilter] = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [locFilter, setLocFilter] = useState("All");
  const [fromDate, setFromDate] = useState("");
  const [toDate, setToDate] = useState("");
  const [view, setView] = useState("table");

  const staffNameList = useMemo(() => Object.values(staffMap).map((s) => s.name).filter(Boolean), [staffMap]);
  const locName = (id) => (locations.find((l) => l.id === id) || {}).name || "—";

  const filtered = useMemo(() => allAttendance.filter((a) => {
    const s = staffMap[a.staffUid] || {};
    return (staffFilter === "All" || s.name === staffFilter) &&
      (statusFilter === "All" || a.status === statusFilter) &&
      (locFilter === "All" || a.locationId === locFilter) &&
      (!fromDate || a.date >= fromDate) && (!toDate || a.date <= toDate);
  }).sort((a, b) => b.date.localeCompare(a.date)), [allAttendance, staffMap, staffFilter, statusFilter, locFilter, fromDate, toDate]);

  const totals = useMemo(() => {
    const t = { total: 0, present: 0, late: 0, half_day: 0, on_leave: 0, awaiting_checkin: 0 };
    filtered.forEach((a) => { t.total++; if (t[a.status] != null) t[a.status]++; });
    return t;
  }, [filtered]);

  const byStaff = useMemo(() => {
    const m = {}; filtered.forEach((a) => { const n = (staffMap[a.staffUid] || {}).name || a.staffUid; m[n] = (m[n] || 0) + 1; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filtered, staffMap]);

  const byStatus = useMemo(() => {
    const m = {}; filtered.forEach((a) => { const label = (ATT_STATUS_META[a.status] || {}).label || a.status; m[label] = (m[label] || 0) + 1; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filtered]);

  const byLocation = useMemo(() => {
    const m = {}; filtered.forEach((a) => { const n = a.locationId ? locName(a.locationId) : "No location"; m[n] = (m[n] || 0) + 1; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filtered, locations]);

  const byMonth = useMemo(() => {
    const m = {}; filtered.forEach((a) => { const k = monthKey(a.date); m[k] = (m[k] || 0) + 1; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => a.name.localeCompare(b.name));
  }, [filtered]);

  const exportCSV = () => {
    const header = ["Date", "Staff", "Status", "Check-in", "Check-out", "Location", "Method", "Note"];
    const lines = [header.join(",")];
    filtered.forEach((a) => {
      const s = staffMap[a.staffUid] || {};
      const cells = [a.date, s.name || a.staffUid, (ATT_STATUS_META[a.status] || {}).label || a.status, fmtTimeLabel(a.checkInTime), fmtTimeLabel(a.checkOutTime), a.locationId ? locName(a.locationId) : "", a.method || "", a.note || ""]
        .map((c) => `"${String(c ?? "").replace(/"/g, '""')}"`);
      lines.push(cells.join(","));
    });
    const blob = new Blob([lines.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a2 = document.createElement("a");
    a2.href = url; a2.download = `mypower_attendance_${todayStr()}.csv`;
    document.body.appendChild(a2); a2.click(); a2.remove(); URL.revokeObjectURL(url);
  };

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        <StatCard label="Total records" value={totals.total} format={fmtCount} />
        <StatCard label="Present" value={totals.present} accent="var(--approved)" format={fmtCount} />
        <StatCard label="Late" value={totals.late} accent="var(--pending)" format={fmtCount} />
        <StatCard label="Half day" value={totals.half_day} accent="var(--paid)" format={fmtCount} />
        <StatCard label="On leave" value={totals.on_leave} accent="var(--on-leave)" format={fmtCount} />
        <StatCard label="Awaiting approval" value={totals.awaiting_checkin} accent="var(--pending)" format={fmtCount} />
      </div>

      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <select value={staffFilter} onChange={(e) => setStaffFilter(e.target.value)} style={smallSelect}>
          <option>All</option>{staffNameList.map((s) => <option key={s}>{s}</option>)}
        </select>
        <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} style={smallSelect}>
          <option value="All">All</option>{Object.entries(ATT_STATUS_META).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={locFilter} onChange={(e) => setLocFilter(e.target.value)} style={smallSelect}>
          <option value="All">All</option>{locations.map((l) => <option key={l.id} value={l.id}>{l.name}</option>)}
        </select>
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>From</span>
        <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>To</span>
        <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        <div style={{ marginLeft: "auto", display: "flex", gap: 6, flexWrap: "wrap" }}>
          {[["table", "Table"], ["staff", "By Staff"], ["status", "By Status"], ["location", "By Location"], ["trend", "Monthly Trend"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)} style={{ ...ghostBtn, background: view === id ? "var(--ink)" : "var(--card)", color: view === id ? "var(--paper)" : "var(--ink)" }}>{label}</button>
          ))}
          <button onClick={exportCSV} style={ghostBtn}>Export CSV</button>
        </div>
      </div>

      {view === "table" && (
        <div style={{ display: "grid", gap: 2 }}>
          {filtered.length === 0 && <Card style={{ color: "var(--ink-soft)" }}>No attendance records match these filters.</Card>}
          {filtered.map((a) => {
            const s = staffMap[a.staffUid] || {};
            return (
              <div key={a.staffUid + a.date} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--line)", gap: 10, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontSize: 13.5, fontWeight: 600 }}>{s.name || a.staffUid} <span style={{ fontWeight: 400, color: "var(--ink-soft)", fontSize: 12 }}>· {fmtDate(a.date, dateFormat)}</span></div>
                  <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>
                    {a.checkInTime ? fmtTimeLabel(a.checkInTime) : "—"}{a.checkOutTime ? " – " + fmtTimeLabel(a.checkOutTime) : ""} · {a.locationId ? locName(a.locationId) : "No location"}
                  </div>
                  {(a.geoLat != null || a.checkOutGeoLat != null) && (
                    <div style={{ marginTop: 2 }}><MapLink lat={a.geoLat} lng={a.geoLng} label="View check-in location" /></div>
                  )}
                </div>
                <StatusBadge status={a.status} metaMap={ATT_STATUS_META} />
              </div>
            );
          })}
        </div>
      )}
      {view === "staff" && <Card><SimpleBarChart data={byStaff} format={fmtCount} /></Card>}
      {view === "status" && <Card><SimpleBarChart data={byStatus} format={fmtCount} /></Card>}
      {view === "location" && <Card><SimpleBarChart data={byLocation} format={fmtCount} /></Card>}
      {view === "trend" && <Card><SimpleTrendChart data={byMonth} format={fmtCount} /></Card>}
    </div>
  );
}

        )}

function buildProfileForm(profile, currentName) {
  const p = profile || {};
  return {
    name: p.name || currentName || "", staffCode: p.staffCode || "", phone: p.phone || "", designation: p.designation || "", joinDate: p.joinDate || "",
    department: p.department || "", employmentType: p.employmentType || "Full-time",
    emergencyName: p.emergencyName || "", emergencyPhone: p.emergencyPhone || "", bloodGroup: p.bloodGroup || "", dob: p.dob || "",
    tempAddress: p.tempAddress || "", permanentAddress: p.permanentAddress || "", photo: p.photo || null,
  };
}
function buildSensitiveForm(sensitive) {
  const s = sensitive || {};
  return {
    bankName: s.bankName || "", branchName: s.branchName || "", bankAccount: s.bankAccount || "", citizenshipNumber: s.citizenshipNumber || "",
    panNumber: s.panNumber || "", citizenshipImage: s.citizenshipImage || null, panImage: s.panImage || null,
  };
}
function readableValue(field, val) {
  if (!val) return "—";
  if (field === "photo" || field === "citizenshipImage" || field === "panImage") return null; // rendered as image instead
  return val;
}
