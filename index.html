function AccountSettings({ currentEmail, onChangeUserId, onChangePin }) {
  const [pin1, setPin1] = useState("");
  const [newUserId, setNewUserId] = useState("");
  const [msg1, setMsg1] = useState("");
  const [busy1, setBusy1] = useState(false);

  const [pin2, setPin2] = useState("");
  const [newPin, setNewPin] = useState("");
  const [msg2, setMsg2] = useState("");
  const [busy2, setBusy2] = useState(false);

  const submitUserId = async () => {
    if (!pin1 || !newUserId.trim()) { setMsg1("Fill in both fields."); return; }
    setBusy1(true); setMsg1("");
    try {
      await onChangeUserId(pin1, newUserId.trim());
      setMsg1(`Verification link sent to ${newUserId.trim()} — click it there to finish the change. Keep using your current User ID until you do.`);
      setPin1(""); setNewUserId("");
    } catch (err) { setMsg1(err.message); }
    setBusy1(false);
  };
  const submitPin = async () => {
    if (!pin2 || newPin.length < 6) { setMsg2("Enter your current PIN and a new PIN of at least 6 characters."); return; }
    setBusy2(true); setMsg2("");
    try {
      await onChangePin(pin2, newPin);
      setMsg2("PIN updated."); setPin2(""); setNewPin("");
    } catch (err) { setMsg2(err.message); }
    setBusy2(false);
  };

  return (
    <Card>
      <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Account & login</div>
      <div style={{ fontSize: 12.5, marginBottom: 4 }}>Current User ID: <span style={{ fontFamily: "'IBM Plex Mono', monospace" }}>{currentEmail}</span></div>
      <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 16 }}>You'll need your current PIN to make either change below. Forgot it entirely? Ask your admin to send you a reset link.</div>
      <div style={{ display: "grid", gap: 20, gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))" }}>
        <div>
          <div style={{ fontSize: 12.5, fontWeight: 600, marginBottom: 8 }}>Change User ID</div>
          <div style={{ display: "grid", gap: 8 }}>
            <Field label="Current PIN"><input type="password" value={pin1} onChange={(e) => setPin1(e.target.value)} style={inputStyle} /></Field>
            <Field label="New User ID"><input type="email" value={newUserId} onChange={(e) => setNewUserId(e.target.value)} placeholder="name@mypower.com" style={inputStyle} /></Field>
            <div style={{ fontSize: 11, color: "var(--ink-soft)" }}>Must be a real address you can check — we'll send a verification link there before the change takes effect.</div>
            <button onClick={submitUserId} disabled={busy1} style={ghostBtn}>{busy1 ? "Sending…" : "Update User ID"}</button>
            {msg1 && <div style={{ fontSize: 12, color: "var(--ink-soft)" }}>{msg1}</div>}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 12.5, fontWeight: 600, marginBottom: 8 }}>Change PIN</div>
          <div style={{ display: "grid", gap: 8 }}>
            <Field label="Current PIN"><input type="password" value={pin2} onChange={(e) => setPin2(e.target.value)} style={inputStyle} /></Field>
            <Field label="New PIN (6+ characters)"><input type="password" value={newPin} onChange={(e) => setNewPin(e.target.value)} style={inputStyle} /></Field>
            <button onClick={submitPin} disabled={busy2} style={ghostBtn}>{busy2 ? "Updating…" : "Update PIN"}</button>
            {msg2 && <div style={{ fontSize: 12, color: "var(--ink-soft)" }}>{msg2}</div>}
          </div>
        </div>
      </div>
    </Card>
  );
}

function MyProfileForm({ profile, sensitive, myName, myEmail, onSaveDraft, onSubmit, onRequestEdit, onCancelRequest, busy }) {
  const status = (profile && profile.status) || "not_started";
  const locked = status === "submitted" || status === "edit_requested";
  const [form, setForm] = useState(() => buildProfileForm(profile, myName));
  const [sensForm, setSensForm] = useState(() => buildSensitiveForm(sensitive));
  const [note, setNote] = useState("");
  const [requesting, setRequesting] = useState(false);
  const [photoBusy, setPhotoBusy] = useState(false);
  const [docBusy, setDocBusy] = useState(null);

  const handlePhoto = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setPhotoBusy(true);
    try { const dataUrl = await resizeImageFile(file, 300, 0.7); setForm((f) => ({ ...f, photo: dataUrl })); } catch (err) {}
    setPhotoBusy(false); e.target.value = "";
  };
  const handleDoc = async (e, imgField) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setDocBusy(imgField);
    try { const dataUrl = await resizeImageFile(file, 900, 0.6); setSensForm((f) => ({ ...f, [imgField]: dataUrl })); } catch (err) {}
    setDocBusy(null); e.target.value = "";
  };

  if (locked) {
    return (
      <div style={{ display: "grid", gap: 20, maxWidth: 620 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600 }}>Your profile</div>
            <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 999, background: "var(--approved)", color: "#fff", textTransform: "uppercase" }}>Submitted</span>
          </div>
          <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 16, fontFamily: "'IBM Plex Mono', monospace" }}>{myEmail}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 16 }}>
            {form.photo ? <img src={form.photo} alt="" style={{ width: 64, height: 64, borderRadius: "50%", objectFit: "cover", border: "1px solid var(--line)" }} /> : <div style={{ width: 64, height: 64, borderRadius: "50%", background: "var(--paper-dark)" }} />}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, fontSize: 13 }}>
            {PROFILE_FIELDS.filter((f) => f !== "photo" && !ADMIN_PROFILE_FIELDS.includes(f)).map((f) => (
              <div key={f} style={f === "tempAddress" || f === "permanentAddress" ? { gridColumn: "1 / -1" } : {}}>
                <div style={{ fontSize: 11, color: "var(--ink-soft)" }}>{PROFILE_LABELS[f]}</div>
                <div>{form[f] || "—"}</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 18 }}>
            {!requesting ? (
              <button onClick={() => setRequesting(true)} style={ghostBtn}>Request to edit</button>
            ) : (
              <div style={{ display: "grid", gap: 8 }}>
                <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Why do you need to make changes?" style={inputStyle} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { onRequestEdit(note); setRequesting(false); setNote(""); }} disabled={busy} style={{ ...ghostBtn, flex: 1 }}>{busy ? "Sending…" : "Send request"}</button>
                  <button onClick={() => setRequesting(false)} style={ghostBtn}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        </Card>
        <AdminSetSummary profile={profile} />
      </div>
    );
  }

  if (status === "edit_requested") {
    return (
      <div style={{ display: "grid", gap: 20, maxWidth: 620 }}>
        <Card>
          <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Edit request sent</div>
          <div style={{ fontSize: 13, color: "var(--ink-soft)", marginBottom: 14 }}>Waiting for an admin to unlock your profile before you can make changes.</div>
          <button onClick={onCancelRequest} style={ghostBtn}>Withdraw request</button>
        </Card>
        <AdminSetSummary profile={profile} />
      </div>
    );
  }

  return (
    <div style={{ display: "grid", gap: 20, maxWidth: 620 }}>
      <Card>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600, marginBottom: 4 }}>Your profile</div>
        <ProfileFieldsForm form={form} setForm={setForm} email={myEmail} onPhoto={handlePhoto} photoBusy={photoBusy} />
      </Card>
      <AdminSetSummary profile={profile} />
      <Card style={{ borderColor: "var(--pending)" }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Documents</div>
        <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 16 }}>Bank and ID details — only Super Admins can see this section, stored separately and more tightly locked than the rest of your profile.</div>
        <SensitiveFieldsForm form={sensForm} setForm={setSensForm} onDoc={handleDoc} docBusy={docBusy} />
      </Card>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => onSaveDraft(form, sensForm)} disabled={busy} style={ghostBtn}>{busy ? "Saving…" : "Save draft"}</button>
        <button onClick={() => onSubmit(form, sensForm)} disabled={busy} style={{ ...ghostBtn, background: "var(--brand-yellow)", fontWeight: 600 }}>{busy ? "Submitting…" : "Submit"}</button>
      </div>
    </div>
  );
}

  if (history.length === 0) return <div style={{ fontSize: 12.5, color: "var(--ink-soft)" }}>No changes recorded yet.</div>;
  return (
    <div style={{ display: "grid", gap: 10 }}>
      {history.map((h) => (

          {h.changes.map((c, i) => <div key={i}>{c.label}: <span style={{ color: "var(--ink-soft)" }}>"{c.from || "—"}"</span> → "{c.to || "—"}"</div>)}
        </div>
      ))}

function ProfileAdminDetail({ uid, s, profile, sensitive, isSuperAdmin, myName, departments, designations, onSave, onSaveSensitive, onApproveEdit, onBack, loadHistory }) {
  const [form, setForm] = useState(() => buildProfileForm(profile, s.name));
  const [sensForm, setSensForm] = useState(() => buildSensitiveForm(sensitive));
  const [photoBusy, setPhotoBusy] = useState(false);
  const [docBusy, setDocBusy] = useState(null);
  const [saving, setSaving] = useState(false);
  const [history, setHistory] = useState(null);
  const [showHistory, setShowHistory] = useState(false);

  const handlePhoto = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setPhotoBusy(true);
    try { const dataUrl = await resizeImageFile(file, 300, 0.7); setForm((f) => ({ ...f, photo: dataUrl })); } catch (err) {}
    setPhotoBusy(false); e.target.value = "";
  };
  const handleDoc = async (e, imgField) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setDocBusy(imgField);
    try { const dataUrl = await resizeImageFile(file, 900, 0.6); setSensForm((f) => ({ ...f, [imgField]: dataUrl })); } catch (err) {}
    setDocBusy(null); e.target.value = "";
  };
  const toggleHistory = async () => {
    if (!showHistory && history === null) setHistory(await loadHistory(uid));
    setShowHistory((v) => !v);
  };

  const status = (profile && profile.status) || "not_started";

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <button onClick={onBack} style={{ ...ghostBtn, width: "fit-content" }}>← Back to staff profiles</button>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600 }}>{s.name}</div>
          {status === "edit_requested" && <button onClick={() => onApproveEdit(uid)} style={{ ...ghostBtn, borderColor: "var(--approved)", color: "var(--approved)" }}>Unlock for editing</button>}
        </div>
        {profile && profile.editRequestNote && status === "edit_requested" && (
          <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginBottom: 12, fontStyle: "italic" }}>Reason: "{profile.editRequestNote}"</div>
        )}
        <div style={{ marginBottom: 18, paddingBottom: 18, borderBottom: "1px solid var(--line)" }}>
          <div style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Employment details — set by admin</div>
          <AdminOnlyFieldsForm form={form} setForm={setForm} departments={departments} designations={designations} />
        </div>
        <ProfileFieldsForm form={form} setForm={setForm} email={s.email} onPhoto={handlePhoto} photoBusy={photoBusy} />
        <button onClick={async () => { setSaving(true); await onSave(uid, form, myName); setSaving(false); }} disabled={saving} style={{ ...ghostBtn, marginTop: 14 }}>{saving ? "Saving…" : "Save changes"}</button>
      </Card>

      {isSuperAdmin ? (
        <Card style={{ borderColor: "var(--pending)" }}>
          <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 4 }}>Sensitive documents</div>
          <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 16 }}>Only visible to Super Admins.</div>
          <SensitiveFieldsForm form={sensForm} setForm={setSensForm} onDoc={handleDoc} docBusy={docBusy} />
          <button onClick={async () => { setSaving(true); await onSaveSensitive(uid, sensForm, myName); setSaving(false); }} disabled={saving} style={{ ...ghostBtn, marginTop: 14 }}>{saving ? "Saving…" : "Save documents"}</button>
        </Card>
      ) : (
        <Card><div style={{ fontSize: 12.5, color: "var(--ink-soft)" }}>Sensitive documents (bank, citizenship, PAN) are visible to Super Admins only.</div></Card>
      )}

      <Card>
        <button onClick={toggleHistory} style={ghostBtn}>{showHistory ? "Hide" : "Show"} change history</button>
        {showHistory && <div style={{ marginTop: 12 }}><ProfileHistoryList history={history} /></div>}
      </Card>
    </div>
  );
}

function StaffProfilesAdmin({ staffMap, profiles, sensitiveMap, departments, designations, isSuperAdmin, myName, onSave, onSaveSensitive, onApproveEdit, loadHistory }) {
  const [openUid, setOpenUid] = useState(null);
  const staffList = Object.entries(staffMap || {}).filter(([, s]) => s.active !== false).map(([uid, s]) => ({ uid, ...s }));

  if (openUid) {
    return (
      <ProfileAdminDetail uid={openUid} s={staffMap[openUid]} profile={profiles[openUid]} sensitive={sensitiveMap[openUid]}
        isSuperAdmin={isSuperAdmin} myName={myName} departments={departments} designations={designations}
        onSave={onSave} onSaveSensitive={onSaveSensitive} onApproveEdit={onApproveEdit}
        onBack={() => setOpenUid(null)} loadHistory={loadHistory} />
    );
  }

  return (
    <Card>
      <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600, marginBottom: 12 }}>Staff profiles</div>
      <div style={{ display: "grid", gap: 2 }}>
        {staffList.map((s) => {
          const p = profiles[s.uid];
          const status = (p && p.status) || "not_started";
          return (
            <div key={s.uid} onClick={() => setOpenUid(s.uid)}
              style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--line)", cursor: "pointer", fontSize: 13.5 }}>
              <span>{s.name}{p && p.designation ? <span style={{ color: "var(--ink-soft)", fontSize: 12 }}> · {p.designation}</span> : ""}</span>
              {status === "submitted" && <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 999, background: "var(--approved)", color: "#fff", textTransform: "uppercase" }}>Submitted</span>}
              {status === "edit_requested" && <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 999, background: "var(--pending)", color: "#fff", textTransform: "uppercase" }}>Edit requested</span>}
              {(status === "not_started" || status === "draft") && <span style={{ fontSize: 11, fontWeight: 600, color: "var(--rejected)" }}>Profile submission pending</span>}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function MainApp({ user }) {
  const isMobile = useIsMobile();
  const [dateFormat, setDateFormat] = useState(() => { try { return localStorage.getItem("mp-date-format") || "AD"; } catch (e) { return "AD"; } });
  const toggleDateFormat = () => setDateFormat((f) => {
    const next = f === "AD" ? "BS" : "AD";
    try { localStorage.setItem("mp-date-format", next); } catch (e) {}
    return next;
  });
  const [staffMap, setStaffMap] = useState(null);
  const [staffSensitiveMap, setStaffSensitiveMap] = useState({});
  const [myProfile, setMyProfile] = useState(null);
  const [mySensitive, setMySensitive] = useState(null);
  const [allProfiles, setAllProfiles] = useState({});
  const [categories, setCategories] = useState([]);
  const [tags, setTags] = useState([]);
  const [myExpenses, setMyExpenses] = useState([]);
  const [allExpenses, setAllExpenses] = useState([]);
  const [locations, setLocations] = useState([]);
  const [departments, setDepartments] = useState([]);
  const [designations, setDesignations] = useState([]);
  const [routers, setRouters] = useState([]);
  const [myAttendance, setMyAttendance] = useState([]);
  const [allAttendance, setAllAttendance] = useState([]);
  const [myLeaveRequests, setMyLeaveRequests] = useState([]);
  const [allLeaveRequests, setAllLeaveRequests] = useState([]);
  const [myAdvances, setMyAdvances] = useState([]);
  const [allAdvances, setAllAdvances] = useState([]);
  const [leaveBusy, setLeaveBusy] = useState(false);
  const [attBusy, setAttBusy] = useState(false);
  const [profileBusy, setProfileBusy] = useState(false);
  const [attError, setAttError] = useState("");
  const [section, setSection] = useState("home");
  const [tab, setTab] = useState("add");
  const [toast, setToast] = useState("");
  const [editingExpense, setEditingExpense] = useState(null);
  const [editReturnTab, setEditReturnTab] = useState("mine");

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };

  useEffect(() => {
    if ((tab !== "add" || section !== "expense") && editingExpense) setEditingExpense(null);
  }, [tab, section]);

  useEffect(() => {
    const ref = db.ref("staff");
    const cb = (snap) => setStaffMap(snap.val() || {});
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, []);

  useEffect(() => {
    const catRef = db.ref("categories"), tagRef = db.ref("tags");
    const c1 = (snap) => setCategories(objToArr(snap.val()));
    const c2 = (snap) => setTags(objToArr(snap.val()));
    catRef.on("value", c1); tagRef.on("value", c2);
    return () => { catRef.off("value", c1); tagRef.off("value", c2); };
  }, []);

  useEffect(() => {
    const ref = db.ref("expenses/" + user.uid);
    const cb = (snap) => setMyExpenses(objToArr(snap.val()));
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  useEffect(() => {
    const locRef = db.ref("locations"), routerRef = db.ref("routers");
    const c1 = (snap) => setLocations(objToArr(snap.val()));
    const c2 = (snap) => setRouters(objToArr(snap.val()));
    locRef.on("value", c1); routerRef.on("value", c2);
    return () => { locRef.off("value", c1); routerRef.off("value", c2); };
  }, []);

  useEffect(() => {
    const depRef = db.ref("departments"), desRef = db.ref("designations");
    const c1 = (snap) => setDepartments(objToArr(snap.val()));
    const c2 = (snap) => setDesignations(objToArr(snap.val()));
    depRef.on("value", c1); desRef.on("value", c2);
    return () => { depRef.off("value", c1); desRef.off("value", c2); };
  }, []);

  useEffect(() => {
    const ref = db.ref("attendance/" + user.uid);
    const cb = (snap) => {
      const arr = objToArr(snap.val()).map((r) => ({ ...r, date: r.id }));
      arr.sort((a, b) => (a.date < b.date ? 1 : -1));
      setMyAttendance(arr);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  useEffect(() => {
    const ref = db.ref("leaveRequests/" + user.uid);
    const cb = (snap) => {
      const arr = objToArr(snap.val());
      arr.sort((a, b) => (a.submittedAt < b.submittedAt ? 1 : -1));
      setMyLeaveRequests(arr);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  useEffect(() => {
    const ref = db.ref("advances/" + user.uid);
    const cb = (snap) => {
      const arr = objToArr(snap.val());
      arr.sort((a, b) => (a.givenAt || "").localeCompare(b.givenAt || ""));
      setMyAdvances(arr);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  const me = staffMap ? staffMap[user.uid] : null;
  const myRole = staffRole(me);
  const isAdmin = myRole === "admin" || myRole === "superadmin";
  const isSuperAdmin = myRole === "superadmin";
  const canAccessExpense = (e) => {
    if (isSuperAdmin) return true;
    const cats = expenseCategories(e);
    if (cats.length === 0) return false;
    return !!(me && me.allowedCategories) && cats.every((c) => me.allowedCategories[safeKey(c)]);
  };

  useEffect(() => {
    if (me && user.email && me.email !== user.email) db.ref("staff/" + user.uid + "/email").set(user.email);
  }, [me && me.email, user.email]);

  useEffect(() => {
    if (!isAdmin) { setAllExpenses([]); return; }
    const ref = db.ref("expenses");
    const cb = (snap) => {
      const all = snap.val() || {};
      const out = [];
      Object.entries(all).forEach(([uid, exps]) => {
        Object.entries(exps || {}).forEach(([id, val]) => out.push({ id, staffUid: uid, ...val }));
      });
      setAllExpenses(out);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  useEffect(() => {
    if (!isAdmin) { setAllAttendance([]); return; }
    const ref = db.ref("attendance");
    const cb = (snap) => {
      const all = snap.val() || {};
      const out = [];
      Object.entries(all).forEach(([uid, days]) => {
        Object.entries(days || {}).forEach(([date, val]) => out.push({ date, staffUid: uid, ...val }));
      });
      setAllAttendance(out);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  useEffect(() => {
    if (!isAdmin) { setAllLeaveRequests([]); return; }
    const ref = db.ref("leaveRequests");
    const cb = (snap) => {
      const all = snap.val() || {};
      const out = [];
      Object.entries(all).forEach(([uid, reqs]) => {
        Object.entries(reqs || {}).forEach(([id, val]) => out.push({ id, staffUid: uid, ...val }));
      });
      out.sort((a, b) => (a.submittedAt < b.submittedAt ? 1 : -1));
      setAllLeaveRequests(out);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  useEffect(() => {
    if (!isAdmin) { setAllAdvances([]); return; }
    const ref = db.ref("advances");
    const cb = (snap) => {
      const all = snap.val() || {};
      const out = [];
      Object.entries(all).forEach(([uid, advs]) => {
        Object.entries(advs || {}).forEach(([id, val]) => out.push({ id, staffUid: uid, ...val }));
      });
      out.sort((a, b) => (a.givenAt || "").localeCompare(b.givenAt || ""));
      setAllAdvances(out);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  useEffect(() => {
    if (!isSuperAdmin) { setStaffSensitiveMap({}); return; }
    const ref = db.ref("staffSensitive");
    const cb = (snap) => setStaffSensitiveMap(snap.val() || {});
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isSuperAdmin]);

  useEffect(() => {
    const ref = db.ref("staffProfile/" + user.uid);
    const cb = (snap) => setMyProfile(snap.val());
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  useEffect(() => {
    const ref = db.ref("staffSensitive/" + user.uid);
    const cb = (snap) => setMySensitive(snap.val());
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  useEffect(() => {
    if (!isAdmin) { setAllProfiles({}); return; }
    const ref = db.ref("staffProfile");
    const cb = (snap) => setAllProfiles(snap.val() || {});
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  if (staffMap === null) return <div style={{ padding: 60, textAlign: "center", color: "var(--ink-soft)" }}>Loading…</div>;
  if (!me) return <NoProfileScreen email={user.email} />;

  const addExpense = async (form) => {
    const cleanItems = form.items.map((it) => ({ tag: it.tag.trim(), category: it.category, qty: Number(it.qty) || 0, unitPrice: Number(it.unitPrice) || 0 })).filter((it) => it.tag && it.category && it.qty > 0 && it.unitPrice > 0);
    const amount = itemsTotal(cleanItems);
    const newRef = db.ref("expenses/" + user.uid).push();
    const yearAD = new Date(form.date).getFullYear();
    let expenseNo = null;
    try {
      const counterTx = await db.ref(`counters/expenseNo/${yearAD}`).transaction((cur) => (cur || 0) + 1);
      if (counterTx.committed && counterTx.snapshot.val() != null) {
        expenseNo = `Exp-${String(counterTx.snapshot.val()).padStart(2, "0")}/${String(yearAD).slice(-2)}`;
      } else {
        console.error("Expense number counter did not commit (check Firebase rules for counters/expenseNo).");
      }
    } catch (err) {
      console.error("Expense number counter failed:", err.message);
    }
    const record = { staffName: me.name, date: form.date, items: cleanItems, amount, paymentMode: form.paymentMode, note: form.note.trim(), status: "Pending", submittedAt: new Date().toISOString(), reviewNote: "" };
    if (expenseNo) record.expenseNo = expenseNo;
    if (form.receipts && form.receipts.length) record.receipts = form.receipts;
    await newRef.set(record);
    const existingTagNames = tags.map((t) => t.name);
    const newTagNames = [...new Set(cleanItems.map((it) => it.tag))].filter((t) => !existingTagNames.includes(t));
    newTagNames.forEach((t) => db.ref("tags").push({ name: t }));
    flash("Expense submitted.");
  };

  const withdraw = async (expenseId) => { await db.ref("expenses/" + user.uid + "/" + expenseId).remove(); flash("Withdrawn and deleted."); };

  const startEditOwn = (expense) => { setEditingExpense({ ...expense, staffUid: user.uid, editKind: "own" }); setEditReturnTab("mine"); setSection("expense"); setTab("add"); };
  const startEditAsAdmin = (expense) => { setEditingExpense({ ...expense, editKind: "admin" }); setEditReturnTab("overview"); setSection("expense"); setTab("add"); };
  const cancelEdit = () => { setEditingExpense(null); setSection("expense"); setTab(editReturnTab); };

  const updateExpense = async (editing, form) => {
    const cleanItems = form.items.map((it) => ({ tag: it.tag.trim(), category: it.category, qty: Number(it.qty) || 0, unitPrice: Number(it.unitPrice) || 0 })).filter((it) => it.tag && it.category && it.qty > 0 && it.unitPrice > 0);
    const amount = itemsTotal(cleanItems);
    const updates = { date: form.date, category: null, items: cleanItems, amount, paymentMode: form.paymentMode, note: form.note.trim(), receipt: null, receipts: (form.receipts && form.receipts.length) ? form.receipts : null };
    if (editing.editKind === "own") {
      updates.status = "Pending";
      updates.submittedAt = new Date().toISOString();
    } else {
      updates.lastEditedBy = me.name;
      updates.lastEditedAt = new Date().toISOString();
    }
    await db.ref(`expenses/${editing.staffUid}/${editing.id}`).update(updates);
    const existingTagNames = tags.map((t) => t.name);
    const newTagNames = [...new Set(cleanItems.map((it) => it.tag))].filter((t) => !existingTagNames.includes(t));
    newTagNames.forEach((t) => db.ref("tags").push({ name: t }));
    flash(editing.editKind === "own" ? "Claim updated and resubmitted for review." : "Transaction updated.");
    setEditingExpense(null);
    setTab(editReturnTab);
  };

  const review = async (staffUid, expenseId, status, note) => {
    const target = allExpenses.find((e) => e.staffUid === staffUid && e.id === expenseId);
    if (target && !canAccessExpense(target)) { flash("You don't have access to this category."); return; }
    const updates = { status, reviewNote: note || "", reviewedBy: me.name };
    if (status !== "Paid") updates.paidFromAdvance = false;
    await db.ref("expenses/" + staffUid + "/" + expenseId).update(updates);
    flash("Marked " + status.toLowerCase() + ".");
  };

  const markExpensePaid = async (staffUid, expenseId, useAdvance) => {
    const target = allExpenses.find((e) => e.staffUid === staffUid && e.id === expenseId);
    if (target && !canAccessExpense(target)) { flash("You don't have access to this category."); return; }
    await db.ref("expenses/" + staffUid + "/" + expenseId).update({ status: "Paid", paidFromAdvance: !!useAdvance, reviewedBy: me.name });
    flash(useAdvance ? "Marked paid — deducted from advance." : "Marked paid.");
  };

  const giveAdvance = async (staffUid, amount, note, date) => {
    const amt = Number(amount) || 0;
    if (!staffUid || amt <= 0) return;
    const newRef = db.ref("advances/" + staffUid).push();
    await newRef.set({ amount: amt, note: (note || "").trim(), date: date || todayStr(), givenBy: me.name, givenAt: new Date().toISOString() });
    flash("Advance recorded.");
  };

  const updateAdvance = async (staffUid, advanceId, updates) => {
    await db.ref("advances/" + staffUid + "/" + advanceId).update({ ...updates, lastEditedBy: me.name, lastEditedAt: new Date().toISOString() });
    flash("Advance entry updated.");
  };

  const deleteAdvance = async (staffUid, advanceId) => {
    await db.ref("advances/" + staffUid + "/" + advanceId).remove();
    flash("Advance entry deleted.");
  };

  const addCategory = (name) => {
    if (!name.trim()) return;
    const maxOrder = categories.reduce((m, c) => Math.max(m, c.order ?? 0), -1);
    db.ref("categories").push({ name: name.trim(), order: maxOrder + 1 });
  };

  const categoryUsageCount = (name) => allExpenses.filter((e) => expenseCategories(e).includes(name)).length;
  const tagUsageCount = (name) => allExpenses.filter((e) => (e.items || []).some((it) => it.tag === name)).length;

  const removeCategory = (id, name) => {
    const count = categoryUsageCount(name);
    if (count > 0) { flash(`Can't delete — ${count} transaction${count === 1 ? "" : "s"} use "${name}".`); return; }
    db.ref("categories/" + id).remove();
  };

  const renameCategory = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    const updates = { [`categories/${id}/name`]: clean };
    const affected = allExpenses.filter((e) => expenseCategories(e).includes(oldName));
    affected.forEach((e) => {
      if (e.items && e.items.some((it) => it.category === oldName)) {
        updates[`expenses/${e.staffUid}/${e.id}/items`] = e.items.map((it) => (it.category === oldName ? { ...it, category: clean } : it));
      }
      if (e.category === oldName) updates[`expenses/${e.staffUid}/${e.id}/category`] = clean;
    });
    const oldKey = safeKey(oldName), newKey = safeKey(clean);
    if (oldKey !== newKey) {
      Object.entries(staffMap || {}).forEach(([uid, s]) => {
        if (s.allowedCategories && s.allowedCategories[oldKey]) {
          updates[`staff/${uid}/allowedCategories/${newKey}`] = true;
          updates[`staff/${uid}/allowedCategories/${oldKey}`] = null;
        }
      });
    }
    await db.ref().update(updates);
    flash(`Renamed to "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const moveCategory = async (id, direction) => {
    const sorted = [...categories].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const idx = sorted.findIndex((c) => c.id === id);
    const swapIdx = direction === "up" ? idx - 1 : idx + 1;
    if (idx < 0 || swapIdx < 0 || swapIdx >= sorted.length) return;
    const a = sorted[idx], b = sorted[swapIdx];
    await db.ref().update({
      [`categories/${a.id}/order`]: b.order ?? swapIdx,
      [`categories/${b.id}/order`]: a.order ?? idx,
    });
  };

  const removeTag = (id, name) => {
    const count = tagUsageCount(name);
    if (count > 0) { flash(`Can't delete — ${count} transaction${count === 1 ? "" : "s"} use "${name}".`); return; }
    db.ref("tags/" + id).remove();
  };

  const renameTag = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    await db.ref("tags/" + id).update({ name: clean });
    const affected = allExpenses.filter((e) => (e.items || []).some((it) => it.tag === oldName));
    if (affected.length > 0) {
      const updates = {};
      affected.forEach((e) => {
        const newItems = e.items.map((it) => (it.tag === oldName ? { ...it, tag: clean } : it));
        updates[`expenses/${e.staffUid}/${e.id}/items`] = newItems;
      });
      await db.ref().update(updates);
    }
    flash(`Renamed to "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const mergeCategory = async (id, fromName, toName) => {
    const clean = toName.trim();
    if (!clean || clean === fromName) return;
    const updates = { [`categories/${id}`]: null };
    const affected = allExpenses.filter((e) => expenseCategories(e).includes(fromName));
    affected.forEach((e) => {
      if (e.items && e.items.some((it) => it.category === fromName)) {
        updates[`expenses/${e.staffUid}/${e.id}/items`] = e.items.map((it) => (it.category === fromName ? { ...it, category: clean } : it));
      }
      if (e.category === fromName) updates[`expenses/${e.staffUid}/${e.id}/category`] = clean;
    });
    const fromKey = safeKey(fromName), toKey = safeKey(clean);
    Object.entries(staffMap || {}).forEach(([uid, s]) => {
      if (s.allowedCategories && s.allowedCategories[fromKey]) {
        updates[`staff/${uid}/allowedCategories/${toKey}`] = true;
        updates[`staff/${uid}/allowedCategories/${fromKey}`] = null;
      }
    });
    await db.ref().update(updates);
    flash(`Merged "${fromName}" into "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const mergeTag = async (id, fromName, toName) => {
    const clean = toName.trim();
    if (!clean || clean === fromName) return;
    const affected = allExpenses.filter((e) => (e.items || []).some((it) => it.tag === fromName));
    if (affected.length > 0) {
      const updates = {};
      affected.forEach((e) => {
        const newItems = e.items.map((it) => (it.tag === fromName ? { ...it, tag: clean } : it));
        updates[`expenses/${e.staffUid}/${e.id}/items`] = newItems;
      });
      await db.ref().update(updates);
    }
    await db.ref("tags/" + id).remove();
    flash(`Merged "${fromName}" into "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const adminDeleteExpense = async (staffUid, expenseId) => {
    const target = allExpenses.find((e) => e.staffUid === staffUid && e.id === expenseId);
    if (target && !canAccessExpense(target)) { flash("You don't have access to this category."); return; }
    await db.ref("expenses/" + staffUid + "/" + expenseId).remove();
    flash("Transaction deleted.");
  };

  const createStaff = async (email, password, displayName) => {
    const secondary = firebase.initializeApp(firebaseConfig, "secondary-" + Date.now());
    try {
      const cred = await secondary.auth().createUserWithEmailAndPassword(email, password);
      const uid = cred.user.uid;
      await db.ref("staff/" + uid).set({ name: displayName, email, role: "staff", active: true });
      await secondary.auth().signOut();
    } finally {
      await secondary.delete();
    }
  };
  const sendResetLink = async (email) => {
    try {
      await auth.sendPasswordResetEmail(email);
      flash("Reset link sent to " + email + ".");
    } catch (err) {
      flash("Couldn't send reset link: " + (err.message || "unknown error"));
    }
  };
  const setStaffEmail = (uid, email) => db.ref("staff/" + uid + "/email").set(email);
  const friendlyAuthError = (err) => {
    const code = err && err.code;
    if (code === "auth/wrong-password") return "That PIN doesn't match your current one.";
    if (code === "auth/invalid-email") return "That doesn't look right — a User ID still needs to be in an email-style format, e.g. name@mypower.com.";
    if (code === "auth/email-already-in-use") return "That User ID is already used by another account.";
    if (code === "auth/weak-password") return "PIN needs to be at least 6 characters.";
    if (code === "auth/requires-recent-login") return "For security, please sign out and back in, then try again.";
    if (code === "auth/operation-not-allowed") return "That email couldn't be verified — double check it's a real, working address.";
    return (err && err.message) || "Something went wrong.";
  };
  // Firebase now requires the new address to be verified before an email change takes
  // effect (a security default, not something we can skip) — this sends a verification
  // link to newUserId and only completes once that's clicked. Our staff/{uid}/email copy
  // is deliberately NOT updated here; it self-corrects via the sync effect below once the
  // real Auth email actually changes, so we never show a "new" address before it's live.
  const changeMyUserId = async (currentPin, newUserId) => {
    const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPin);
    try {
      await user.reauthenticateWithCredential(cred);
      await user.verifyBeforeUpdateEmail(newUserId);
    } catch (err) {
      throw new Error(friendlyAuthError(err));
    }
  };
  const changeMyPin = async (currentPin, newPin) => {
    const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPin);
    try {
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPin);
    } catch (err) {
      throw new Error(friendlyAuthError(err));
    }
  };
  const setRole = (uid, role) => db.ref("staff/" + uid + "/role").set(role);
  const toggleCategoryAccess = (uid, categoryKey, allowed) => {
    if (allowed) db.ref(`staff/${uid}/allowedCategories/${categoryKey}`).set(true);
    else db.ref(`staff/${uid}/allowedCategories/${categoryKey}`).remove();
  };
  const toggleActive = (uid, val) => db.ref("staff/" + uid + "/active").set(val);

  const addLocation = (name, shiftStart, graceMinutes) => {
    const clean = (name || "").trim();
    if (!clean) return;
    db.ref("locations").push({ name: clean, shiftStart: shiftStart || "09:00", graceMinutes: Number(graceMinutes) || 0 });
  };
  const updateLocation = (id, fields) => db.ref("locations/" + id).update(fields);
  const removeLocation = async (id) => {
    const updates = { [`locations/${id}`]: null };
    routers.filter((r) => r.locationId === id).forEach((r) => { updates[`routers/${r.id}`] = null; });
    await db.ref().update(updates);
    flash("Location removed.");
  };
  const addRouter = (locationId, ssid, bssid) => db.ref("routers").push({ locationId, ssid: ssid.trim(), bssid: bssid.trim() });
  const removeRouter = (id) => db.ref("routers/" + id).remove();
  const setStaffLocation = (uid, locationId) => db.ref(`staff/${uid}/locationId`).set(locationId || null);
  const setRemoteAllowed = (uid, val) => db.ref(`staff/${uid}/remoteCheckInAllowed`).set(val);

  const addDepartment = (name) => { const clean = (name || "").trim(); if (!clean) return; db.ref("departments").push({ name: clean }); };
  const renameDepartment = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    const updates = { [`departments/${id}/name`]: clean };
    Object.entries(allProfiles || {}).forEach(([uid, p]) => { if (p.department === oldName) updates[`staffProfile/${uid}/department`] = clean; });
    await db.ref().update(updates);
    flash(`Renamed to "${clean}".`);
  };
  const removeDepartment = async (id, name) => {
    const updates = { [`departments/${id}`]: null };
    Object.entries(allProfiles || {}).forEach(([uid, p]) => { if (p.department === name) updates[`staffProfile/${uid}/department`] = null; });
    await db.ref().update(updates);
    flash("Department removed.");
  };
  const addDesignation = (name) => { const clean = (name || "").trim(); if (!clean) return; db.ref("designations").push({ name: clean }); };
  const renameDesignation = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    const updates = { [`designations/${id}/name`]: clean };
    Object.entries(allProfiles || {}).forEach(([uid, p]) => { if (p.designation === oldName) updates[`staffProfile/${uid}/designation`] = clean; });
    await db.ref().update(updates);
    flash(`Renamed to "${clean}".`);
  };
  const removeDesignation = async (id, name) => {
    const updates = { [`designations/${id}`]: null };
    Object.entries(allProfiles || {}).forEach(([uid, p]) => { if (p.designation === name) updates[`staffProfile/${uid}/designation`] = null; });
    await db.ref().update(updates);
    flash("Designation removed.");
  };
  const saveMyProfileDraft = async (fields, sensFields) => {
    setProfileBusy(true);
    await db.ref("staffProfile/" + user.uid).update({ ...fields, status: "draft" });
    if (fields.name && fields.name.trim() && fields.name.trim() !== me.name) await db.ref("staff/" + user.uid + "/name").set(fields.name.trim());
    await db.ref("staffSensitive/" + user.uid).update(sensFields);
    setProfileBusy(false);
    flash("Draft saved.");
  };
  const submitMyProfile = async (fields, sensFields) => {
    setProfileBusy(true);
    const changes = diffFields(myProfile || {}, fields, PROFILE_FIELDS, PROFILE_LABELS)
      .concat(diffFields(mySensitive || {}, sensFields, SENSITIVE_FIELDS, SENSITIVE_LABELS));
    await db.ref("staffProfile/" + user.uid).update({ ...fields, status: "submitted", submittedAt: new Date().toISOString() });
    if (fields.name && fields.name.trim() && fields.name.trim() !== me.name) await db.ref("staff/" + user.uid + "/name").set(fields.name.trim());
    await db.ref("staffSensitive/" + user.uid).update(sensFields);
    if (changes.length) await db.ref("profileHistory/" + user.uid).push({ timestamp: new Date().toISOString(), changedBy: "self", changes });
    setProfileBusy(false);
    flash("Profile submitted.");
  };
  const requestProfileEdit = async (note) => {
    setProfileBusy(true);
    await db.ref("staffProfile/" + user.uid).update({ status: "edit_requested", editRequestNote: (note || "").trim(), editRequestedAt: new Date().toISOString() });
    setProfileBusy(false);
    flash("Edit request sent.");
  };
  const cancelProfileEditRequest = async () => {
    await db.ref("staffProfile/" + user.uid).update({ status: "submitted" });
    flash("Request withdrawn.");
  };
  const approveProfileEdit = async (uid) => {
    await db.ref("staffProfile/" + uid).update({ status: "draft" });
    flash("Unlocked for editing.");
  };
  const adminSaveProfile = async (uid, fields, changerName) => {
    const changes = diffFields(allProfiles[uid] || {}, fields, PROFILE_FIELDS, PROFILE_LABELS);
    await db.ref("staffProfile/" + uid).update({ ...fields, lastEditedBy: changerName, lastEditedAt: new Date().toISOString() });
    const currentName = staffMap[uid] && staffMap[uid].name;
    if (fields.name && fields.name.trim() && fields.name.trim() !== currentName) await db.ref("staff/" + uid + "/name").set(fields.name.trim());
    if (changes.length) await db.ref("profileHistory/" + uid).push({ timestamp: new Date().toISOString(), changedBy: changerName, changes });
    flash("Profile updated.");
  };
  const adminSaveSensitive = async (uid, fields, changerName) => {
    const changes = diffFields(staffSensitiveMap[uid] || {}, fields, SENSITIVE_FIELDS, SENSITIVE_LABELS);
    await db.ref("staffSensitive/" + uid).update(fields);
    if (changes.length) await db.ref("profileHistory/" + uid).push({ timestamp: new Date().toISOString(), changedBy: changerName, changes });
    flash("Sensitive documents updated.");
  };
  const loadProfileHistory = async (uid) => {
    const snap = await db.ref("profileHistory/" + uid).once("value");
    const val = snap.val() || {};
    return Object.entries(val).map(([id, h]) => ({ id, ...h })).sort((a, b) => (a.timestamp < b.timestamp ? 1 : -1));
  };

  const locationsMap = Object.fromEntries(locations.map((l) => [l.id, l]));

  const checkIn = async () => {
    setAttBusy(true); setAttError("");
    try {
      const geo = await getGeoPosition();
      const now = new Date();
      const dateKey = localDateKey(now);
      const loc = me.locationId ? locationsMap[me.locationId] : null;
      const status = computeAttStatus(localTimeStr(now), loc);
      await db.ref(`attendance/${user.uid}/${dateKey}`).set({
        checkInTime: now.toISOString(), checkOutTime: null, method: "gps_remote",
        geoLat: geo.lat, geoLng: geo.lng, locationId: me.locationId || null, status, checkedInBy: "self",
      });
      flash("Checked in.");
    } catch (err) {
      setAttError(err.message || "Couldn't check in.");
    }
    setAttBusy(false);
  };

  const requestCheckIn = async (note) => {
    setAttBusy(true); setAttError("");
    try {
      let geo = null;
      try { geo = await getGeoPosition(); } catch (e) { /* optional for a request */ }
      const now = new Date();
      const dateKey = localDateKey(now);
      await db.ref(`attendance/${user.uid}/${dateKey}`).set({
        checkInTime: null, checkOutTime: null, method: "admin_manual", status: "awaiting_checkin",
        requestNote: (note || "").trim(), requestedAt: now.toISOString(),
        geoLat: geo ? geo.lat : null, geoLng: geo ? geo.lng : null, locationId: me.locationId || null, checkedInBy: null,
      });
      flash("Check-in request sent.");
    } catch (err) {
      setAttError(err.message || "Couldn't send the request.");
    }
    setAttBusy(false);
  };

  const cancelCheckInRequest = async () => {
    await db.ref(`attendance/${user.uid}/${localDateKey()}`).remove();
    flash("Request withdrawn.");
  };

  const checkOut = async (halfDay) => {
    setAttBusy(true);
    const updates = { checkOutTime: new Date().toISOString() };
    if (halfDay) updates.status = "half_day";
    try {
      const geo = await getGeoPosition();
      updates.checkOutGeoLat = geo.lat;
      updates.checkOutGeoLng = geo.lng;
    } catch (err) { /* don't block checkout if location isn't available */ }
    await db.ref(`attendance/${user.uid}/${localDateKey()}`).update(updates);
    flash(halfDay ? "Checked out — marked half day." : "Checked out.");
    setAttBusy(false);
  };

  const approveCheckInRequest = async (staffUid, dateKey) => {
    const staffRec = staffMap[staffUid];
    const loc = staffRec && staffRec.locationId ? locationsMap[staffRec.locationId] : null;
    const rec = allAttendance.find((a) => a.staffUid === staffUid && a.date === dateKey);
    const checkTime = rec && rec.requestedAt ? new Date(rec.requestedAt) : new Date();
    const status = computeAttStatus(localTimeStr(checkTime), loc);
    await db.ref(`attendance/${staffUid}/${dateKey}`).update({ checkInTime: checkTime.toISOString(), status, checkedInBy: me.name });
    flash("Check-in approved.");
  };
  const rejectCheckInRequest = async (staffUid, dateKey) => {
    await db.ref(`attendance/${staffUid}/${dateKey}`).remove();
    flash("Request rejected.");
  };

  const submitLeaveRequest = async (form) => {
    setLeaveBusy(true);
    try {
      const newRef = db.ref("leaveRequests/" + user.uid).push();
      await newRef.set({
        staffName: me.name, type: form.type, fromDate: form.fromDate, toDate: form.toDate,
        halfDay: !!form.halfDay, days: form.days, note: form.note || "",
        status: "Pending", submittedAt: new Date().toISOString(), reviewNote: "",
      });
      flash("Leave request submitted.");
    } catch (err) {
      flash("Couldn't submit: " + err.message);
    }
    setLeaveBusy(false);
  };

  const withdrawLeaveRequest = async (id) => {
    await db.ref("leaveRequests/" + user.uid + "/" + id).remove();
    flash("Withdrawn.");
  };

  // Approving writes an "on_leave" attendance record for each date in the range —
  // but only where no real check-in already exists, so we never clobber genuine attendance.
  const approveLeaveRequest = async (staffUid, id, note) => {
    const req = allLeaveRequests.find((r) => r.staffUid === staffUid && r.id === id);
    await db.ref(`leaveRequests/${staffUid}/${id}`).update({ status: "Approved", reviewNote: note || "", reviewedBy: me.name, reviewedAt: new Date().toISOString() });
    if (req) {
      const dates = dateRangeArray(req.fromDate, req.toDate);
      for (const dk of dates) {
        const snap = await db.ref(`attendance/${staffUid}/${dk}`).once("value");
        const existing = snap.val();
        if (!existing || !existing.checkInTime) {
          await db.ref(`attendance/${staffUid}/${dk}`).set({
            status: "on_leave", method: "leave", leaveType: req.type, leaveRequestId: id,
            checkInTime: null, checkOutTime: null,
          });
        }
      }
    }
    flash("Leave approved.");
  };

  const rejectLeaveRequest = async (staffUid, id, note) => {
    await db.ref(`leaveRequests/${staffUid}/${id}`).update({ status: "Rejected", reviewNote: note || "", reviewedBy: me.name, reviewedAt: new Date().toISOString() });
    flash("Leave rejected.");
  };

  const setLeaveAllotment = (uid, type, value) => db.ref(`staff/${uid}/leaveAllotted/${type}`).set(Number(value) || 0);

  const exportLeaveCSV = (rows) => {
    const header = ["Staff", "Type", "From", "To", "Days", "Status", "Note", "Submitted At", "Review Note"];
    const lines = [header.join(",")];
    rows.forEach((r) => {
      const s = staffMap[r.staffUid] || {};
      const cells = [s.name || r.staffUid, leaveLabel(r.type), r.fromDate, r.toDate, r.days, r.status, r.note, r.submittedAt, r.reviewNote].map((c) => `"${String(c ?? "").replace(/"/g, '""')}"`);
      lines.push(cells.join(","));
    });
    const blob = new Blob([lines.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `mypower_leave_${todayStr()}.csv`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  };

  const exportCSV = (rows) => {
    const header = ["Expense No", "Date", "Staff", "Category", "Items", "Amount", "Payment Mode", "Status", "Note", "Submitted At", "Review Note"];
    const lines = [header.join(",")];
    rows.forEach((e) => {
      const itemsStr = (e.items || []).map((it) => `${it.tag} (${it.category || "—"}) x${it.qty} @${it.unitPrice}=${it.qty * it.unitPrice}`).join("; ");
      const cells = [e.expenseNo || "", e.date, e.staffName || me.name, expenseCategoryLabel(e), itemsStr, e.amount, e.paymentMode, e.status, e.note, e.submittedAt, e.reviewNote].map((c) => `"${String(c ?? "").replace(/"/g, '""')}"`);
      lines.push(cells.join(","));
    });
    const blob = new Blob([lines.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `mypower_expenses_${todayStr()}.csv`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  };

  const sortedCategories = [...categories].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  const visibleCategories = isSuperAdmin ? sortedCategories : sortedCategories.filter((c) => me && me.allowedCategories && me.allowedCategories[safeKey(c.name)]);
  const allowedExpenses = isSuperAdmin ? allExpenses : allExpenses.filter(canAccessExpense);

  const expenseTabs = isSuperAdmin
    ? [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }, { id: "analysis", label: "My Analysis" }, { id: "overview", label: "Company Overview" }, { id: "advances", label: "Advances" }, { id: "ledger", label: "Ledger" }, { id: "expenseSettings", label: "Categories & Tags" }]
    : isAdmin
    ? [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }, { id: "analysis", label: "My Analysis" }, { id: "overview", label: "Company Overview" }, { id: "advances", label: "Advances" }, { id: "ledger", label: "Ledger" }]
    : [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }, { id: "analysis", label: "My Analysis" }, { id: "ledger", label: "My Ledger" }];

  const attendanceTabs = isSuperAdmin
    ? [{ id: "attendance", label: "My Attendance" }, { id: "leave", label: "Leave" }, { id: "team", label: "Team Attendance" }, { id: "teamLeave", label: "Team Leave" }, { id: "attendanceAnalysis", label: "Analysis" }, { id: "attendanceSettings", label: "Locations" }]
    : isAdmin
    ? [{ id: "attendance", label: "My Attendance" }, { id: "leave", label: "Leave" }, { id: "team", label: "Team Attendance" }, { id: "teamLeave", label: "Team Leave" }, { id: "attendanceAnalysis", label: "Analysis" }]
    : [{ id: "attendance", label: "My Attendance" }, { id: "leave", label: "Leave" }];

  const profileTabs = isAdmin
    ? [{ id: "myProfile", label: "My Profile" }, { id: "staffProfiles", label: "Staff Profiles" }]
    : [{ id: "myProfile", label: "My Profile" }];

  const sectionTabs = section === "expense" ? expenseTabs : section === "attendance" ? attendanceTabs : section === "profile" ? profileTabs : [];

  const goHome = () => setSection("home");
  const enterExpense = () => { setSection("expense"); setTab("add"); };
  const enterAttendance = () => { setSection("attendance"); setTab("attendance"); };
  const enterProfile = () => { setSection("profile"); setTab("myProfile"); };
  const enterPeople = () => setSection("people");

  if (section === "home") {
    return (
      <HomeScreen me={me} myProfile={myProfile} isSuperAdmin={isSuperAdmin} isMobile={isMobile}
        onEnterExpense={enterExpense} onEnterAttendance={enterAttendance} onEnterProfile={enterProfile} onEnterPeople={enterPeople}
        onSignOut={() => auth.signOut()} />
    );
  }

  const sectionLabel = section === "expense" ? "Expense" : section === "attendance" ? "Attendance" : section === "profile" ? "Profile" : "Staff & permissions";

  return (
    <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 0 60px" }}>
      <div style={{ padding: isMobile ? "16px 16px 14px" : "22px 28px 18px", borderBottom: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 14, background: "var(--paper-dark)" }}>
        <div onClick={goHome} style={{ cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
          <Logo />
          <div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, letterSpacing: "0.1em", color: "var(--ink-soft)", textTransform: "uppercase" }}>← Home</div>
            <div style={{ fontFamily: "'Lora', serif", fontWeight: 700, fontSize: isMobile ? 20 : 26, marginTop: 1 }}>{sectionLabel}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <div style={{ display: "flex", borderRadius: 8, overflow: "hidden", border: "1px solid var(--line)" }}>
            {["AD", "BS"].map((f) => (
              <button key={f} onClick={() => f !== dateFormat && toggleDateFormat()} style={{
                padding: "6px 10px", fontSize: 11.5, border: "none", cursor: "pointer",
                background: dateFormat === f ? "var(--ink)" : "var(--card)", color: dateFormat === f ? "var(--paper)" : "var(--ink)",
              }}>{f}</button>
            ))}
          </div>
          <span style={{ fontSize: 13, color: "var(--ink-soft)" }}>{me.name}{isSuperAdmin ? " · Super Admin" : isAdmin ? " · Admin" : ""}</span>
          <button onClick={() => auth.signOut()} style={ghostBtn}>Sign out</button>
        </div>
      </div>

      {section !== "people" && (
        <div style={{ display: "flex", gap: 2, padding: "0 16px", borderBottom: "1px solid var(--line)", background: "var(--paper)", overflowX: "auto" }}>
          {sectionTabs.map((it) => (
            <button key={it.id} onClick={() => setTab(it.id)} style={{
              padding: isMobile ? "12px 14px" : "12px 16px", border: "none", background: "transparent", cursor: "pointer", fontSize: isMobile ? 12.5 : 13, fontWeight: 600, whiteSpace: "nowrap",
              color: tab === it.id ? "var(--ink)" : "var(--ink-soft)", borderBottom: tab === it.id ? "2px solid var(--brand-yellow)" : "2px solid transparent", marginBottom: -1,
            }}>{it.label}</button>
          ))}
        </div>
      )}

      <div style={{ padding: isMobile ? "16px 16px" : "20px 28px" }}>
        {section === "expense" && tab === "add" && (
          <AddExpense key={editingExpense ? "edit-" + editingExpense.id : "new"}
            categories={sortedCategories} tags={tags} onSubmit={addExpense} onUpdate={updateExpense}
            editingExpense={editingExpense} onCancelEdit={cancelEdit} isMobile={isMobile} dateFormat={dateFormat} />
        )}
        {section === "expense" && tab === "mine" && <MyExpenses myName={me.name} expenses={myExpenses} myAdvances={myAdvances} onWithdraw={withdraw} onEdit={startEditOwn} onExport={exportCSV} dateFormat={dateFormat} />}
        {section === "expense" && tab === "analysis" && <MyAnalysis expenses={myExpenses} />}
        {section === "expense" && tab === "overview" && isAdmin && (
          <div>
            {!isSuperAdmin && (
              <div style={{ background: "var(--paper-dark)", border: "1px solid var(--line)", borderRadius: 10, padding: "10px 14px", fontSize: 12.5, color: "var(--ink-soft)", marginBottom: 14 }}>
                You have access to {visibleCategories.length} of {sortedCategories.length} categories. Totals, charts, and exports below reflect only what you're permitted to see.
              </div>
            )}
            <Overview expenses={allowedExpenses} staffMap={staffMap} categories={visibleCategories} allAdvances={allAdvances} onReview={review} onMarkPaid={markExpensePaid} onExport={exportCSV} onDelete={adminDeleteExpense} onEdit={startEditAsAdmin} isSuperAdmin={isSuperAdmin} dateFormat={dateFormat} />
          </div>
        )}
        {section === "expense" && tab === "advances" && isAdmin && (
          <AdvancesTab staffMap={staffMap} allAdvances={allAdvances} allExpenses={allExpenses} dateFormat={dateFormat} onGive={giveAdvance} onUpdate={updateAdvance} onDelete={deleteAdvance} />
        )}
        {section === "expense" && tab === "ledger" && isAdmin && (
          <LedgerTab staffMap={staffMap} allAdvances={allAdvances} allExpenses={allExpenses} dateFormat={dateFormat} />
        )}
        {section === "expense" && tab === "ledger" && !isAdmin && (
          <StaffLedger staffName={me.name} advances={myAdvances} expenses={myExpenses} dateFormat={dateFormat} />
        )}
        {section === "expense" && tab === "expenseSettings" && isSuperAdmin && (
          <ExpenseSettings
            categories={sortedCategories} onAddCategory={addCategory} onRemoveCategory={removeCategory} onRenameCategory={renameCategory} onMoveCategory={moveCategory}
            onMergeCategory={mergeCategory} categoryUsageCount={categoryUsageCount}
            tags={tags} onRemoveTag={removeTag} onRenameTag={renameTag} onMergeTag={mergeTag} tagUsageCount={tagUsageCount}
          />
        )}

        {section === "attendance" && tab === "attendance" && (
          <AttendanceTab
            me={me} myAttendance={myAttendance} location={me.locationId ? locationsMap[me.locationId] : null}
            onCheckIn={checkIn} onRequestCheckIn={requestCheckIn} onCancelRequest={cancelCheckInRequest} onCheckOut={checkOut}
            attBusy={attBusy} attError={attError} dateFormat={dateFormat}
          />
        )}
        {section === "attendance" && tab === "leave" && (
          <LeaveTab me={me} myLeaveRequests={myLeaveRequests} dateFormat={dateFormat} onSubmit={submitLeaveRequest} onWithdraw={withdrawLeaveRequest} busy={leaveBusy} />
        )}
        {section === "attendance" && tab === "team" && isAdmin && (
          <TeamAttendance allAttendance={allAttendance} staffMap={staffMap} locations={locations} dateFormat={dateFormat} onApproveRequest={approveCheckInRequest} onRejectRequest={rejectCheckInRequest} />
        )}
        {section === "attendance" && tab === "teamLeave" && isAdmin && (
          <TeamLeave allLeaveRequests={allLeaveRequests} staffMap={staffMap} dateFormat={dateFormat} onApprove={approveLeaveRequest} onReject={rejectLeaveRequest} onExport={exportLeaveCSV} />
        )}
        {section === "attendance" && tab === "attendanceAnalysis" && isAdmin && (
          <AttendanceAnalysis allAttendance={allAttendance} staffMap={staffMap} locations={locations} dateFormat={dateFormat} />
        )}
        {section === "attendance" && tab === "attendanceSettings" && isSuperAdmin && (
          <AttendanceSettings locations={locations} routers={routers} onAddLocation={addLocation} onUpdateLocation={updateLocation} onRemoveLocation={removeLocation} onAddRouter={addRouter} onRemoveRouter={removeRouter} />
        )}

        {section === "profile" && tab === "myProfile" && (
          <div style={{ display: "grid", gap: 20, maxWidth: 620 }}>
            <MyProfileForm profile={myProfile} sensitive={mySensitive} myName={me.name} myEmail={me.email}
              onSaveDraft={saveMyProfileDraft} onSubmit={submitMyProfile} onRequestEdit={requestProfileEdit} onCancelRequest={cancelProfileEditRequest}
              busy={profileBusy} />
            <AccountSettings currentEmail={me.email} onChangeUserId={changeMyUserId} onChangePin={changeMyPin} />
          </div>
        )}
        {section === "profile" && tab === "staffProfiles" && isAdmin && (
          <StaffProfilesAdmin staffMap={staffMap} profiles={allProfiles} sensitiveMap={staffSensitiveMap} isSuperAdmin={isSuperAdmin} myName={me.name}
            departments={departments} designations={designations}
            onSave={adminSaveProfile} onSaveSensitive={adminSaveSensitive} onApproveEdit={approveProfileEdit} loadHistory={loadProfileHistory} />
        )}

        {section === "people" && isSuperAdmin && (
          <PeopleManage
            staffMap={staffMap} allProfiles={allProfiles} myUid={user.uid} categories={sortedCategories} locations={locations}
            departments={departments} designations={designations}
            onCreateStaff={createStaff} onSetRole={setRole} onToggleCategoryAccess={toggleCategoryAccess} onToggleActive={toggleActive}
            onSetLocation={setStaffLocation} onToggleRemote={setRemoteAllowed} onSetLeaveAllotment={setLeaveAllotment}
            onSendResetLink={sendResetLink} onFixEmail={setStaffEmail}
            onAddDepartment={addDepartment} onRenameDepartment={renameDepartment} onRemoveDepartment={removeDepartment}
            onAddDesignation={addDesignation} onRenameDesignation={renameDesignation} onRemoveDesignation={removeDesignation}
          />
        )}
      </div>

      {toast && (
        <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "var(--ink)", color: "var(--paper)", padding: "10px 18px", borderRadius: 8, fontSize: 13, boxShadow: "0 6px 20px rgba(0,0,0,0.25)", zIndex: 50 }}>{toast}</div>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = logged out
  useEffect(() => auth.onAuthStateChanged(setUser), []);

  if (user === undefined) return <div style={{ padding: 60, textAlign: "center", color: "var(--ink-soft)" }}>Loading…</div>;
  if (!user) return <LoginScreen />;
  return <MainApp user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
