function fmtNPR(n) {
  const v = Number(n) || 0;
  return "Rs " + v.toLocaleString("en-IN", { maximumFractionDigits: 0 });
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
function monthKey(d) { return (d || "").slice(0, 7); }

// ---------- Attendance helpers (local device time, not UTC — matters for
// midnight rollover and late-flagging, unlike the UTC-based todayStr above) ----------
function pad2(n) { return String(n).padStart(2, "0"); }
function localDateKey(d) { d = d || new Date(); return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
function localTimeStr(d) { d = d || new Date(); return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
function fmtTimeLabel(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  let h = d.getHours(); const m = pad2(d.getMinutes()); const ap = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${m} ${ap}`;
}
function computeAttStatus(timeStr, location) {
  if (!location || !location.shiftStart) return "present";
  const [inH, inM] = timeStr.split(":").map(Number);
  const [shH, shM] = location.shiftStart.split(":").map(Number);
  const inMinutes = inH * 60 + inM;
  const cutoff = shH * 60 + shM + (Number(location.graceMinutes) || 0);
  return inMinutes > cutoff ? "late" : "present";
}
function getGeoPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject(new Error("Location isn't available on this device or browser.")); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      (err) => reject(new Error(err.message || "Couldn't get your location — check location permission.")),
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  });
}
function itemsTotal(items) {
  return (items || []).reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.unitPrice) || 0), 0);
}
function objToArr(obj) {
  return Object.entries(obj || {}).map(([id, val]) => (typeof val === "string" ? { id, name: val } : { id, ...val }));
}

// ---------- Roles & category permissions ----------
// Three tiers: "staff" (default), "admin" (limited — can be restricted to specific
// categories in Company Overview), "superadmin" (full access, incl. the Manage tab).
// Legacy accounts that predate this system (isAdmin: true, no role field) are treated
// as superadmin so nobody loses access when this ships.
function staffRole(s) {
  if (!s) return "staff";
  if (s.role === "staff" || s.role === "admin" || s.role === "superadmin") return s.role;
  return s.isAdmin ? "superadmin" : "staff";
}
// Category names can contain characters that aren't valid as Realtime Database key
// segments (e.g. "Shipping/courier"). This sanitizes a name into a safe map key,
// used consistently for reading/writing allowedCategories both here and in the
// security rules. Avoid using ".", "#", "$", "[", "]" more than once in a single
// category name — it's a rare edge case but the sanitizer only swaps the first hit
// of each in the security-rule version (the app-side version below handles all of them).
function safeKey(name) {
  return String(name || "").replace(/[.#$\[\]\/]/g, "_");
}

// ---------- Date formatting (AD / Bikram Sambat) ----------
function fmtDateAD(isoStr) {
  if (!isoStr) return "";
  const d = new Date(isoStr + "T00:00:00");
  if (isNaN(d)) return isoStr;
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}
function fmtDateBS(isoStr) {
  if (!isoStr) return "";
  try {
    const NDClass = (typeof NepaliDate !== "undefined" && NepaliDate && NepaliDate.default) ? NepaliDate.default : null;
    if (!NDClass) return fmtDateAD(isoStr) + " (BS unavailable)";
    const jsDate = new Date(isoStr + "T00:00:00");
    if (isNaN(jsDate)) return isoStr;
    const nd = new NDClass(jsDate);
    return nd.format("DD MMMM YYYY");
  } catch (e) {
    return fmtDateAD(isoStr) + " (BS unavailable)";
  }
}
function fmtDate(isoStr, format) { return format === "BS" ? fmtDateBS(isoStr) : fmtDateAD(isoStr); }

// ---------- Image compression (receipt photos, stored inline — no paid Storage plan needed) ----------
function resizeImageFile(file, maxWidth = 900, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Could not read image"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}

function useIsMobile() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 640);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 640);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isMobile;
}

// Collapsible section card — remembers open/closed per section in localStorage,
// so it stays as the admin left it even after a page refresh.
function CollapsibleCard({ storageKey, title, subtitle, children }) {
  const [open, setOpen] = useState(() => {
    try {
      const saved = localStorage.getItem("mp-manage-" + storageKey);
      return saved === null ? true : saved === "1";
    } catch (e) { return true; }
  });

  const toggle = () => setOpen((o) => {
    const next = !o;
    try { localStorage.setItem("mp-manage-" + storageKey, next ? "1" : "0"); } catch (e) {}
    return next;
  });

  return (
    <Card>
      <div onClick={toggle} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", userSelect: "none" }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600 }}>{title}</div>
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>{open ? "▾ Collapse" : "▸ Expand"}</span>
      </div>
      {open && (
        <div style={{ marginTop: 12 }}>
          {subtitle && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 12, marginTop: -4 }}>{subtitle}</div>}
          {children}
        </div>
      )}
    </Card>
  );
}

// Simple dependency-free horizontal bar chart with permanent value labels
function SimpleBarChart({ data }) {
  if (!data || data.length === 0) return <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>Nothing to show yet.</div>;
  const max = Math.max(...data.map((d) => d.value), 1);
  return (
    <div style={{ display: "grid", gap: 10 }}>
      {data.map((d, i) => (
        <div key={d.name} style={{ display: "grid", gridTemplateColumns: "140px 1fr auto", gap: 10, alignItems: "center" }}>
          <div style={{ fontSize: 12.5, color: "var(--ink-soft)", textAlign: "right" }}>{d.name}</div>
          <div style={{ background: "var(--paper-dark)", borderRadius: 6, height: 20, overflow: "hidden" }}>
            <div style={{ width: `${(d.value / max) * 100}%`, height: "100%", background: BAR_COLORS[i % BAR_COLORS.length], borderRadius: 6 }} />
          </div>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12.5, minWidth: 80 }}>{fmtNPR(d.value)}</div>
        </div>
      ))}
    </div>
  );
}

  if (!data || data.length === 0) return <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>Nothing to show yet.</div>;
  const max = Math.max(...data.map((d) => d.value), 1);

          <div style={{ fontSize: 11, color: "var(--ink-soft)" }}>{d.name}</div>
        </div>

}

// ---------- Login ----------
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    setError(""); setBusy(true);
    auth.signInWithEmailAndPassword(email.trim(), password)
      .catch((err) => { setError("Login failed — check your email and PIN with your admin."); setBusy(false); });
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <Card style={{ maxWidth: 380, width: "100%" }}>
        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: "0.18em", color: "var(--ink-soft)", textTransform: "uppercase" }}>MY POWER</div>
        <div style={{ fontFamily: "'Lora', serif", fontWeight: 700, fontSize: 24, marginTop: 2, marginBottom: 20 }}>Expense Ledger</div>
        <form onSubmit={submit} style={{ display: "grid", gap: 14 }}>
          <Field label="Email">
            <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} style={inputStyle} placeholder="you@mypower.com" />
          </Field>
          <Field label="PIN / password">
            <input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} style={inputStyle} />
          </Field>
          {error && <div style={{ fontSize: 12.5, color: "var(--rejected)" }}>{error}</div>}
          <button type="submit" disabled={busy} style={{
            marginTop: 4, padding: "11px 18px", borderRadius: 8, border: "none",
            background: "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: 14, cursor: busy ? "wait" : "pointer",
          }}>{busy ? "Signing in…" : "Sign in"}</button>
        </form>
      </Card>
    </div>
  );
}

// ---------- Add Expense ----------
// Search-first tag picker: type to filter existing tags, tap one to use it,
// or add a brand-new tag if nothing matches. Replaces the old native <datalist>.
function TagPicker({ value, onChange, tags, placeholder, fieldStyle }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    const onDocClick = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, []);

  const q = (value || "").trim().toLowerCase();
  const matches = q
    ? tags.filter((t) => t.name.toLowerCase().includes(q)).sort((a, b) => a.name.toLowerCase().indexOf(q) - b.name.toLowerCase().indexOf(q))
    : tags;
  const exactMatch = tags.some((t) => t.name.toLowerCase() === q);
  const showList = open && (matches.length > 0 || (q && !exactMatch));

  const pick = (name) => { onChange(name); setOpen(false); };

  return (
    <div ref={wrapRef} style={{ position: "relative" }}>
      <input
        value={value}
        onChange={(e) => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        placeholder={placeholder}
        autoComplete="off"
        style={fieldStyle}
      />
      {showList && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, marginTop: 4, zIndex: 30,
          background: "var(--card)", border: "1px solid var(--line)", borderRadius: 8,
          maxHeight: 200, overflowY: "auto", boxShadow: "0 6px 16px rgba(0,0,0,0.15)",
        }}>
          {matches.slice(0, 30).map((t) => (
            <div key={t.id} onMouseDown={() => pick(t.name)}
              style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "var(--paper-dark)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}>
              {t.name}
            </div>
          ))}
          {q && !exactMatch && (
            <div onMouseDown={() => pick(value.trim())}
              style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer", color: "var(--ink-soft)", borderTop: matches.length ? "1px solid var(--line)" : "none" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "var(--paper-dark)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}>
              + Add "{value.trim()}" as a new tag
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Type-to-filter category picker. Unlike TagPicker, selection is restricted to
// the existing category list — no free-text "add new" fallback, since categories
// are admin-managed only.
function CategoryPicker({ value, onChange, categories, placeholder }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const wrapRef = useRef(null);

  useEffect(() => {
    const onDocClick = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) { setOpen(false); setQuery(""); } };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, []);

  const q = query.trim().toLowerCase();
  const matches = q ? categories.filter((c) => c.name.toLowerCase().includes(q)) : categories;

  const pick = (name) => { onChange(name); setQuery(""); setOpen(false); };

  return (
    <div ref={wrapRef} style={{ position: "relative" }}>
      <input
        value={open ? query : (value || "")}
        onChange={(e) => { setQuery(e.target.value); setOpen(true); }}
        onFocus={(e) => { setOpen(true); setQuery(""); }}
        placeholder={placeholder}
        autoComplete="off"
        style={inputStyle}
      />
      {open && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, marginTop: 4, zIndex: 30,
          background: "var(--card)", border: "1px solid var(--line)", borderRadius: 8,
          maxHeight: 220, overflowY: "auto", boxShadow: "0 6px 16px rgba(0,0,0,0.15)",
        }}>
          {matches.length === 0 && <div style={{ padding: "8px 12px", fontSize: 13, color: "var(--ink-soft)" }}>No matching category</div>}
          {matches.map((c) => (
            <div key={c.id} onMouseDown={() => pick(c.name)}
              style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer", fontWeight: c.name === value ? 600 : 400, background: c.name === value ? "var(--paper-dark)" : "transparent" }}
              onMouseEnter={(e) => { e.currentTarget.style.background = "var(--paper-dark)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = c.name === value ? "var(--paper-dark)" : "transparent"; }}>
              {c.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AddExpense({ categories, tags, onSubmit, onUpdate, editingExpense, onCancelEdit, isMobile, dateFormat }) {
  const emptyItem = () => ({ id: Math.random().toString(36).slice(2), tag: "", qty: 1, unitPrice: "" });
  const buildForm = () => {
    if (editingExpense) {
      return {
        date: editingExpense.date || todayStr(),
        category: editingExpense.category || categories[0]?.name || "",
        paymentMode: editingExpense.paymentMode || PAYMENT_MODES[0],
        note: editingExpense.note || "",
        items: editingExpense.items && editingExpense.items.length > 0
          ? editingExpense.items.map((it) => ({ id: Math.random().toString(36).slice(2), tag: it.tag, qty: it.qty, unitPrice: it.unitPrice }))
          : [emptyItem()],
        receipt: editingExpense.receipt || null,
      };
    }
    return { date: todayStr(), category: categories[0]?.name || "", paymentMode: PAYMENT_MODES[0], note: "", items: [emptyItem()], receipt: null };
  };
  const [form, setForm] = useState(buildForm);
  const [submitting, setSubmitting] = useState(false);
  const [compressing, setCompressing] = useState(false);
  const [fileError, setFileError] = useState("");

  useEffect(() => {
    if (!form.category && categories[0]) setForm((f) => ({ ...f, category: categories[0].name }));
  }, [categories]);

  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const updateItem = (id, field, value) => setForm((f) => ({ ...f, items: f.items.map((it) => (it.id === id ? { ...it, [field]: value } : it)) }));
  const addItemRow = () => setForm((f) => ({ ...f, items: [...f.items, emptyItem()] }));
  const removeItemRow = (id) => setForm((f) => ({ ...f, items: f.items.length > 1 ? f.items.filter((it) => it.id !== id) : f.items }));

  const handleReceiptFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setFileError(""); setCompressing(true);
    try {
      const dataUrl = await resizeImageFile(file);
      setForm((f) => ({ ...f, receipt: dataUrl }));
    } catch (err) {
      setFileError("Could not process that photo — try a different one.");
    }
    setCompressing(false);
    e.target.value = "";
  };
  const removeReceipt = () => setForm((f) => ({ ...f, receipt: null }));

  const total = itemsTotal(form.items);
  const hasValidRow = form.items.some((it) => it.tag.trim() && Number(it.qty) > 0 && Number(it.unitPrice) > 0);
  const canSubmit = hasValidRow && total > 0;
  let blockReason = !hasValidRow ? "Add at least one item with a quantity and a unit price above zero." : "";

  const submit = async (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setSubmitting(true);
    if (editingExpense) {
      await onUpdate(editingExpense, form);
    } else {
      await onSubmit(form);
      setForm({ date: todayStr(), category: categories[0]?.name || "", paymentMode: PAYMENT_MODES[0], note: "", items: [emptyItem()], receipt: null });
    }
    setSubmitting(false);
  };

  return (
    <Card style={{ maxWidth: 660, padding: isMobile ? 16 : 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, gap: 10, flexWrap: "wrap" }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600 }}>
          {editingExpense ? (editingExpense.editKind === "own" ? "Edit & resubmit claim" : "Edit transaction") : "Log a new expense"}
        </div>
        {editingExpense && <button type="button" onClick={onCancelEdit} style={{ ...ghostBtn, fontSize: 12 }}>Cancel</button>}
      </div>
      <form onSubmit={submit} style={{ display: "grid", gap: 14 }}>
        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
          <Field label="Date">
            <input type="date" value={form.date} onChange={set("date")} required style={inputStyle} />
            {dateFormat === "BS" && form.date && (
              <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>≈ {fmtDateBS(form.date)}</div>
            )}
          </Field>
          <Field label="Category">
            <CategoryPicker value={form.category} onChange={(v) => setForm((f) => ({ ...f, category: v }))} categories={categories} placeholder="Type to search categories…" />
          </Field>
        </div>

        <Field label="Items">
          {isMobile ? (
            <div style={{ display: "grid", gap: 10 }}>
              {form.items.map((it) => {
                const subtotal = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
                return (
                  <div key={it.id} style={{ border: "1px solid var(--line)", borderRadius: 10, padding: 10, display: "grid", gap: 8, background: "var(--paper)" }}>
                    <div style={{ display: "flex", gap: 8 }}>
                      <div style={{ flex: 1 }}>
                        <TagPicker value={it.tag} onChange={(v) => updateItem(it.id, "tag", v)} tags={tags}
                          placeholder="Tea, Taxi, Pen…" fieldStyle={{ ...inputStyle, fontSize: 14 }} />
                      </div>
                      <button type="button" onClick={() => removeItemRow(it.id)} disabled={form.items.length === 1}
                        style={{ border: "none", background: "none", cursor: form.items.length === 1 ? "not-allowed" : "pointer",
                          color: form.items.length === 1 ? "var(--line)" : "var(--rejected)", fontSize: 22, lineHeight: 1, padding: "0 4px" }}>×</button>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                      <div>
                        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Qty</div>
                        <input type="number" min="0" step="1" value={it.qty} onChange={(e) => updateItem(it.id, "qty", e.target.value)}
                          style={{ ...inputStyle, padding: "8px 9px", fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
                      </div>
                      <div>
                        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Unit price</div>
                        <input type="number" min="0" step="0.01" value={it.unitPrice} onChange={(e) => updateItem(it.id, "unitPrice", e.target.value)}
                          placeholder="0" style={{ ...inputStyle, padding: "8px 9px", fontSize: 14, fontFamily: "'IBM Plex Mono', monospace" }} />
                      </div>
                      <div>
                        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 3 }}>Subtotal</div>
                        <div style={{ padding: "8px 0", fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, color: "var(--ink-soft)" }}>
                          {subtotal > 0 ? fmtNPR(subtotal) : "—"}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div style={{ display: "grid", gap: 8 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 70px 90px 90px 28px", gap: 6, fontSize: 11, color: "var(--ink-soft)", padding: "0 2px" }}>
                <span>Item / tag</span><span>Qty</span><span>Unit price</span><span>Subtotal</span><span></span>
              </div>
              {form.items.map((it) => {
                const subtotal = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
                return (
                  <div key={it.id} style={{ display: "grid", gridTemplateColumns: "1fr 70px 90px 90px 28px", gap: 6, alignItems: "center" }}>
                    <TagPicker value={it.tag} onChange={(v) => updateItem(it.id, "tag", v)} tags={tags}
                      placeholder="Tea, Taxi, Pen…" fieldStyle={{ ...inputStyle, padding: "7px 9px", fontSize: 13 }} />
                    <input type="number" min="0" step="1" value={it.qty} onChange={(e) => updateItem(it.id, "qty", e.target.value)}
                      style={{ ...inputStyle, padding: "7px 9px", fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <input type="number" min="0" step="0.01" value={it.unitPrice} onChange={(e) => updateItem(it.id, "unitPrice", e.target.value)}
                      placeholder="0" style={{ ...inputStyle, padding: "7px 9px", fontSize: 13, fontFamily: "'IBM Plex Mono', monospace" }} />
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: "var(--ink-soft)", textAlign: "right", paddingRight: 4 }}>
                      {subtotal > 0 ? fmtNPR(subtotal) : "—"}
                    </div>
                    <button type="button" onClick={() => removeItemRow(it.id)} disabled={form.items.length === 1}
                      style={{ border: "none", background: "none", cursor: form.items.length === 1 ? "not-allowed" : "pointer",
                        color: form.items.length === 1 ? "var(--line)" : "var(--rejected)", fontSize: 18, lineHeight: 1 }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
          <button type="button" onClick={addItemRow} style={{ ...ghostBtn, marginTop: 8, alignSelf: "start", width: isMobile ? "100%" : "auto" }}>+ Add item</button>
        </Field>

        <Field label="Receipt / bill photo (optional)" plain>
          {!form.receipt ? (
            <div>
              <input type="file" accept="image/*" capture="environment" onChange={handleReceiptFile} disabled={compressing}
                style={{ fontSize: 13 }} />
              {compressing && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 4 }}>Compressing photo…</div>}
              {fileError && <div style={{ fontSize: 12, color: "var(--rejected)", marginTop: 4 }}>{fileError}</div>}
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <img src={form.receipt} alt="Receipt preview" style={{ width: 60, height: 60, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" }} />
              <button type="button" onClick={removeReceipt} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 12 }}>Remove photo</button>
            </div>
          )}
        </Field>

        <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 10, borderTop: "1px solid var(--line)", paddingTop: 10 }}>
          <span style={{ fontSize: 13, color: "var(--ink-soft)", fontWeight: 600 }}>Total</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 20, fontWeight: 600 }}>{fmtNPR(total)}</span>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 14 }}>
          <Field label="Payment mode">
            <select value={form.paymentMode} onChange={set("paymentMode")} style={inputStyle}>
              {PAYMENT_MODES.map((p) => <option key={p} value={p}>{p}</option>)}
            </select>
          </Field>
          <Field label="Note / purpose">
            <input value={form.note} onChange={set("note")} placeholder="Optional context" style={inputStyle} />
          </Field>
        </div>

        {blockReason && !submitting && (
          <div style={{ fontSize: 12.5, color: "var(--pending)", background: "#FFF3DE", border: "1px solid var(--pending)", borderRadius: 8, padding: "8px 12px" }}>{blockReason}</div>
        )}

        <button type="submit" disabled={!canSubmit || submitting || compressing} style={{
          marginTop: 4, padding: isMobile ? "14px 18px" : "11px 18px", borderRadius: 8, border: "none",
          background: (!canSubmit || submitting || compressing) ? "#ddd3ba" : "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: isMobile ? 15 : 14,
          cursor: (!canSubmit || submitting || compressing) ? "not-allowed" : "pointer",
        }}>{submitting ? "Saving…" : editingExpense ? `Save changes — ${fmtNPR(total)}` : `Submit claim — ${fmtNPR(total)}`}</button>
      </form>
    </Card>
  );
}

// ---------- My Expenses ----------
function MyExpenses({ myName, expenses, onWithdraw, onEdit, onExport, dateFormat }) {
  const [lightboxSrc, setLightboxSrc] = useState(null);
  const [fromDate, setFromDate] = useState("");
  const [toDate, setToDate] = useState("");
  const [confirmWithdrawId, setConfirmWithdrawId] = useState(null);
  const filtered = useMemo(() => expenses.filter((e) => (!fromDate || e.date >= fromDate) && (!toDate || e.date <= toDate))
    .sort((a, b) => (b.submittedAt || "").localeCompare(a.submittedAt || "")), [expenses, fromDate, toDate]);

  const totals = useMemo(() => {
    const t = { claimed: 0, approved: 0, pending: 0, paid: 0 };
    filtered.forEach((e) => {
      t.claimed += e.amount;
      if (e.status === "Approved") t.approved += e.amount;
      if (e.status === "Pending") t.pending += e.amount;
      if (e.status === "Paid") t.paid += e.amount;
    });
    return t;
  }, [filtered]);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
        <StatCard label="Total claimed" value={totals.claimed} />
        <StatCard label="Approved" value={totals.approved} accent="var(--approved)" />
        <StatCard label="Pending" value={totals.pending} accent="var(--pending)" />
        <StatCard label="Paid out" value={totals.paid} accent="var(--paid)" />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 17, fontWeight: 600 }}>{myName}'s claims</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>From</span>
          <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
          <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>To</span>
          <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
          {(fromDate || toDate) && <button onClick={() => { setFromDate(""); setToDate(""); }} style={{ ...ghostBtn, padding: "7px 10px", fontSize: 11.5 }}>Clear</button>}
          <button onClick={() => onExport(filtered)} style={ghostBtn}>Export CSV</button>
        </div>
      </div>
      {filtered.length === 0 ? (
        <Card style={{ color: "var(--ink-soft)" }}>{expenses.length === 0 ? 'No expenses logged yet.' : "No expenses in this date range."}</Card>
      ) : (
        <div style={{ display: "grid", gap: 10 }}>
          {filtered.map((e) => (
            <div key={e.id} style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                {e.receipt && (
                  <button onClick={() => setLightboxSrc(e.receipt)} style={{ border: "none", background: "none", padding: 0, cursor: "pointer" }}>
                    <img src={e.receipt} alt="Receipt" style={{ width: 44, height: 44, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" }} />
                  </button>
                )}
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{e.category}</div>
                  <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 2 }}>{fmtDate(e.date, dateFormat)} · {e.paymentMode}{e.note ? ` · ${e.note}` : ""}</div>
                  {e.items && e.items.length > 0 && (
                    <div style={{ marginTop: 6, display: "grid", gap: 2 }}>
                      {e.items.map((it, i) => (
                        <div key={i} style={{ fontSize: 12, color: "var(--ink-soft)", fontFamily: "'IBM Plex Mono', monospace" }}>
                          {it.tag} ×{it.qty} @ {fmtNPR(it.unitPrice)} = {fmtNPR(it.qty * it.unitPrice)}
                        </div>
                      ))}
                    </div>
                  )}
                  {e.reviewNote && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 4, fontStyle: "italic" }}>Reviewer note: {e.reviewNote}</div>}
                  {e.lastEditedBy && <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 4, fontStyle: "italic" }}>Edited by {e.lastEditedBy} on {fmtDate((e.lastEditedAt || "").slice(0, 10), dateFormat)}</div>}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15 }}>{fmtNPR(e.amount)}</div>
                <StatusBadge status={e.status} />
                {(e.status === "Pending" || e.status === "Rejected") && confirmWithdrawId !== e.id && (
                  <button onClick={() => onEdit(e)} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5 }}>{e.status === "Rejected" ? "Edit & resubmit" : "Edit"}</button>
                )}
                {e.status === "Pending" && (
                  confirmWithdrawId === e.id ? (
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      <span style={{ fontSize: 11.5, color: "var(--rejected)" }}>Delete this claim for good?</span>
                      <button onClick={() => { onWithdraw(e.id); setConfirmWithdrawId(null); }} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Yes, withdraw</button>
                      <button onClick={() => setConfirmWithdrawId(null)} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5 }}>Cancel</button>
                    </div>
                  ) : (
                    <button onClick={() => setConfirmWithdrawId(e.id)} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5 }}>Withdraw</button>
                  )
                )}
              </div>
            </div>
          ))}
        </div>
      )}
      <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />
    </div>
  );
}

// ---------- My Analysis (available to every staff member, own data only) ----------
function MyAnalysis({ expenses }) {
  const [fromDate, setFromDate] = useState("");
  const [toDate, setToDate] = useState("");
  const [view, setView] = useState("category");

  const filtered = useMemo(() => expenses.filter((e) => (!fromDate || e.date >= fromDate) && (!toDate || e.date <= toDate)), [expenses, fromDate, toDate]);

  const byCategory = useMemo(() => {
    const m = {}; filtered.forEach((e) => { m[e.category] = (m[e.category] || 0) + e.amount; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filtered]);

  const byTag = useMemo(() => {
    const m = {};
    filtered.forEach((e) => (e.items || []).forEach((it) => { const amt = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0); m[it.tag] = (m[it.tag] || 0) + amt; }));
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [filtered]);

  const byMonth = useMemo(() => {
    const m = {}; filtered.forEach((e) => { const k = monthKey(e.date); m[k] = (m[k] || 0) + e.amount; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => a.name.localeCompare(b.name));
  }, [filtered]);

  const total = filtered.reduce((s, e) => s + e.amount, 0);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <StatCard label="Total in view" value={total} />
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>From</span>
        <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>To</span>
        <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        {(fromDate || toDate) && <button onClick={() => { setFromDate(""); setToDate(""); }} style={{ ...ghostBtn, padding: "7px 10px", fontSize: 11.5 }}>Clear</button>}
        <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
          {[["category", "By Category"], ["tag", "By Tag"], ["trend", "Monthly Trend"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)} style={{ ...ghostBtn, background: view === id ? "var(--ink)" : "var(--card)", color: view === id ? "var(--paper)" : "var(--ink)" }}>{label}</button>
          ))}
        </div>
      </div>
      {view === "category" && <Card><SimpleBarChart data={byCategory} /></Card>}
      {view === "tag" && <Card><SimpleBarChart data={byTag} /></Card>}
      {view === "trend" && <Card><SimpleTrendChart data={byMonth} /></Card>}
    </div>
  );
}

      </div>

      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
        <select value={staffFilter} onChange={(e) => setStaffFilter(e.target.value)} style={smallSelect}>
          <option>All</option>{staffNameList.map((s) => <option key={s}>{s}</option>)}
        </select>
        <select value={catFilter} onChange={(e) => setCatFilter(e.target.value)} style={smallSelect}>
          <option>All</option>{categories.map((c) => <option key={c.id}>{c.name}</option>)}
        </select>
        <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} style={smallSelect}>
          <option>All</option>{Object.keys(STATUS_META).map((s) => <option key={s}>{s}</option>)}
        </select>
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>From</span>
        <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>To</span>
        <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={{ ...smallSelect, padding: "7px 9px" }} />
        <div style={{ marginLeft: "auto", display: "flex", gap: 6, flexWrap: "wrap" }}>
          {[["table", "Table"], ["category", "By Category"], ["tag", "By Tag"], ["staff", "By Staff"], ["trend", "Monthly Trend"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)} style={{ ...ghostBtn, background: view === id ? "var(--ink)" : "var(--card)", color: view === id ? "var(--paper)" : "var(--ink)" }}>{label}</button>
          ))}
          <button onClick={() => onExport(filtered)} style={ghostBtn}>Export CSV</button>
        </div>
      </div>

      {view === "table" && (
        <div style={{ display: "grid", gap: 8 }}>
          {filtered.length === 0 && <Card style={{ color: "var(--ink-soft)" }}>No expenses match these filters.</Card>}
          {filtered.map((e) => (
            <div key={e.id} style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "13px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                {e.receipt && (
                  <button onClick={() => setLightboxSrc(e.receipt)} style={{ border: "none", background: "none", padding: 0, cursor: "pointer" }}>
                    <img src={e.receipt} alt="Receipt" style={{ width: 44, height: 44, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" }} />
                  </button>
                )}
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{e.staffName} <span style={{ color: "var(--ink-soft)", fontWeight: 400 }}>· {e.category}</span></div>
                  <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 2 }}>{fmtDate(e.date, dateFormat)} · {e.paymentMode}{e.note ? ` · ${e.note}` : ""}</div>
                  {e.items && e.items.length > 0 && (
                    <div style={{ marginTop: 6, display: "grid", gap: 2 }}>
                      {e.items.map((it, i) => (
                        <div key={i} style={{ fontSize: 12, color: "var(--ink-soft)", fontFamily: "'IBM Plex Mono', monospace" }}>
                          {it.tag} ×{it.qty} @ {fmtNPR(it.unitPrice)} = {fmtNPR(it.qty * it.unitPrice)}
                        </div>
                      ))}
                    </div>
                  )}
                  {e.status === "Pending" && e.reviewNote && (
                    <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 4, fontStyle: "italic" }}>Previously rejected: {e.reviewNote}</div>
                  )}
                  {e.lastEditedBy && (
                    <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 4, fontStyle: "italic" }}>Edited by {e.lastEditedBy} on {fmtDate((e.lastEditedAt || "").slice(0, 10), dateFormat)}</div>
                  )}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15 }}>{fmtNPR(e.amount)}</div>
                <StatusBadge status={e.status} />
                {e.status === "Pending" && (
                  <>
                    <input placeholder="Note (for reject)" value={reviewNoteDraft[e.id] || ""} onChange={(ev) => setReviewNoteDraft((d) => ({ ...d, [e.id]: ev.target.value }))}
                      style={{ ...inputStyle, width: 140, padding: "6px 8px", fontSize: 12 }} />
                    <button onClick={() => onReview(e.staffUid, e.id, "Approved", reviewNoteDraft[e.id] || "")} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5, borderColor: "var(--approved)", color: "var(--approved)" }}>Approve</button>
                    <button onClick={() => onReview(e.staffUid, e.id, "Rejected", reviewNoteDraft[e.id] || "")} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Reject</button>
                  </>
                )}
                {e.status === "Approved" && <button onClick={() => onReview(e.staffUid, e.id, "Paid", "")} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5, borderColor: "var(--paid)", color: "var(--paid)" }}>Mark paid</button>}
                {isSuperAdmin && ["Pending", "Approved", "Paid"].includes(e.status) && (
                  <button onClick={() => onEdit(e)} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5 }}>Edit</button>
                )}
                <button onClick={() => { if (window.confirm(`Permanently delete this ${fmtNPR(e.amount)} transaction? This cannot be undone.`)) onDelete(e.staffUid, e.id); }}
                  style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Delete</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {view === "category" && <Card><SimpleBarChart data={byCategory} /></Card>}
      {view === "tag" && <Card><SimpleBarChart data={byTag} /></Card>}
      {view === "staff" && <Card><SimpleBarChart data={byStaff} /></Card>}
      {view === "trend" && <Card><SimpleTrendChart data={byMonth} /></Card>}
      <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />
    </div>
  );
}

// ---------- Manage (admin only) ----------
function EditableRow({ name, meta, onRename, onRemove, onMoveUp, onMoveDown, canMoveUp, canMoveDown, mergeOptions, onMerge }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(name);
  const [merging, setMerging] = useState(false);
  const [target, setTarget] = useState("");
  const [confirmingRemove, setConfirmingRemove] = useState(false);

  const save = () => {
    if (draft.trim() && draft.trim() !== name) onRename(draft.trim());
    setEditing(false);
  };

  const confirmMerge = () => {
    if (!target) return;
    onMerge(target);
    setMerging(false); setTarget("");
  };

  return (
    <div style={{ padding: "6px 0", borderBottom: "1px solid var(--line)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5, gap: 8 }}>
        {editing ? (
          <input autoFocus value={draft} onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") save(); if (e.key === "Escape") { setDraft(name); setEditing(false); } }}
            onBlur={save} style={{ ...inputStyle, padding: "5px 8px", fontSize: 13, flex: 1 }} />
        ) : (
          <span style={{ flex: 1 }}>{name}{meta && <span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 6 }}>{meta}</span>}</span>
        )}
        <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
          {onMoveUp && <button onClick={onMoveUp} disabled={!canMoveUp} style={{ ...ghostBtn, padding: "3px 8px", fontSize: 11, opacity: canMoveUp ? 1 : 0.35 }}>↑</button>}
          {onMoveDown && <button onClick={onMoveDown} disabled={!canMoveDown} style={{ ...ghostBtn, padding: "3px 8px", fontSize: 11, opacity: canMoveDown ? 1 : 0.35 }}>↓</button>}
          {!editing && <button onClick={() => { setDraft(name); setEditing(true); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11 }}>Edit</button>}
          {mergeOptions && mergeOptions.length > 0 && <button onClick={() => { setMerging((v) => !v); setConfirmingRemove(false); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11 }}>Merge</button>}
          <button onClick={() => { setConfirmingRemove((v) => !v); setMerging(false); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Remove</button>
        </div>
      </div>
      {confirmingRemove && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11.5, color: "var(--rejected)" }}>Delete "{name}"? This can't be undone.</span>
          <button onClick={() => { onRemove(); setConfirmingRemove(false); }} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Yes, delete</button>
          <button onClick={() => setConfirmingRemove(false)} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Cancel</button>
        </div>
      )}
      {merging && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>Merge "{name}" into:</span>
          <select value={target} onChange={(e) => setTarget(e.target.value)} style={{ ...smallSelect, flex: 1, minWidth: 120 }}>
            <option value="">Choose…</option>
            {mergeOptions.map((n) => <option key={n} value={n}>{n}</option>)}
          </select>
          <button onClick={confirmMerge} disabled={!target} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Confirm</button>
          <button onClick={() => setMerging(false)} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Cancel</button>
        </div>
      )}
    </div>
  );
}

function LocationRow({ loc, routers, onUpdate, onRemove, onAddRouter, onRemoveRouter }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({ name: loc.name, shiftStart: loc.shiftStart || "09:00", graceMinutes: loc.graceMinutes ?? 0 });
  const [confirmingRemove, setConfirmingRemove] = useState(false);
  const [newSsid, setNewSsid] = useState("");
  const [newBssid, setNewBssid] = useState("");
  const myRouters = routers.filter((r) => r.locationId === loc.id);

  const save = () => {
    if (draft.name.trim()) onUpdate(loc.id, { name: draft.name.trim(), shiftStart: draft.shiftStart, graceMinutes: Number(draft.graceMinutes) || 0 });
    setEditing(false);
  };

  return (
    <div style={{ padding: "8px 0", borderBottom: "1px solid var(--line)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5, gap: 8, flexWrap: "wrap" }}>
        {editing ? (
          <div style={{ display: "flex", gap: 6, flex: 1, flexWrap: "wrap" }}>
            <input autoFocus value={draft.name} onChange={(e) => setDraft((d) => ({ ...d, name: e.target.value }))}
              placeholder="Location name" style={{ ...inputStyle, padding: "5px 8px", fontSize: 13, flex: 1, minWidth: 100 }} />
            <input type="time" value={draft.shiftStart} onChange={(e) => setDraft((d) => ({ ...d, shiftStart: e.target.value }))}
              style={{ ...inputStyle, padding: "5px 8px", fontSize: 13, width: 100 }} />
            <input type="number" min="0" value={draft.graceMinutes} onChange={(e) => setDraft((d) => ({ ...d, graceMinutes: e.target.value }))}
              placeholder="Grace min" style={{ ...inputStyle, padding: "5px 8px", fontSize: 13, width: 80 }} />
          </div>
        ) : (
          <span style={{ flex: 1 }}>
            {loc.name}
            <span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 6 }}>· shift {loc.shiftStart || "09:00"} · {loc.graceMinutes ?? 0} min grace</span>
          </span>
        )}
        <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
          {editing ? (
            <button onClick={save} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11 }}>Save</button>
          ) : (
            <button onClick={() => { setDraft({ name: loc.name, shiftStart: loc.shiftStart || "09:00", graceMinutes: loc.graceMinutes ?? 0 }); setEditing(true); }} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11 }}>Edit</button>
          )}
          <button onClick={() => setConfirmingRemove((v) => !v)} style={{ ...ghostBtn, padding: "4px 8px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Remove</button>
        </div>
      </div>
      {confirmingRemove && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11.5, color: "var(--rejected)" }}>Delete "{loc.name}" and its {myRouters.length} router{myRouters.length === 1 ? "" : "s"}? This can't be undone.</span>
          <button onClick={() => { onRemove(loc.id); setConfirmingRemove(false); }} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Yes, delete</button>
          <button onClick={() => setConfirmingRemove(false)} style={{ ...ghostBtn, padding: "4px 10px", fontSize: 11 }}>Cancel</button>
        </div>
      )}
      <div style={{ marginTop: 8, padding: "8px 10px", background: "var(--paper-dark)", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>Routers ({myRouters.length})</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
          {myRouters.map((r) => (
            <span key={r.id} style={{ fontSize: 11, padding: "4px 9px", borderRadius: 6, background: "var(--card)", border: "1px solid var(--line)", fontFamily: "'IBM Plex Mono', monospace", display: "flex", alignItems: "center", gap: 6 }}>
              {r.ssid} · {r.bssid}
              <span onClick={() => onRemoveRouter(r.id)} style={{ cursor: "pointer", color: "var(--rejected)", fontWeight: 700 }} title="Remove router">×</span>
            </span>
          ))}
          <input value={newSsid} onChange={(e) => setNewSsid(e.target.value)} placeholder="SSID" style={{ ...inputStyle, padding: "5px 8px", fontSize: 11.5, width: 90 }} />
          <input value={newBssid} onChange={(e) => setNewBssid(e.target.value)} placeholder="BSSID (MAC address)" style={{ ...inputStyle, padding: "5px 8px", fontSize: 11.5, width: 150 }} />
          <button onClick={() => { if (newSsid.trim() && newBssid.trim()) { onAddRouter(loc.id, newSsid, newBssid); setNewSsid(""); setNewBssid(""); } }}
            style={{ ...ghostBtn, padding: "5px 10px", fontSize: 11 }}>+ Add router</button>
        </div>
        <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginTop: 6 }}>Manual entry for now — the Android app will get a scan-and-detect option later.</div>
      </div>
    </div>
  );
}

function RoleButtons({ role, onChange, disabled }) {
  const roles = [
    { id: "staff", label: "Staff" },
    { id: "admin", label: "Admin" },
    { id: "superadmin", label: "Super Admin" },
  ];
  return (
    <div style={{ display: "flex", gap: 4 }}>
      {roles.map((r) => (
        <button key={r.id} type="button" disabled={disabled} onClick={() => onChange(r.id)}
          style={{
            ...ghostBtn, padding: "4px 8px", fontSize: 11,
            background: role === r.id ? "var(--ink)" : "var(--card)",
            color: role === r.id ? "var(--paper)" : "var(--ink)",
            opacity: disabled ? 0.4 : 1, cursor: disabled ? "not-allowed" : "pointer",
          }}>
          {r.label}
        </button>
      ))}
    </div>
  );
}

function StaffRow({ s, myUid, categories, locations, onSetRole, onToggleCategoryAccess, onToggleActive, onSetLocation, onToggleRemote }) {
  const [copied, setCopied] = useState("");
  const copy = (text, label) => {
    if (!navigator.clipboard) return;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(label);
      setTimeout(() => setCopied(""), 1500);
    }).catch(() => {});
  };
  const role = staffRole(s);
  const isMe = s.uid === myUid;
  const grantedCount = s.allowedCategories ? Object.keys(s.allowedCategories).length : 0;
  return (
    <div style={{ padding: "8px 0", borderBottom: "1px solid var(--line)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13.5, gap: 10, flexWrap: "wrap" }}>
        <div>
          <div>{s.name} {isMe && <span style={{ fontSize: 11, color: "var(--ink-soft)" }}>(you)</span>}</div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 3, flexWrap: "wrap" }}>
            {s.email ? (
              <span onClick={() => copy(s.email, "email")} title="Click to copy login email"
                style={{ fontSize: 10.5, color: "var(--ink-soft)", fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer" }}>
                {copied === "email" ? "Copied!" : s.email}
              </span>
            ) : (
              <span style={{ fontSize: 10.5, color: "var(--ink-soft)", fontStyle: "italic" }}>email not on record — check Firebase Console</span>
            )}
            <span onClick={() => copy(s.uid, "uid")} title="Click to copy user ID"
              style={{ fontSize: 10.5, color: "var(--ink-soft)", fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer" }}>
              {copied === "uid" ? "Copied!" : `UID: ${s.uid}`}
            </span>
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <RoleButtons role={role} onChange={(r) => onSetRole(s.uid, r)} disabled={isMe} />
          <label style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}>
            <input type="checkbox" checked={s.active !== false} onChange={(e) => onToggleActive(s.uid, e.target.checked)} disabled={isMe} /> Active
          </label>
        </div>
      </div>
      <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap", marginTop: 8 }}>
        <label style={{ fontSize: 11.5, color: "var(--ink-soft)", display: "flex", alignItems: "center", gap: 6 }}>
          Location
          <select value={s.locationId || ""} onChange={(e) => onSetLocation(s.uid, e.target.value)} style={{ ...smallSelect, fontSize: 11.5 }}>
            <option value="">None assigned</option>
            {locations.map((l) => <option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        </label>
        <label style={{ fontSize: 11.5, color: "var(--ink-soft)", display: "flex", alignItems: "center", gap: 4 }}>
          <input type="checkbox" checked={!!s.remoteCheckInAllowed} onChange={(e) => onToggleRemote(s.uid, e.target.checked)} />
          Remote check-in allowed
        </label>
      </div>
      {role === "admin" && (
        <div style={{ marginTop: 8, padding: "8px 10px", background: "var(--paper-dark)", borderRadius: 8 }}>
          <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.04em" }}>
            Categories visible to {s.name} in Company Overview
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {categories.length === 0 && <span style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>No categories yet.</span>}
            {categories.map((c) => {
              const key = safeKey(c.name);
              const checked = !!(s.allowedCategories && s.allowedCategories[key]);
              return (
                <label key={c.id} style={{
                  fontSize: 11.5, display: "flex", alignItems: "center", gap: 4, cursor: "pointer",
                  background: checked ? "var(--card)" : "transparent", border: "1px solid var(--line)", borderRadius: 6, padding: "3px 8px",
                }}>
                  <input type="checkbox" checked={checked} onChange={(e) => onToggleCategoryAccess(s.uid, key, e.target.checked)} />
                  {c.name}
                </label>
              );
            })}
          </div>
          {grantedCount === 0 && (
            <div style={{ fontSize: 11, color: "var(--rejected)", marginTop: 6 }}>No categories granted yet — {s.name} will see nothing in Company Overview until you check some above.</div>
          )}
        </div>
      )}
    </div>
  );
}

function ExpenseSettings({ categories, onAddCategory, onRemoveCategory, onRenameCategory, onMoveCategory, onMergeCategory, categoryUsageCount, tags, onRemoveTag, onRenameTag, onMergeTag, tagUsageCount }) {
  const [newCat, setNewCat] = useState("");
  const [catSearch, setCatSearch] = useState("");
  const [tagSearch, setTagSearch] = useState("");

  const catQ = catSearch.trim().toLowerCase();
  const filteredCategories = categories.filter((c) => c.name.toLowerCase().includes(catQ));

  const tagQ = tagSearch.trim().toLowerCase();
  const tagsWithCount = tags.map((t) => ({ ...t, count: tagUsageCount(t.name) }))
    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
  const filteredTags = tagsWithCount.filter((t) => t.name.toLowerCase().includes(tagQ));

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <CollapsibleCard storageKey="categories" title="Categories"
        subtitle="Use ↑/↓ to reorder — this changes the order shown everywhere. Categories in use by a transaction can't be deleted, only renamed or merged (both update existing transactions).">
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <input value={newCat} onChange={(e) => setNewCat(e.target.value)} placeholder="Category name" style={{ ...inputStyle, width: "auto", flex: 1 }}
            onKeyDown={(e) => { if (e.key === "Enter") { onAddCategory(newCat); setNewCat(""); } }} />
          <button onClick={() => { onAddCategory(newCat); setNewCat(""); }} style={ghostBtn}>Add</button>
        </div>
        {categories.length > 6 && (
          <input value={catSearch} onChange={(e) => setCatSearch(e.target.value)} placeholder="Search categories…" style={{ ...inputStyle, marginBottom: 10, fontSize: 13 }} />
        )}
        <div style={{ display: "grid", gap: 2 }}>
          {categories.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No categories yet — add one above.</div>}
          {categories.length > 0 && filteredCategories.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No categories match "{catSearch}".</div>}
          {filteredCategories.map((c) => {
            const i = categories.findIndex((x) => x.id === c.id);
            const count = categoryUsageCount(c.name);
            return (
              <EditableRow key={c.id} name={c.name}
                meta={`· ${count} use${count === 1 ? "" : "s"}`}
                onRename={(newName) => onRenameCategory(c.id, c.name, newName)}
                onRemove={() => onRemoveCategory(c.id, c.name)}
                onMoveUp={() => onMoveCategory(c.id, "up")} onMoveDown={() => onMoveCategory(c.id, "down")}
                canMoveUp={i > 0} canMoveDown={i < categories.length - 1}
                mergeOptions={categories.filter((x) => x.id !== c.id).map((x) => x.name)}
                onMerge={(target) => onMergeCategory(c.id, c.name, target)} />
            );
          })}
        </div>
      </CollapsibleCard>

      <CollapsibleCard storageKey="tags" title="Tags"
        subtitle="Tags are added automatically when staff type a new item on a claim. Sorted by how often they're used — rarely-used ones near the bottom are worth a look for typos, and can be merged into an existing tag.">
        {tags.length > 6 && (
          <input value={tagSearch} onChange={(e) => setTagSearch(e.target.value)} placeholder="Search tags…" style={{ ...inputStyle, marginBottom: 10, fontSize: 13 }} />
        )}
        <div style={{ display: "grid", gap: 2 }}>
          {tags.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No tags yet — they'll appear here once staff start logging items.</div>}
          {tags.length > 0 && filteredTags.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No tags match "{tagSearch}".</div>}
          {filteredTags.map((t) => (
            <EditableRow key={t.id} name={t.name}
              meta={`· ${t.count} use${t.count === 1 ? "" : "s"}`}
              onRename={(newName) => onRenameTag(t.id, t.name, newName)}
              onRemove={() => onRemoveTag(t.id, t.name)}
              mergeOptions={tags.filter((x) => x.id !== t.id).map((x) => x.name)}
              onMerge={(target) => onMergeTag(t.id, t.name, target)} />
          ))}
        </div>
      </CollapsibleCard>
    </div>
  );
}

function PeopleManage({ staffMap, myUid, categories, locations, onCreateStaff, onSetRole, onToggleCategoryAccess, onToggleActive, onSetLocation, onToggleRemote }) {
  const [newStaffName, setNewStaffName] = useState("");
  const [newStaffEmail, setNewStaffEmail] = useState("");
  const [newStaffPin, setNewStaffPin] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [staffSearch, setStaffSearch] = useState("");
  const [showInactive, setShowInactive] = useState(false);

  const createStaff = async () => {
    if (!newStaffName.trim() || !newStaffEmail.trim() || newStaffPin.length < 6) {
      setMsg("Fill in name, email, and a PIN of at least 6 characters."); return;
    }
    setBusy(true); setMsg("");
    try {
      await onCreateStaff(newStaffEmail.trim(), newStaffPin, newStaffName.trim());
      setNewStaffName(""); setNewStaffEmail(""); setNewStaffPin("");
      setMsg("Staff login created.");
    } catch (err) {
      setMsg("Could not create login: " + err.message);
    }
    setBusy(false);
  };

  const staffEntries = Object.entries(staffMap).map(([uid, s]) => ({ uid, ...s }));
  const staffQ = staffSearch.trim().toLowerCase();
  const filteredStaff = staffEntries.filter((s) => (s.name || "").toLowerCase().includes(staffQ));
  const activeStaff = filteredStaff.filter((s) => s.active !== false);
  const inactiveStaff = filteredStaff.filter((s) => s.active === false);

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <CollapsibleCard storageKey="createStaff" title="Create a staff login">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Name"><input value={newStaffName} onChange={(e) => setNewStaffName(e.target.value)} style={inputStyle} /></Field>
          <Field label="Email"><input value={newStaffEmail} onChange={(e) => setNewStaffEmail(e.target.value)} placeholder="name@mypower.com" style={inputStyle} /></Field>
          <Field label="PIN (6+ chars)"><input value={newStaffPin} onChange={(e) => setNewStaffPin(e.target.value)} style={inputStyle} /></Field>
          <button onClick={createStaff} disabled={busy} style={{ ...ghostBtn, height: 42 }}>{busy ? "Creating…" : "Create"}</button>
        </div>
        {msg && <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginTop: 10 }}>{msg}</div>}
      </CollapsibleCard>

      <CollapsibleCard storageKey="staffPermissions" title="Staff & permissions"
        subtitle='Login email and user ID are shown under each name — tap either to copy. Super Admin sees everything, including Categories/Tags and Locations settings. Admin sees Company Overview but only the categories checked below — useful for keeping things like Salary visible to just a few people. Location and remote check-in control what Attendance expects from each person. Firebase never reveals a saved password to anyone, admin included; if someone&apos;s locked out, use the "Reset password" option in the Firebase Console (Authentication → Users), or recreate their login below with a new PIN.'>
        {staffEntries.length > 6 && (
          <input value={staffSearch} onChange={(e) => setStaffSearch(e.target.value)} placeholder="Search staff…" style={{ ...inputStyle, marginBottom: 10, fontSize: 13 }} />
        )}
        <div style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" }}>Active ({activeStaff.length})</div>
        <div style={{ display: "grid", marginBottom: inactiveStaff.length > 0 ? 14 : 0 }}>
          {activeStaff.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13, padding: "6px 0" }}>No active staff match.</div>}
          {activeStaff.map((s) => <StaffRow key={s.uid} s={s} myUid={myUid} categories={categories} locations={locations} onSetRole={onSetRole} onToggleCategoryAccess={onToggleCategoryAccess} onToggleActive={onToggleActive} onSetLocation={onSetLocation} onToggleRemote={onToggleRemote} />)}
        </div>
        {inactiveStaff.length > 0 && (
          <div>
            <button onClick={() => setShowInactive((v) => !v)} style={{ ...ghostBtn, fontSize: 11.5, marginBottom: 6 }}>
              {showInactive ? "▾" : "▸"} Inactive ({inactiveStaff.length})
            </button>
            {showInactive && <div style={{ display: "grid" }}>{inactiveStaff.map((s) => <StaffRow key={s.uid} s={s} myUid={myUid} categories={categories} locations={locations} onSetRole={onSetRole} onToggleCategoryAccess={onToggleCategoryAccess} onToggleActive={onToggleActive} onSetLocation={onSetLocation} onToggleRemote={onToggleRemote} />)}</div>}
          </div>
        )}
      </CollapsibleCard>
    </div>
  );
}

  return (

                    {a.requestNote && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 2 }}>"{a.requestNote}"</div>}
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => onApproveRequest(a.staffUid, a.date)} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5, borderColor: "var(--approved)", color: "var(--approved)" }}>Approve</button>
                    <button onClick={() => onRejectRequest(a.staffUid, a.date)} style={{ ...ghostBtn, padding: "6px 10px", fontSize: 11.5, borderColor: "var(--rejected)", color: "var(--rejected)" }}>Reject</button>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontFamily: "'Lora', serif", fontSize: 16, fontWeight: 600 }}>Team attendance</div>
          <input type="date" value={selDate} onChange={(e) => setSelDate(e.target.value)} style={{ ...inputStyle, width: "auto" }} />
        </div>
        <div style={{ display: "grid", gap: 2 }}>
          {staffList.length === 0 && <div style={{ color: "var(--ink-soft)", fontSize: 13 }}>No active staff.</div>}
          {staffList.map((s) => {
            const rec = dayRecords.find((a) => a.staffUid === s.uid);
            const status = rec ? rec.status : "absent";
            return (
              <div key={s.uid} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid var(--line)", fontSize: 13.5, gap: 8, flexWrap: "wrap" }}>
                <div>
                  <span>{s.name}</span>
                  <span style={{ fontSize: 11, color: "var(--ink-soft)", marginLeft: 6 }}>{locName(s.locationId)}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  {rec && rec.checkInTime && <span style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>{fmtTimeLabel(rec.checkInTime)}{rec.checkOutTime ? " – " + fmtTimeLabel(rec.checkOutTime) : ""}</span>}

function AttendanceTab({ me, myAttendance, location, onCheckIn, onRequestCheckIn, onCancelRequest, onCheckOut, attBusy, attError, dateFormat }) {
  const [note, setNote] = useState("");
  const [requesting, setRequesting] = useState(false);
  const [halfDayToggle, setHalfDayToggle] = useState(false);
  const dateKey = localDateKey();
  const today = myAttendance.find((a) => a.date === dateKey);
  const canSelfCheckIn = !!me.remoteCheckInAllowed;

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <Card style={{ maxWidth: 480 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 18, fontWeight: 600, marginBottom: 2 }}>Attendance</div>
        <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginBottom: 14 }}>{location ? location.name : "No location assigned"}</div>

        {!today && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10 }}>Not checked in yet</div>
            {canSelfCheckIn ? (
              <button onClick={onCheckIn} disabled={attBusy}
                style={{ width: "100%", padding: 13, borderRadius: 8, border: "none", background: "var(--brand-yellow)", color: "var(--ink)", fontWeight: 600, fontSize: 14, cursor: attBusy ? "default" : "pointer" }}>
                {attBusy ? "Getting your location…" : "Check in"}
              </button>
            ) : requesting ? (
              <div style={{ display: "grid", gap: 8 }}>
                <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Note (e.g. WiFi is down)" style={inputStyle} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { onRequestCheckIn(note); setRequesting(false); setNote(""); }} disabled={attBusy} style={{ ...ghostBtn, flex: 1 }}>{attBusy ? "Sending…" : "Send request"}</button>
                  <button onClick={() => setRequesting(false)} style={ghostBtn}>Cancel</button>
                </div>
              </div>
            ) : (
              <button onClick={() => setRequesting(true)} style={ghostBtn}>Request check-in</button>
            )}
            {attError && <div style={{ fontSize: 12, color: "var(--rejected)", marginTop: 8 }}>{attError}</div>}
          </div>
        )}

        {today && today.status === "awaiting_checkin" && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Check-in request sent</div>
            {today.requestNote && <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginBottom: 8, fontStyle: "italic" }}>"{today.requestNote}"</div>}
            <div style={{ fontSize: 12, color: "var(--ink-soft)", marginBottom: 10 }}>Waiting for an admin to check you in.</div>
            <button onClick={onCancelRequest} style={ghostBtn}>Withdraw request</button>
          </div>
        )}

        {today && today.checkInTime && !today.checkOutTime && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4, gap: 8, flexWrap: "wrap" }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>Checked in at {fmtTimeLabel(today.checkInTime)}</div>
              <StatusBadge status={today.status} metaMap={ATT_STATUS_META} />
            </div>
            {today.checkedInBy && today.checkedInBy !== "self" && <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginBottom: 6 }}>Checked in by {today.checkedInBy}</div>}
            <label style={{ fontSize: 12.5, display: "flex", alignItems: "center", gap: 6, margin: "10px 0" }}>
              <input type="checkbox" checked={halfDayToggle} onChange={(e) => setHalfDayToggle(e.target.checked)} /> Leaving early — mark half day
            </label>
            <button onClick={() => onCheckOut(halfDayToggle)} disabled={attBusy} style={{ ...ghostBtn, width: "100%" }}>{attBusy ? "Checking out…" : "Check out"}</button>
          </div>
        )}

        {today && today.checkInTime && today.checkOutTime && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>{fmtTimeLabel(today.checkInTime)} – {fmtTimeLabel(today.checkOutTime)}</div>
            <StatusBadge status={today.status} metaMap={ATT_STATUS_META} />
          </div>
        )}
      </Card>

      <Card style={{ maxWidth: 480 }}>
        <div style={{ fontFamily: "'Lora', serif", fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Recent history</div>
        <div style={{ display: "grid", gap: 8 }}>
          {myAttendance.length === 0 && <div style={{ fontSize: 13, color: "var(--ink-soft)" }}>No attendance recorded yet.</div>}
          {myAttendance.slice(0, 14).map((a) => (
            <div key={a.date} style={{ background: "var(--card)", border: "1px solid var(--line)", borderRadius: 10, padding: "10px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 13.5, fontWeight: 600 }}>{fmtDate(a.date, dateFormat)}</div>
                <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>
                  {a.checkInTime ? `${fmtTimeLabel(a.checkInTime)}${a.checkOutTime ? " – " + fmtTimeLabel(a.checkOutTime) : ""}` : "No check-in time"}
                </div>
              </div>
              <StatusBadge status={a.status} metaMap={ATT_STATUS_META} />
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}
