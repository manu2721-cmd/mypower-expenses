function MainApp({ user }) {
  const isMobile = useIsMobile();
  const [dateFormat, setDateFormat] = useState(() => { try { return localStorage.getItem("mp-date-format") || "AD"; } catch (e) { return "AD"; } });
  const toggleDateFormat = () => setDateFormat((f) => {
    const next = f === "AD" ? "BS" : "AD";
    try { localStorage.setItem("mp-date-format", next); } catch (e) {}
    return next;
  });
  const [staffMap, setStaffMap] = useState(null);
  const [categories, setCategories] = useState([]);
  const [tags, setTags] = useState([]);
  const [myExpenses, setMyExpenses] = useState([]);
  const [allExpenses, setAllExpenses] = useState([]);
  const [locations, setLocations] = useState([]);
  const [routers, setRouters] = useState([]);
  const [myAttendance, setMyAttendance] = useState([]);
  const [allAttendance, setAllAttendance] = useState([]);
  const [attBusy, setAttBusy] = useState(false);
  const [attError, setAttError] = useState("");
  const [section, setSection] = useState("home");
  const [tab, setTab] = useState("add");
  const [toast, setToast] = useState("");
  const [editingExpense, setEditingExpense] = useState(null);
  const [editReturnTab, setEditReturnTab] = useState("mine");

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };

  useEffect(() => {
    if ((tab !== "add" || section !== "expense") && editingExpense) setEditingExpense(null);
  }, [tab, section]);

  useEffect(() => {
    const ref = db.ref("staff");
    const cb = (snap) => setStaffMap(snap.val() || {});
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, []);

  useEffect(() => {
    const catRef = db.ref("categories"), tagRef = db.ref("tags");
    const c1 = (snap) => setCategories(objToArr(snap.val()));
    const c2 = (snap) => setTags(objToArr(snap.val()));
    catRef.on("value", c1); tagRef.on("value", c2);
    return () => { catRef.off("value", c1); tagRef.off("value", c2); };
  }, []);

  useEffect(() => {
    const ref = db.ref("expenses/" + user.uid);
    const cb = (snap) => setMyExpenses(objToArr(snap.val()));
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  useEffect(() => {
    const locRef = db.ref("locations"), routerRef = db.ref("routers");
    const c1 = (snap) => setLocations(objToArr(snap.val()));
    const c2 = (snap) => setRouters(objToArr(snap.val()));
    locRef.on("value", c1); routerRef.on("value", c2);
    return () => { locRef.off("value", c1); routerRef.off("value", c2); };
  }, []);

  useEffect(() => {
    const ref = db.ref("attendance/" + user.uid);
    const cb = (snap) => {
      const arr = objToArr(snap.val()).map((r) => ({ ...r, date: r.id }));
      arr.sort((a, b) => (a.date < b.date ? 1 : -1));
      setMyAttendance(arr);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [user.uid]);

  const me = staffMap ? staffMap[user.uid] : null;
  const myRole = staffRole(me);
  const isAdmin = myRole === "admin" || myRole === "superadmin";
  const isSuperAdmin = myRole === "superadmin";
  const canAccessExpense = (e) => isSuperAdmin || !!(me && me.allowedCategories && me.allowedCategories[safeKey(e.category)]);

  useEffect(() => {
    if (!isAdmin) { setAllExpenses([]); return; }
    const ref = db.ref("expenses");
    const cb = (snap) => {
      const all = snap.val() || {};
      const out = [];
      Object.entries(all).forEach(([uid, exps]) => {
        Object.entries(exps || {}).forEach(([id, val]) => out.push({ id, staffUid: uid, ...val }));
      });
      setAllExpenses(out);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  useEffect(() => {
    if (!isAdmin) { setAllAttendance([]); return; }
    const ref = db.ref("attendance");
    const cb = (snap) => {
      const all = snap.val() || {};
      const out = [];
      Object.entries(all).forEach(([uid, days]) => {
        Object.entries(days || {}).forEach(([date, val]) => out.push({ date, staffUid: uid, ...val }));
      });
      setAllAttendance(out);
    };
    ref.on("value", cb);
    return () => ref.off("value", cb);
  }, [isAdmin]);

  if (staffMap === null) return <div style={{ padding: 60, textAlign: "center", color: "var(--ink-soft)" }}>Loading…</div>;
  if (!me) return <NoProfileScreen email={user.email} />;

  const addExpense = async (form) => {
    const cleanItems = form.items.map((it) => ({ tag: it.tag.trim(), qty: Number(it.qty) || 0, unitPrice: Number(it.unitPrice) || 0 })).filter((it) => it.tag && it.qty > 0 && it.unitPrice > 0);
    const amount = itemsTotal(cleanItems);
    const newRef = db.ref("expenses/" + user.uid).push();
    const record = { staffName: me.name, date: form.date, category: form.category, items: cleanItems, amount, paymentMode: form.paymentMode, note: form.note.trim(), status: "Pending", submittedAt: new Date().toISOString(), reviewNote: "" };
    if (form.receipt) record.receipt = form.receipt;
    await newRef.set(record);
    const existingTagNames = tags.map((t) => t.name);
    const newTagNames = [...new Set(cleanItems.map((it) => it.tag))].filter((t) => !existingTagNames.includes(t));
    newTagNames.forEach((t) => db.ref("tags").push({ name: t }));
    flash("Expense submitted.");
  };

  const withdraw = async (expenseId) => { await db.ref("expenses/" + user.uid + "/" + expenseId).remove(); flash("Withdrawn and deleted."); };

  const startEditOwn = (expense) => { setEditingExpense({ ...expense, staffUid: user.uid, editKind: "own" }); setEditReturnTab("mine"); setSection("expense"); setTab("add"); };
  const startEditAsAdmin = (expense) => { setEditingExpense({ ...expense, editKind: "admin" }); setEditReturnTab("overview"); setSection("expense"); setTab("add"); };
  const cancelEdit = () => { setEditingExpense(null); setSection("expense"); setTab(editReturnTab); };

  const updateExpense = async (editing, form) => {
    const cleanItems = form.items.map((it) => ({ tag: it.tag.trim(), qty: Number(it.qty) || 0, unitPrice: Number(it.unitPrice) || 0 })).filter((it) => it.tag && it.qty > 0 && it.unitPrice > 0);
    const amount = itemsTotal(cleanItems);
    const updates = { date: form.date, category: form.category, items: cleanItems, amount, paymentMode: form.paymentMode, note: form.note.trim(), receipt: form.receipt || null };
    if (editing.editKind === "own") {
      updates.status = "Pending";
      updates.submittedAt = new Date().toISOString();
    } else {
      updates.lastEditedBy = me.name;
      updates.lastEditedAt = new Date().toISOString();
    }
    await db.ref(`expenses/${editing.staffUid}/${editing.id}`).update(updates);
    const existingTagNames = tags.map((t) => t.name);
    const newTagNames = [...new Set(cleanItems.map((it) => it.tag))].filter((t) => !existingTagNames.includes(t));
    newTagNames.forEach((t) => db.ref("tags").push({ name: t }));
    flash(editing.editKind === "own" ? "Claim updated and resubmitted for review." : "Transaction updated.");
    setEditingExpense(null);
    setTab(editReturnTab);
  };

  const review = async (staffUid, expenseId, status, note) => {
    const target = allExpenses.find((e) => e.staffUid === staffUid && e.id === expenseId);
    if (target && !canAccessExpense(target)) { flash("You don't have access to this category."); return; }
    await db.ref("expenses/" + staffUid + "/" + expenseId).update({ status, reviewNote: note || "", reviewedBy: me.name });
    flash("Marked " + status.toLowerCase() + ".");
  };

  const addCategory = (name) => {
    if (!name.trim()) return;
    const maxOrder = categories.reduce((m, c) => Math.max(m, c.order ?? 0), -1);
    db.ref("categories").push({ name: name.trim(), order: maxOrder + 1 });
  };

  const categoryUsageCount = (name) => allExpenses.filter((e) => e.category === name).length;
  const tagUsageCount = (name) => allExpenses.filter((e) => (e.items || []).some((it) => it.tag === name)).length;

  const removeCategory = (id, name) => {
    const count = categoryUsageCount(name);
    if (count > 0) { flash(`Can't delete — ${count} transaction${count === 1 ? "" : "s"} use "${name}".`); return; }
    db.ref("categories/" + id).remove();
  };

  const renameCategory = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    const updates = { [`categories/${id}/name`]: clean };
    const affected = allExpenses.filter((e) => e.category === oldName);
    affected.forEach((e) => { updates[`expenses/${e.staffUid}/${e.id}/category`] = clean; });
    const oldKey = safeKey(oldName), newKey = safeKey(clean);
    if (oldKey !== newKey) {
      Object.entries(staffMap || {}).forEach(([uid, s]) => {
        if (s.allowedCategories && s.allowedCategories[oldKey]) {
          updates[`staff/${uid}/allowedCategories/${newKey}`] = true;
          updates[`staff/${uid}/allowedCategories/${oldKey}`] = null;
        }
      });
    }
    await db.ref().update(updates);
    flash(`Renamed to "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const moveCategory = async (id, direction) => {
    const sorted = [...categories].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const idx = sorted.findIndex((c) => c.id === id);
    const swapIdx = direction === "up" ? idx - 1 : idx + 1;
    if (idx < 0 || swapIdx < 0 || swapIdx >= sorted.length) return;
    const a = sorted[idx], b = sorted[swapIdx];
    await db.ref().update({
      [`categories/${a.id}/order`]: b.order ?? swapIdx,
      [`categories/${b.id}/order`]: a.order ?? idx,
    });
  };

  const removeTag = (id, name) => {
    const count = tagUsageCount(name);
    if (count > 0) { flash(`Can't delete — ${count} transaction${count === 1 ? "" : "s"} use "${name}".`); return; }
    db.ref("tags/" + id).remove();
  };

  const renameTag = async (id, oldName, newName) => {
    const clean = newName.trim();
    if (!clean || clean === oldName) return;
    await db.ref("tags/" + id).update({ name: clean });
    const affected = allExpenses.filter((e) => (e.items || []).some((it) => it.tag === oldName));
    if (affected.length > 0) {
      const updates = {};
      affected.forEach((e) => {
        const newItems = e.items.map((it) => (it.tag === oldName ? { ...it, tag: clean } : it));
        updates[`expenses/${e.staffUid}/${e.id}/items`] = newItems;
      });
      await db.ref().update(updates);
    }
    flash(`Renamed to "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const mergeCategory = async (id, fromName, toName) => {
    const clean = toName.trim();
    if (!clean || clean === fromName) return;
    const updates = { [`categories/${id}`]: null };
    const affected = allExpenses.filter((e) => e.category === fromName);
    affected.forEach((e) => { updates[`expenses/${e.staffUid}/${e.id}/category`] = clean; });
    const fromKey = safeKey(fromName), toKey = safeKey(clean);
    Object.entries(staffMap || {}).forEach(([uid, s]) => {
      if (s.allowedCategories && s.allowedCategories[fromKey]) {
        updates[`staff/${uid}/allowedCategories/${toKey}`] = true;
        updates[`staff/${uid}/allowedCategories/${fromKey}`] = null;
      }
    });
    await db.ref().update(updates);
    flash(`Merged "${fromName}" into "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const mergeTag = async (id, fromName, toName) => {
    const clean = toName.trim();
    if (!clean || clean === fromName) return;
    const affected = allExpenses.filter((e) => (e.items || []).some((it) => it.tag === fromName));
    if (affected.length > 0) {
      const updates = {};
      affected.forEach((e) => {
        const newItems = e.items.map((it) => (it.tag === fromName ? { ...it, tag: clean } : it));
        updates[`expenses/${e.staffUid}/${e.id}/items`] = newItems;
      });
      await db.ref().update(updates);
    }
    await db.ref("tags/" + id).remove();
    flash(`Merged "${fromName}" into "${clean}"${affected.length ? ` (updated ${affected.length} transaction${affected.length === 1 ? "" : "s"})` : ""}.`);
  };

  const adminDeleteExpense = async (staffUid, expenseId) => {
    const target = allExpenses.find((e) => e.staffUid === staffUid && e.id === expenseId);
    if (target && !canAccessExpense(target)) { flash("You don't have access to this category."); return; }
    await db.ref("expenses/" + staffUid + "/" + expenseId).remove();
    flash("Transaction deleted.");
  };

  const createStaff = async (email, password, displayName) => {
    const secondary = firebase.initializeApp(firebaseConfig, "secondary-" + Date.now());
    try {
      const cred = await secondary.auth().createUserWithEmailAndPassword(email, password);
      const uid = cred.user.uid;
      await db.ref("staff/" + uid).set({ name: displayName, email, role: "staff", active: true });
      await secondary.auth().signOut();
    } finally {
      await secondary.delete();
    }
  };
  const setRole = (uid, role) => db.ref("staff/" + uid + "/role").set(role);
  const toggleCategoryAccess = (uid, categoryKey, allowed) => {
    if (allowed) db.ref(`staff/${uid}/allowedCategories/${categoryKey}`).set(true);
    else db.ref(`staff/${uid}/allowedCategories/${categoryKey}`).remove();
  };
  const toggleActive = (uid, val) => db.ref("staff/" + uid + "/active").set(val);

  const addLocation = (name, shiftStart, graceMinutes) => {
    const clean = (name || "").trim();
    if (!clean) return;
    db.ref("locations").push({ name: clean, shiftStart: shiftStart || "09:00", graceMinutes: Number(graceMinutes) || 0 });
  };
  const updateLocation = (id, fields) => db.ref("locations/" + id).update(fields);
  const removeLocation = async (id) => {
    const updates = { [`locations/${id}`]: null };
    routers.filter((r) => r.locationId === id).forEach((r) => { updates[`routers/${r.id}`] = null; });
    await db.ref().update(updates);
    flash("Location removed.");
  };
  const addRouter = (locationId, ssid, bssid) => db.ref("routers").push({ locationId, ssid: ssid.trim(), bssid: bssid.trim() });
  const removeRouter = (id) => db.ref("routers/" + id).remove();
  const setStaffLocation = (uid, locationId) => db.ref(`staff/${uid}/locationId`).set(locationId || null);
  const setRemoteAllowed = (uid, val) => db.ref(`staff/${uid}/remoteCheckInAllowed`).set(val);

  const locationsMap = Object.fromEntries(locations.map((l) => [l.id, l]));

  const checkIn = async () => {
    setAttBusy(true); setAttError("");
    try {
      const geo = await getGeoPosition();
      const now = new Date();
      const dateKey = localDateKey(now);
      const loc = me.locationId ? locationsMap[me.locationId] : null;
      const status = computeAttStatus(localTimeStr(now), loc);
      await db.ref(`attendance/${user.uid}/${dateKey}`).set({
        checkInTime: now.toISOString(), checkOutTime: null, method: "gps_remote",
        geoLat: geo.lat, geoLng: geo.lng, locationId: me.locationId || null, status, checkedInBy: "self",
      });
      flash("Checked in.");
    } catch (err) {
      setAttError(err.message || "Couldn't check in.");
    }
    setAttBusy(false);
  };

  const requestCheckIn = async (note) => {
    setAttBusy(true); setAttError("");
    try {
      let geo = null;
      try { geo = await getGeoPosition(); } catch (e) { /* optional for a request */ }
      const now = new Date();
      const dateKey = localDateKey(now);
      await db.ref(`attendance/${user.uid}/${dateKey}`).set({
        checkInTime: null, checkOutTime: null, method: "admin_manual", status: "awaiting_checkin",
        requestNote: (note || "").trim(), requestedAt: now.toISOString(),
        geoLat: geo ? geo.lat : null, geoLng: geo ? geo.lng : null, locationId: me.locationId || null, checkedInBy: null,
      });
      flash("Check-in request sent.");
    } catch (err) {
      setAttError(err.message || "Couldn't send the request.");
    }
    setAttBusy(false);
  };

  const cancelCheckInRequest = async () => {
    await db.ref(`attendance/${user.uid}/${localDateKey()}`).remove();
    flash("Request withdrawn.");
  };

  const checkOut = async (halfDay) => {
    setAttBusy(true);
    const updates = { checkOutTime: new Date().toISOString() };
    if (halfDay) updates.status = "half_day";
    await db.ref(`attendance/${user.uid}/${localDateKey()}`).update(updates);
    flash(halfDay ? "Checked out — marked half day." : "Checked out.");
    setAttBusy(false);
  };

  const approveCheckInRequest = async (staffUid, dateKey) => {
    const staffRec = staffMap[staffUid];
    const loc = staffRec && staffRec.locationId ? locationsMap[staffRec.locationId] : null;
    const now = new Date();
    const status = computeAttStatus(localTimeStr(now), loc);
    await db.ref(`attendance/${staffUid}/${dateKey}`).update({ checkInTime: now.toISOString(), status, checkedInBy: me.name });
    flash("Check-in approved.");
  };
  const rejectCheckInRequest = async (staffUid, dateKey) => {
    await db.ref(`attendance/${staffUid}/${dateKey}`).remove();
    flash("Request rejected.");
  };

  const exportCSV = (rows) => {
    const header = ["Date", "Staff", "Category", "Items", "Amount", "Payment Mode", "Status", "Note", "Submitted At", "Review Note"];
    const lines = [header.join(",")];
    rows.forEach((e) => {
      const itemsStr = (e.items || []).map((it) => `${it.tag} x${it.qty} @${it.unitPrice}=${it.qty * it.unitPrice}`).join("; ");
      const cells = [e.date, e.staffName || me.name, e.category, itemsStr, e.amount, e.paymentMode, e.status, e.note, e.submittedAt, e.reviewNote].map((c) => `"${String(c ?? "").replace(/"/g, '""')}"`);
      lines.push(cells.join(","));
    });
    const blob = new Blob([lines.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `mypower_expenses_${todayStr()}.csv`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  };

  const sortedCategories = [...categories].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  const visibleCategories = isSuperAdmin ? sortedCategories : sortedCategories.filter((c) => me && me.allowedCategories && me.allowedCategories[safeKey(c.name)]);
  const allowedExpenses = isSuperAdmin ? allExpenses : allExpenses.filter(canAccessExpense);

  const expenseTabs = isSuperAdmin
    ? [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }, { id: "analysis", label: "My Analysis" }, { id: "overview", label: "Company Overview" }, { id: "expenseSettings", label: "Categories & Tags" }]
    : isAdmin
    ? [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }, { id: "analysis", label: "My Analysis" }, { id: "overview", label: "Company Overview" }]
    : [{ id: "add", label: "Add Expense" }, { id: "mine", label: "My Expenses" }, { id: "analysis", label: "My Analysis" }];

  const attendanceTabs = isSuperAdmin
    ? [{ id: "attendance", label: "My Attendance" }, { id: "team", label: "Team Attendance" }, { id: "attendanceSettings", label: "Locations" }]
    : isAdmin
    ? [{ id: "attendance", label: "My Attendance" }, { id: "team", label: "Team Attendance" }]
    : [{ id: "attendance", label: "My Attendance" }];

  const sectionTabs = section === "expense" ? expenseTabs : section === "attendance" ? attendanceTabs : [];

  const goHome = () => setSection("home");
  const enterExpense = () => { setSection("expense"); setTab("add"); };
  const enterAttendance = () => { setSection("attendance"); setTab("attendance"); };
  const enterPeople = () => setSection("people");

  if (section === "home") {
    return (
      <HomeScreen me={me} isSuperAdmin={isSuperAdmin} isMobile={isMobile}
        onEnterExpense={enterExpense} onEnterAttendance={enterAttendance} onEnterPeople={enterPeople}
        onSignOut={() => auth.signOut()} />
    );
  }

  const sectionLabel = section === "expense" ? "Expense" : section === "attendance" ? "Attendance" : "Staff & permissions";

  return (
    <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 0 60px" }}>
      <div style={{ padding: isMobile ? "16px 16px 14px" : "22px 28px 18px", borderBottom: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 14, background: "var(--paper-dark)" }}>
        <div onClick={goHome} style={{ cursor: "pointer" }}>
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: "0.18em", color: "var(--ink-soft)", textTransform: "uppercase" }}>← MY POWER</div>
          <div style={{ fontFamily: "'Lora', serif", fontWeight: 700, fontSize: isMobile ? 20 : 26, marginTop: 2 }}>{sectionLabel}</div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <div style={{ display: "flex", borderRadius: 8, overflow: "hidden", border: "1px solid var(--line)" }}>
            {["AD", "BS"].map((f) => (
              <button key={f} onClick={() => f !== dateFormat && toggleDateFormat()} style={{
                padding: "6px 10px", fontSize: 11.5, border: "none", cursor: "pointer",
                background: dateFormat === f ? "var(--ink)" : "var(--card)", color: dateFormat === f ? "var(--paper)" : "var(--ink)",
              }}>{f}</button>
            ))}
          </div>
          <span style={{ fontSize: 13, color: "var(--ink-soft)" }}>{me.name}{isSuperAdmin ? " · Super Admin" : isAdmin ? " · Admin" : ""}</span>
          <button onClick={() => auth.signOut()} style={ghostBtn}>Sign out</button>
        </div>
      </div>

      {section !== "people" && (
        <div style={{ display: "flex", gap: 2, padding: "0 16px", borderBottom: "1px solid var(--line)", background: "var(--paper)", overflowX: "auto" }}>
          {sectionTabs.map((it) => (
            <button key={it.id} onClick={() => setTab(it.id)} style={{
              padding: isMobile ? "12px 14px" : "12px 16px", border: "none", background: "transparent", cursor: "pointer", fontSize: isMobile ? 12.5 : 13, fontWeight: 600, whiteSpace: "nowrap",
              color: tab === it.id ? "var(--ink)" : "var(--ink-soft)", borderBottom: tab === it.id ? "2px solid var(--brand-yellow)" : "2px solid transparent", marginBottom: -1,
            }}>{it.label}</button>
          ))}
        </div>
      )}

      <div style={{ padding: isMobile ? "16px 16px" : "20px 28px" }}>
        {section === "expense" && tab === "add" && (
          <AddExpense key={editingExpense ? "edit-" + editingExpense.id : "new"}
            categories={sortedCategories} tags={tags} onSubmit={addExpense} onUpdate={updateExpense}
            editingExpense={editingExpense} onCancelEdit={cancelEdit} isMobile={isMobile} dateFormat={dateFormat} />
        )}
        {section === "expense" && tab === "mine" && <MyExpenses myName={me.name} expenses={myExpenses} onWithdraw={withdraw} onEdit={startEditOwn} onExport={exportCSV} dateFormat={dateFormat} />}
        {section === "expense" && tab === "analysis" && <MyAnalysis expenses={myExpenses} />}
        {section === "expense" && tab === "overview" && isAdmin && (
          <div>
            {!isSuperAdmin && (
              <div style={{ background: "var(--paper-dark)", border: "1px solid var(--line)", borderRadius: 10, padding: "10px 14px", fontSize: 12.5, color: "var(--ink-soft)", marginBottom: 14 }}>
                You have access to {visibleCategories.length} of {sortedCategories.length} categories. Totals, charts, and exports below reflect only what you're permitted to see.
              </div>
            )}
            <Overview expenses={allowedExpenses} staffMap={staffMap} categories={visibleCategories} onReview={review} onExport={exportCSV} onDelete={adminDeleteExpense} onEdit={startEditAsAdmin} isSuperAdmin={isSuperAdmin} dateFormat={dateFormat} />
          </div>
        )}
        {section === "expense" && tab === "expenseSettings" && isSuperAdmin && (
          <ExpenseSettings
            categories={sortedCategories} onAddCategory={addCategory} onRemoveCategory={removeCategory} onRenameCategory={renameCategory} onMoveCategory={moveCategory}
            onMergeCategory={mergeCategory} categoryUsageCount={categoryUsageCount}
            tags={tags} onRemoveTag={removeTag} onRenameTag={renameTag} onMergeTag={mergeTag} tagUsageCount={tagUsageCount}
          />
        )}

        {section === "attendance" && tab === "attendance" && (
          <AttendanceTab
            me={me} myAttendance={myAttendance} location={me.locationId ? locationsMap[me.locationId] : null}
            onCheckIn={checkIn} onRequestCheckIn={requestCheckIn} onCancelRequest={cancelCheckInRequest} onCheckOut={checkOut}
            attBusy={attBusy} attError={attError} dateFormat={dateFormat}
          />
        )}
        {section === "attendance" && tab === "team" && isAdmin && (
          <TeamAttendance allAttendance={allAttendance} staffMap={staffMap} locations={locations} dateFormat={dateFormat} onApproveRequest={approveCheckInRequest} onRejectRequest={rejectCheckInRequest} />
        )}
        {section === "attendance" && tab === "attendanceSettings" && isSuperAdmin && (
          <AttendanceSettings locations={locations} routers={routers} onAddLocation={addLocation} onUpdateLocation={updateLocation} onRemoveLocation={removeLocation} onAddRouter={addRouter} onRemoveRouter={removeRouter} />
        )}

        {section === "people" && isSuperAdmin && (
          <PeopleManage
            staffMap={staffMap} myUid={user.uid} categories={sortedCategories} locations={locations}
            onCreateStaff={createStaff} onSetRole={setRole} onToggleCategoryAccess={toggleCategoryAccess} onToggleActive={toggleActive}
            onSetLocation={setStaffLocation} onToggleRemote={setRemoteAllowed}
          />
        )}
      </div>

      {toast && (
        <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "var(--ink)", color: "var(--paper)", padding: "10px 18px", borderRadius: 8, fontSize: 13, boxShadow: "0 6px 20px rgba(0,0,0,0.25)", zIndex: 50 }}>{toast}</div>
      )}
    </div>
  );
}

function App() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = logged out
  useEffect(() => auth.onAuthStateChanged(setUser), []);

  if (user === undefined) return <div style={{ padding: 60, textAlign: "center", color: "var(--ink-soft)" }}>Loading…</div>;
  if (!user) return <LoginScreen />;
  return <MainApp user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
